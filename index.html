            `;
            screenDiv.appendChild(fillProgress);

            screenDiv.appendChild(canvasWrap);
            screenDiv.appendChild(toolbar);
            area.appendChild(screenDiv);

            // Store canvas references FIRST, before any drawing
            CanvasGame.canvases.outline = outlineCanvas;
            CanvasGame.canvases.draw = drawCanvas;
            CanvasGame.canvases.mask = maskCanvas;
            CanvasGame.canvasCtx.outline = outlineCanvas.getContext('2d');
            CanvasGame.canvasCtx.draw = drawCanvas.getContext('2d');
            CanvasGame.canvasCtx.mask = maskCanvas.getContext('2d');

            CanvasGame.resizeHandler = () => resizeCanvases(outlineCanvas, drawCanvas, maskCanvas);
            window.addEventListener('resize', CanvasGame.resizeHandler);

            // Setup drawing handlers first (doesn't need canvas size)
            setupDrawing(drawCanvas);

            // Force layout recalc before first resize attempt
            void area.offsetHeight;
            void area.offsetWidth;

            // Initial resize + draw (resizeCanvases calls drawOutline and fillMask internally)
            resizeCanvases(outlineCanvas, drawCanvas, maskCanvas);

            // Set initial cursor
            setTimeout(updateSketchCursor, 100);

            // Multi-retry redraw: ensures outline renders correctly after layout settles
            // The DOM needs time for CSS flexbox/grid layout to settle dimensions
            // First pass: immediate rAF
            requestAnimationFrame(() => {
                if (!CanvasGame.running) return;
                void document.querySelector('.sketch-canvas-wrap')?.offsetHeight;
                resizeCanvases(outlineCanvas, drawCanvas, maskCanvas);
            });
            // Subsequent passes at increasing delays to catch slow layout engines
            [50, 120, 300, 600, 1200, 2500].forEach(delay => {
                setTimeout(() => {
                    if (!CanvasGame.running) return;
                    const wrap = document.querySelector('.sketch-canvas-wrap');
                    if (!wrap) return;
                    void wrap.offsetHeight;
                    const rect = wrap.getBoundingClientRect();
                    if (rect.width > 50 && rect.height > 50) {
                        resizeCanvases(outlineCanvas, drawCanvas, maskCanvas);
                    }
                }, delay);
            });
            // ResizeObserver: immediately redraw when canvas wrap changes size (handles dynamic layouts)
            if (typeof ResizeObserver !== 'undefined') {
                const canvasWrapEl = document.querySelector('.sketch-canvas-wrap');
                if (canvasWrapEl) {
                    let roCount = 0;
                    const ro = new ResizeObserver(() => {
                        roCount++;
                        if (!CanvasGame.running || roCount > 10) { ro.disconnect(); return; }
                        resizeCanvases(outlineCanvas, drawCanvas, maskCanvas);
                    });
                    ro.observe(canvasWrapEl);
                    // Auto-disconnect after 5s to prevent indefinite observation
                    setTimeout(() => ro.disconnect(), 5000);
                }
            }
        }

        function resizeCanvases(outlineCanvas, drawCanvas, maskCanvas) {
            const wrap = document.querySelector('.sketch-canvas-wrap');
            if (!wrap) return;

            // Force layout recalc
            void wrap.offsetHeight;
            void wrap.offsetWidth;

            const rect = wrap.getBoundingClientRect();
            // Guard: if dimensions are too small, the layout hasn't settled
            if (rect.width < 30 || rect.height < 30) {
                if (!resizeCanvases._retryCount) resizeCanvases._retryCount = 0;
                resizeCanvases._retryCount++;
                if (resizeCanvases._retryCount < 30) {
                    const delay = resizeCanvases._retryCount <= 8 ? 0 : 10 + 20 * (resizeCanvases._retryCount - 8);
                    if (delay === 0) {
                        requestAnimationFrame(() => resizeCanvases(outlineCanvas, drawCanvas, maskCanvas));
                    } else {
                        setTimeout(() => resizeCanvases(outlineCanvas, drawCanvas, maskCanvas), delay);
                    }
                }
                return;
            }
            resizeCanvases._retryCount = 0;
            const dpr = window.devicePixelRatio || 1;

            // Set canvas buffer to match device pixels for crisp rendering
            // Clamp DPR to avoid excessive canvas sizes on very high-DPI devices
            const clampedDpr = Math.min(dpr, 2.5);
            const w = Math.max(Math.round(rect.width * clampedDpr), 300);
            const h = Math.max(Math.round(rect.height * clampedDpr), 300);

            // Only resize if dimensions changed significantly
            const needsResize = Math.abs(outlineCanvas.width - w) > 4 || Math.abs(outlineCanvas.height - h) > 4;

            if (needsResize || outlineCanvas.width < 50) {
                outlineCanvas.width = w;
                outlineCanvas.height = h;
                drawCanvas.width = w;
                drawCanvas.height = h;
                if (maskCanvas) {
                    maskCanvas.width = w;
                    maskCanvas.height = h;
                }
            }

            outlineCanvas.style.width = rect.width + 'px';
            outlineCanvas.style.height = rect.height + 'px';
            drawCanvas.style.width = rect.width + 'px';
            drawCanvas.style.height = rect.height + 'px';

            if (maskCanvas) fillMask(maskCanvas);
            // Draw outline - ensure ctx state is fully clean
            try { drawOutline(outlineCanvas); } catch(e) { /* ignore draw errors during resize */ }
            applyColoringMode();

            // One-shot verification after a frame
            if (needsResize) {
                requestAnimationFrame(() => {
                    const rect2 = wrap.getBoundingClientRect();
                    if (Math.abs(rect2.width - rect.width) > 5 || Math.abs(rect2.height - rect.height) > 5) {
                        resizeCanvases(outlineCanvas, drawCanvas, maskCanvas);
                    }
                });
            }

            // Delayed quality redraw: layout may shift during first 300ms
            // This ensures the outline is crisp after all CSS transitions complete
            if (!CanvasGame.secondDrawTimer) {
                CanvasGame.secondDrawTimer = setTimeout(() => {
                    CanvasGame.secondDrawTimer = null;
                    if (CanvasGame.running && outlineCanvas && outlineCanvas.parentNode) {
                        resizeCanvases(outlineCanvas, drawCanvas, maskCanvas);
                    }
                }, 350);
            }
        }

        // Unified shape transform calculator - ensures outline, mask, and clip path all use the same scale/offset
        // Per-shape bounding boxes (in shape-local coordinates) for proper centering and fit
        const SHAPE_BOUNDS = {
            fish:      { minX: -135, maxX: 85,  minY: -105, maxY: 85 },
            car:       { minX: -110, maxX: 110, minY: -85,  maxY: 48 },
            dino:      { minX: -58,  maxX: 130, minY: -95,  maxY: 98 },  // Head y=-85, toes y=89, neck x=-52, tail tip x=125, with padding
            butterfly: { minX: -135, maxX: 135, minY: -95,  maxY: 90 }
        };

        function getShapeTransform(canvas) {
            const dpr = Math.min(window.devicePixelRatio || 1, 2.5);
            const canvasCX = canvas.width / 2;
            const canvasCY = canvas.height / 2;
            // Use actual DPR used during canvas sizing (may differ from current dpr due to clamping)
            const actualDpr = canvas.width > 0 && canvas.style.width ? 
                canvas.width / parseFloat(canvas.style.width) : dpr;
            const useDpr = (isFinite(actualDpr) && actualDpr > 0.5 && actualDpr < 4) ? actualDpr : dpr;
            const cssW = canvas.width / useDpr;
            const cssH = canvas.height / useDpr;

            // Guard against degenerate canvas
            if (cssW < 20 || cssH < 20 || canvas.width < 50 || canvas.height < 50) {
                return { tx: canvasCX, ty: canvasCY, scale: useDpr, dpr: useDpr };
            }

            const bounds = SHAPE_BOUNDS[CanvasGame.currentShape] || { minX: -70, maxX: 70, minY: -70, maxY: 70 };
            const shapeW = Math.max(bounds.maxX - bounds.minX, 10); // prevent division by zero
            const shapeH = Math.max(bounds.maxY - bounds.minY, 10);
            const shapeCenterX = (bounds.minX + bounds.maxX) / 2;
            const shapeCenterY = (bounds.minY + bounds.maxY) / 2;

            // Fit shape within 75% of canvas (CSS pixels) for breathing room, then convert to device pixels
            const padding = 0.75;
            const scaleX = (cssW * padding) / shapeW;
            const scaleY = (cssH * padding) / shapeH;
            let scale = Math.min(scaleX, scaleY) * useDpr;

            // Safety: prevent degenerate/infinite/NaN scale, and cap maximum
            if (!isFinite(scale) || isNaN(scale) || scale <= 0) scale = useDpr;
            scale = Math.min(scale, useDpr * 8); // prevent over-scaling
            // Minimum scale to ensure outlines are visible
            scale = Math.max(scale, useDpr * 0.5);

            // Translate so the shape's visual center aligns with canvas center
            let tx = canvasCX - shapeCenterX * scale;
            let ty = canvasCY - shapeCenterY * scale;

            // Safety: prevent NaN/Infinity in translation
            if (!isFinite(tx) || isNaN(tx)) tx = canvasCX;
            if (!isFinite(ty) || isNaN(ty)) ty = canvasCY;

            return { tx, ty, scale, dpr: useDpr };
        }

        function drawOutline(canvas) {
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            if (!ctx) return;
            // Guard: don't draw on zero-size canvas (lowered threshold for faster first render)
            if (canvas.width < 50 || canvas.height < 50) return;
            // Validate currentShape is set
            if (!CanvasGame.currentShape) return;
            // Full context reset: restore all saved states, then reset transform
            try { for (let _r = 0; _r < 50; _r++) ctx.restore(); } catch(e) {}
            ctx.setTransform(1, 0, 0, 1, 0, 0);
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.globalAlpha = 1;
            ctx.globalCompositeOperation = 'source-over';
            ctx.imageSmoothingEnabled = true;
            if (ctx.imageSmoothingQuality !== undefined) ctx.imageSmoothingQuality = 'high';
            ctx.setLineDash([]);
            ctx.shadowBlur = 0;
            ctx.shadowColor = 'transparent';
            ctx.filter = 'none';
            ctx.lineDashOffset = 0;
            ctx.miterLimit = 10;
            ctx.textAlign = 'start';
            ctx.textBaseline = 'alphabetic';

            const { tx, ty, scale } = getShapeTransform(canvas);

            // Step 0: Draw a solid white fill behind the shape for better visibility
            ctx.save();
            ctx.translate(tx, ty);
            ctx.scale(scale, scale);
            ctx.fillStyle = 'rgba(255, 255, 255, 0.92)';
            switch (CanvasGame.currentShape) {
                case 'fish': fillFishMask(ctx); break;
                case 'car': fillCarMask(ctx); break;
                case 'dino': fillDinoMask(ctx); break;
                case 'butterfly': fillButterflyMask(ctx); break;
                default: ctx.beginPath(); ctx.arc(0, 0, 60, 0, Math.PI * 2); ctx.fill();
            }
            ctx.restore();

            // Step 0.5: Pastel tint inside the shape for kid-friendly coloring guide
            const tintColors = { fish: 'rgba(79,195,247,0.25)', car: 'rgba(255,138,101,0.22)', dino: 'rgba(129,199,132,0.25)', butterfly: 'rgba(206,147,216,0.25)' };
            const tintColor = tintColors[CanvasGame.currentShape] || 'rgba(200,200,200,0.1)';
            ctx.save();
            ctx.translate(tx, ty);
            ctx.scale(scale, scale);
            ctx.fillStyle = tintColor;
            switch (CanvasGame.currentShape) {
                case 'fish': fillFishMask(ctx); break;
                case 'car': fillCarMask(ctx); break;
                case 'dino': fillDinoMask(ctx); break;
                case 'butterfly': fillButterflyMask(ctx); break;
                default: ctx.beginPath(); ctx.arc(0, 0, 60, 0, Math.PI * 2); ctx.fill();
            }
            ctx.restore();

            // Step 1: Draw a soft colored shadow layer for depth
            // Normalize line widths: since ctx.scale(scale) is active, lineWidth W becomes W*scale device px.
            // Target ~6px CSS visible for kid-friendly thick outlines = 6*dpr device pixels.
            // scale already includes dpr (from getShapeTransform), so this gives consistent thickness.
            const basePx = Math.min(window.devicePixelRatio || 1, 2.5);
            const clampedLineWidth = Math.max(14 * basePx / scale, 5.5);
            const shadowLineWidth = Math.max(19 * basePx / scale, 7.0);

            const shadowColors = { fish: '#4FC3F7', car: '#FF8A65', dino: '#81C784', butterfly: '#CE93D8' };
            const shadowColor = shadowColors[CanvasGame.currentShape] || '#999';
            ctx.save();
            ctx.translate(tx, ty + 2.5 * scale);
            ctx.scale(scale, scale);
            ctx.strokeStyle = shadowColor;
            ctx.fillStyle = shadowColor;
            ctx.globalAlpha = 0.18;
            ctx.lineWidth = shadowLineWidth;
            ctx.setLineDash([]);
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';

            switch (CanvasGame.currentShape) {
                case 'fish': drawFishOutline(ctx); break;
                case 'car': drawCarOutline(ctx); break;
                case 'dino': drawDinoOutline(ctx); break;
                case 'butterfly': drawButterflyOutline(ctx); break;
                default: ctx.beginPath(); ctx.arc(0, 0, 60, 0, Math.PI * 2); ctx.stroke();
            }
            ctx.restore();

            // Step 1.5: White halo behind main outline for crisp contrast on any background
            ctx.save();
            ctx.translate(tx, ty);
            ctx.scale(scale, scale);
            ctx.strokeStyle = '#FFFFFF';
            ctx.fillStyle = '#FFFFFF';
            ctx.lineWidth = clampedLineWidth * 1.8;
            ctx.setLineDash([]);
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.globalAlpha = 0.7;

            switch (CanvasGame.currentShape) {
                case 'fish': drawFishOutline(ctx); break;
                case 'car': drawCarOutline(ctx); break;
                case 'dino': drawDinoOutline(ctx); break;
                case 'butterfly': drawButterflyOutline(ctx); break;
                default: ctx.beginPath(); ctx.arc(0, 0, 60, 0, Math.PI * 2); ctx.stroke();
            }
            ctx.restore();

            // Step 2: Main outline on top - bold enough for kids, thin enough for detail
            ctx.save();
            ctx.translate(tx, ty);
            ctx.scale(scale, scale);
            ctx.strokeStyle = '#1A1A1A';
            ctx.fillStyle = '#1A1A1A';
            ctx.lineWidth = clampedLineWidth;
            ctx.setLineDash([]);
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';

            switch (CanvasGame.currentShape) {
                case 'fish':
                    drawFishOutline(ctx);
                    break;
                case 'car':
                    drawCarOutline(ctx);
                    break;
                case 'dino':
                    drawDinoOutline(ctx);
                    break;
                case 'butterfly':
                    drawButterflyOutline(ctx);
                    break;
                default:
                    ctx.beginPath();
                    ctx.arc(0, 0, 60, 0, Math.PI * 2);
                    ctx.stroke();
            }

            ctx.restore();
        }

        // Fill the hidden mask canvas with the outline's interior region (solid white)
        function fillMask(canvas) {
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.imageSmoothingEnabled = true;
            ctx.imageSmoothingQuality = 'high';

            const { tx, ty, scale } = getShapeTransform(canvas);

            ctx.save();
            ctx.translate(tx, ty);
            ctx.scale(scale, scale);
            ctx.fillStyle = '#FFFFFF';

            switch (CanvasGame.currentShape) {
                case 'fish': fillFishMask(ctx); break;
                case 'car': fillCarMask(ctx); break;
                case 'dino': fillDinoMask(ctx); break;
                case 'butterfly': fillButterflyMask(ctx); break;
                default:
                    ctx.beginPath();
                    ctx.arc(0, 0, 60, 0, Math.PI * 2);
                    ctx.fill();
            }
            ctx.restore();
        }

        function fillFishMask(ctx) {
            // Main body
            ctx.beginPath();
            ctx.moveTo(75, 0);
            ctx.bezierCurveTo(80, -30, 60, -55, 30, -52);
            ctx.bezierCurveTo(0, -50, -40, -45, -65, -25);
            ctx.bezierCurveTo(-80, -15, -80, 15, -65, 25);
            ctx.bezierCurveTo(-40, 45, 0, 50, 30, 52);
            ctx.bezierCurveTo(60, 55, 80, 30, 75, 0);
            ctx.closePath();
            ctx.fill();
            // Tail fin region
            ctx.beginPath();
            ctx.moveTo(-65, -15);
            ctx.bezierCurveTo(-85, -20, -110, -55, -125, -50);
            ctx.lineTo(-80, -5);
            ctx.closePath();
            ctx.fill();
            ctx.beginPath();
            ctx.moveTo(-65, 15);
            ctx.bezierCurveTo(-85, 20, -110, 55, -125, 50);
            ctx.lineTo(-80, 5);
            ctx.closePath();
            ctx.fill();
            // Tail center
            ctx.beginPath();
            ctx.moveTo(-80, -5);
            ctx.lineTo(-80, 5);
            ctx.lineTo(-65, 0);
            ctx.closePath();
            ctx.fill();
            // Dorsal fin
            ctx.beginPath();
            ctx.moveTo(10, -50);
            ctx.bezierCurveTo(5, -75, 20, -95, 35, -80);
            ctx.bezierCurveTo(45, -70, 50, -58, 42, -50);
            ctx.closePath();
            ctx.fill();

        // Build the shape clip path on the draw canvas context (used for inside-only coloring)
        // This traces the same filled regions as the fillXxxMask functions
        function buildShapeClipPath(ctx, canvas) {
            const { tx, ty, scale } = getShapeTransform(canvas);

            // NOTE: We save BEFORE clipping so the caller can restore() to undo the clip later.
            // The clip must remain active after this function returns.
            ctx.save();
            ctx.setTransform(1, 0, 0, 1, 0, 0);
            ctx.beginPath();

            // Build the path with transform applied, then restore transform but keep path
            ctx.save();
            ctx.translate(tx, ty);
            ctx.scale(scale, scale);

            switch (CanvasGame.currentShape) {
                case 'fish': buildFishClipPath(ctx); break;
                case 'car': buildCarClipPath(ctx); break;
                case 'dino': buildDinoClipPath(ctx); break;
                case 'butterfly': buildButterflyClipPath(ctx); break;
                default:
                    ctx.arc(0, 0, 60, 0, Math.PI * 2);
            }

            ctx.restore(); // Restore transform but path segments remain
            ctx.clip();
            // Do NOT ctx.restore() here — clip must stay active for the caller
            // The caller is responsible for calling ctx.restore() when done painting
        }

        // Apply coloring mode: in "inside-only" mode, use native canvas clip() for perfect containment
        function applyColoringMode() {
            const drawCanvas = CanvasGame.canvases.draw;
            const maskCanvas = CanvasGame.canvases.mask;
            if (!drawCanvas || !maskCanvas) return;
            const ctx = CanvasGame.canvasCtx.draw;
            ctx.globalCompositeOperation = 'source-over';
        }

        // Clip the entire draw canvas to only show inside mask (fallback compositing method)
        function clipDrawToMask() {
            const drawCanvas = CanvasGame.canvases.draw;
            const maskCanvas = CanvasGame.canvases.mask;
            if (!drawCanvas || !maskCanvas || !CanvasGame.colorInsideOnly) return;
            const ctx = CanvasGame.canvasCtx.draw;
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = drawCanvas.width;
            tempCanvas.height = drawCanvas.height;
            const tempCtx = tempCanvas.getContext('2d');
            tempCtx.drawImage(drawCanvas, 0, 0);
            ctx.clearRect(0, 0, drawCanvas.width, drawCanvas.height);
            ctx.globalCompositeOperation = 'source-over';
            ctx.drawImage(maskCanvas, 0, 0);
            ctx.globalCompositeOperation = 'source-in';
            ctx.drawImage(tempCanvas, 0, 0);
            ctx.globalCompositeOperation = 'source-over';
        }

        function toggleColoringMode() {
            const drawCanvas = CanvasGame.canvases.draw;
            const ctx = CanvasGame.canvasCtx.draw;
            if (!drawCanvas || !ctx) return;

            // Save current visible drawing before toggling
            const savedDrawing = ctx.getImageData(0, 0, drawCanvas.width, drawCanvas.height);

            CanvasGame.colorInsideOnly = !CanvasGame.colorInsideOnly;

            // Update toggle button UI
            const toggleBtn = document.getElementById('sketch-mode-toggle');
            const modeLabel = document.getElementById('sketch-mode-label');
            if (toggleBtn) {
                if (CanvasGame.colorInsideOnly) {
                    toggleBtn.textContent = '🔒';
                    toggleBtn.title = '윤곽선 안에서만 색칠';
                    toggleBtn.classList.remove('free-mode');
                } else {
                    toggleBtn.textContent = '🔓';
                    toggleBtn.title = '자유 그리기';
                    toggleBtn.classList.add('free-mode');
                }
            }
            if (modeLabel) {
                if (CanvasGame.colorInsideOnly) {
                    modeLabel.textContent = '윤곽 안만';
                    modeLabel.classList.remove('free-mode');
                } else {
                    modeLabel.textContent = '자유 그리기';
                    modeLabel.classList.add('free-mode');
                }
            }

            if (CanvasGame.colorInsideOnly) {
                // Switching TO inside-only mode: clip existing drawing to mask
                ctx.clearRect(0, 0, drawCanvas.width, drawCanvas.height);
                ctx.globalCompositeOperation = 'source-over';
                ctx.putImageData(savedDrawing, 0, 0);
                clipDrawToMask();
            } else {
                // Switching TO free mode
                ctx.clearRect(0, 0, drawCanvas.width, drawCanvas.height);
                ctx.globalCompositeOperation = 'source-over';
                ctx.putImageData(savedDrawing, 0, 0);
            }

            // Play subtle mode toggle sound
            if (Settings.soundEnabled) {
                const actx = getAudioContext();
                if (actx) {
                    const t = actx.currentTime;
                    const o = actx.createOscillator();
                    const g = actx.createGain();
                    o.type = 'sine';
                    if (CanvasGame.colorInsideOnly) {
                        o.frequency.setValueAtTime(500, t);
                        o.frequency.linearRampToValueAtTime(700, t + 0.08);
                    } else {
                        o.frequency.setValueAtTime(700, t);
                        o.frequency.linearRampToValueAtTime(500, t + 0.08);
                    }
                    g.gain.setValueAtTime(0.08, t);
                    g.gain.exponentialRampToValueAtTime(0.001, t + 0.1);
                    o.connect(g); g.connect(getAudioDest());
                    o.start(t); o.stop(t + 0.1);
                }
            }
            haptic('light');
        }

        function setupDrawing(canvas) {
            let isDrawing = false;
            let currentColor = '#FF1744';
            CanvasGame.currentColor = currentColor;
            let strokePointCount = 0; // Track points in current stroke for periodic clipping

            // Helper: begin a clipped stroke session
            function beginClippedStroke(ctx, x, y) {
                strokePointCount = 0;
                ctx.save();
                if (CanvasGame.colorInsideOnly && !CanvasGame.eraserMode) {
                    // Apply native clip path so paint CANNOT go outside the shape
                    const clipTransform = getShapeTransform(canvas);
                    ctx.beginPath();
                    ctx.save();
                    ctx.translate(clipTransform.tx, clipTransform.ty);
                    ctx.scale(clipTransform.scale, clipTransform.scale);
                    switch (CanvasGame.currentShape) {
                        case 'fish': buildFishClipPath(ctx); break;
                        case 'car': buildCarClipPath(ctx); break;
                        case 'dino': buildDinoClipPath(ctx); break;
                        case 'butterfly': buildButterflyClipPath(ctx); break;
                        default: ctx.arc(0, 0, 60, 0, Math.PI * 2);
                    }
                    ctx.restore();
                    ctx.clip();
                }
                ctx.beginPath();
                ctx.moveTo(x, y);
            }

            function endClippedStroke(ctx) {
                ctx.restore(); // removes clip
            }

            // Re-start clip after periodic enforcement
            function restartClippedStroke(ctx, x, y) {
                endClippedStroke(ctx);
                if (CanvasGame.colorInsideOnly && !CanvasGame.eraserMode) {
                    clipDrawToMask(); // enforce mask
                }
                beginClippedStroke(ctx, x, y);
            }

            function drawSegment(ctx, x, y) {
                const dpr = window.devicePixelRatio || 1;
                if (CanvasGame.eraserMode) {
                    ctx.globalCompositeOperation = 'destination-out';
                    ctx.strokeStyle = 'rgba(0,0,0,1)';
                } else {
                    ctx.globalCompositeOperation = 'source-over';
                    ctx.strokeStyle = currentColor;
                }
                ctx.lineWidth = (CanvasGame.brushSize || 8) * dpr;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.lineTo(x, y);
                ctx.stroke();
                strokePointCount++;

                // Periodic enforcement: every 60 points, re-clip to mask to catch any leakage
                if (CanvasGame.colorInsideOnly && !CanvasGame.eraserMode && strokePointCount % 60 === 0) {
                    restartClippedStroke(ctx, x, y);
                }
            }

            // Soft crayon-like sound when starting to draw
            function playDrawStartSound() {
                if (!Settings.soundEnabled) return;
                const actx = getAudioContext();
                if (!actx) return;
                const t = actx.currentTime;
                const osc = actx.createOscillator();
                const g = actx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(800 + Math.random() * 400, t);
                osc.frequency.exponentialRampToValueAtTime(400, t + 0.06);
                g.gain.setValueAtTime(0.04, t);
                g.gain.exponentialRampToValueAtTime(0.001, t + 0.06);
                osc.connect(g); g.connect(getAudioDest());
                osc.start(t); osc.stop(t + 0.06);
            }

            // Soft tick sound when selecting a color
            function playColorSelectSound() {
                if (!Settings.soundEnabled) return;
                const actx = getAudioContext();
                if (!actx) return;
                const t = actx.currentTime;
                const osc = actx.createOscillator();
                const g = actx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(1200, t);
                osc.frequency.exponentialRampToValueAtTime(800, t + 0.04);
                g.gain.setValueAtTime(0.06, t);
                g.gain.exponentialRampToValueAtTime(0.001, t + 0.04);
                osc.connect(g); g.connect(getAudioDest());
                osc.start(t); osc.stop(t + 0.04);
            }

            canvas.addEventListener('touchstart', (e) => {
                e.preventDefault();
                if (CanvasGame.stampMode) {
                    const touch = e.touches[0];
                    placeStamp(canvas, touch.clientX, touch.clientY);
                    return;
                }
                isDrawing = true;
                playDrawStartSound();
                const dpr = window.devicePixelRatio || 1;
                const rect = canvas.getBoundingClientRect();
                const touch = e.touches[0];
                const x = (touch.clientX - rect.left) * dpr;
                const y = (touch.clientY - rect.top) * dpr;
                const ctx = CanvasGame.canvasCtx.draw;
                beginClippedStroke(ctx, x, y);
            });

            canvas.addEventListener('touchmove', (e) => {
                if (!isDrawing) return;
                e.preventDefault();
                const dpr = window.devicePixelRatio || 1;
                const rect = canvas.getBoundingClientRect();
                const touch = e.touches[0];
                const x = (touch.clientX - rect.left) * dpr;
                const y = (touch.clientY - rect.top) * dpr;
                const ctx = CanvasGame.canvasCtx.draw;
                drawSegment(ctx, x, y);
            }, { passive: false });

            canvas.addEventListener('touchend', () => {
                if (!isDrawing) return;
                isDrawing = false;
                const ctx = CanvasGame.canvasCtx.draw;
                endClippedStroke(ctx);
                // Double-enforce: composite with mask to remove any paint outside outline
                if (CanvasGame.colorInsideOnly && !CanvasGame.eraserMode) {
                    clipDrawToMask();
                }
                saveCanvasState();
            });

            canvas.addEventListener('mousedown', (e) => {
                if (CanvasGame.stampMode) {
                    placeStamp(canvas, e.clientX, e.clientY);
                    return;
                }
                isDrawing = true;
                playDrawStartSound();
                const dpr = window.devicePixelRatio || 1;
                const rect = canvas.getBoundingClientRect();
                const x = (e.clientX - rect.left) * dpr;
                const y = (e.clientY - rect.top) * dpr;
                const ctx = CanvasGame.canvasCtx.draw;
                beginClippedStroke(ctx, x, y);
            });

            canvas.addEventListener('mousemove', (e) => {
                if (!isDrawing) return;
                const dpr = window.devicePixelRatio || 1;
                const rect = canvas.getBoundingClientRect();
                const x = (e.clientX - rect.left) * dpr;
                const y = (e.clientY - rect.top) * dpr;
                const ctx = CanvasGame.canvasCtx.draw;
                drawSegment(ctx, x, y);
            });

            canvas.addEventListener('mouseup', () => {
                if (!isDrawing) return;
                isDrawing = false;
                const ctx = CanvasGame.canvasCtx.draw;
                endClippedStroke(ctx);
                // Double-enforce: composite with mask to remove any paint outside outline
                if (CanvasGame.colorInsideOnly && !CanvasGame.eraserMode) {
                    clipDrawToMask();
                }
                saveCanvasState();
            });

            canvas.addEventListener('mouseleave', () => {
                if (isDrawing) {
                    const ctx = CanvasGame.canvasCtx.draw;
                    endClippedStroke(ctx);
                    // Double-enforce: composite with mask to remove any paint outside outline
                    if (CanvasGame.colorInsideOnly && !CanvasGame.eraserMode) {
                        clipDrawToMask();
                    }
                    saveCanvasState();
                }
                isDrawing = false;
            });

            window.selectColor = (color, btn) => {
                currentColor = color;
                CanvasGame.currentColor = color;
                CanvasGame.eraserMode = false;
                CanvasGame.stampMode = false;
                CanvasGame.currentStamp = null;
                playColorSelectSound();
                document.querySelectorAll('.sketch-color-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.sketch-brush-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                updateSketchCursor();
            };
        }

        function saveCanvasState() {
            const canvas = CanvasGame.canvases.draw;
            if (!canvas) return;
            const dataURL = canvas.toDataURL();
            CanvasGame.undoStack.push(dataURL);
            if (CanvasGame.undoStack.length > CanvasGame.maxUndoSteps) {
                CanvasGame.undoStack.shift();
            }
            // Check for completion celebration (debounced)
            if (CanvasGame._completionTimer) clearTimeout(CanvasGame._completionTimer);
            CanvasGame._completionTimer = setTimeout(checkSketchCompletion, 300);
        }

        function undoCanvasStroke() {
            if (CanvasGame.undoStack.length === 0) return;
            CanvasGame.undoStack.pop(); // Remove current state
            const canvas = CanvasGame.canvases.draw;
            const ctx = CanvasGame.canvasCtx.draw;
            if (!canvas || !ctx) return;

            ctx.globalCompositeOperation = 'source-over';
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (CanvasGame.undoStack.length > 0) {
                const img = new Image();
                img.onload = () => {
                    ctx.globalCompositeOperation = 'source-over';
                    ctx.drawImage(img, 0, 0);
                    // Re-apply mask mode after restoring
                    if (CanvasGame.colorInsideOnly) {
                        applyColoringMode();
                    }
                };
                img.src = CanvasGame.undoStack[CanvasGame.undoStack.length - 1];
            } else {
                // No undo states left - re-apply mask if needed
                if (CanvasGame.colorInsideOnly) {
                    applyColoringMode();
                }
            }

            // Play soft undo sound
            if (Settings.soundEnabled) {
                const actx = getAudioContext();
                if (actx) {
                    const now = actx.currentTime;
                    const o = actx.createOscillator();
                    const g = actx.createGain();
                    o.type = 'sine';
                    o.frequency.setValueAtTime(600, now);
                    o.frequency.exponentialRampToValueAtTime(350, now + 0.1);
                    g.gain.setValueAtTime(0.1, now);
                    g.gain.exponentialRampToValueAtTime(0.001, now + 0.12);
                    o.connect(g); g.connect(getAudioDest());
                    o.start(now); o.stop(now + 0.12);
                }
            }

            haptic('light');
        }

        function updateSketchCursor() {
            const drawCanvas = document.getElementById('sketch-draw-canvas');
            if (!drawCanvas) return;
            const dpr = window.devicePixelRatio || 1;
            const brushPx = (CanvasGame.brushSize || 8) * dpr;
            const cursorSize = Math.max(brushPx / dpr + 4, 16);

            if (CanvasGame.eraserMode) {
                // Eraser cursor - circle with X
                const svg = `<svg xmlns='http://www.w3.org/2000/svg' width='${cursorSize}' height='${cursorSize}' viewBox='0 0 ${cursorSize} ${cursorSize}'><circle cx='${cursorSize/2}' cy='${cursorSize/2}' r='${cursorSize/2-1}' fill='rgba(255,255,255,0.5)' stroke='%23999' stroke-width='1.5'/><line x1='${cursorSize*0.3}' y1='${cursorSize*0.3}' x2='${cursorSize*0.7}' y2='${cursorSize*0.7}' stroke='%23999' stroke-width='1.5'/><line x1='${cursorSize*0.7}' y1='${cursorSize*0.3}' x2='${cursorSize*0.3}' y2='${cursorSize*0.7}' stroke='%23999' stroke-width='1.5'/></svg>`;
                drawCanvas.style.cursor = `url("data:image/svg+xml,${svg}") ${cursorSize/2} ${cursorSize/2}, crosshair`;
            } else {
                // Brush cursor - colored circle
                const color = CanvasGame.currentColor || '#FF6B6B';
                const encodedColor = color.replace('#', '%23');
                const svg = `<svg xmlns='http://www.w3.org/2000/svg' width='${cursorSize}' height='${cursorSize}' viewBox='0 0 ${cursorSize} ${cursorSize}'><circle cx='${cursorSize/2}' cy='${cursorSize/2}' r='${cursorSize/2-1}' fill='${encodedColor}80' stroke='${encodedColor}' stroke-width='1.5'/></svg>`;
                drawCanvas.style.cursor = `url("data:image/svg+xml,${svg}") ${cursorSize/2} ${cursorSize/2}, crosshair`;
            }
        }

        function clearCanvas() {
            const ctx = CanvasGame.canvasCtx.draw;
            ctx.globalCompositeOperation = 'source-over';
            ctx.clearRect(0, 0, ctx.canvas.width, ctx.canvas.height);
            CanvasGame.undoStack = [];
            // Re-apply mask if in inside-only mode
            if (CanvasGame.colorInsideOnly) {
                applyColoringMode();
            }
        }

        // Place a stamp emoji on the draw canvas at the given position
        function placeStamp(canvas, clientX, clientY) {
            if (!CanvasGame.stampMode || !CanvasGame.currentStamp) return;
            const ctx = CanvasGame.canvasCtx.draw;
            if (!ctx) return;
            const dpr = window.devicePixelRatio || 1;
            const rect = canvas.getBoundingClientRect();
            const x = (clientX - rect.left) * dpr;
            const y = (clientY - rect.top) * dpr;
            const stampSize = (CanvasGame.brushSize || 8) * dpr * 4;

            // Check if position is inside outline (if colorInsideOnly mode)
            if (CanvasGame.colorInsideOnly) {
                const maskCanvas = CanvasGame.canvases.mask;
                if (maskCanvas) {
                    const maskCtx = maskCanvas.getContext('2d');
                    try {
                        const pixel = maskCtx.getImageData(Math.round(x), Math.round(y), 1, 1).data;
                        if (pixel[3] < 128) return; // Outside the shape
                    } catch(e) {}
                }
            }

            ctx.save();
            ctx.globalCompositeOperation = 'source-over';
            ctx.font = `${stampSize}px serif`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(CanvasGame.currentStamp, x, y);
            ctx.restore();

            saveCanvasState();
            haptic('pop');

            // Play stamp place sound - cheerful pop
            if (Settings.soundEnabled) {
                const actx = getAudioContext();
                if (actx) {
                    const t = actx.currentTime;
                    const o = actx.createOscillator();
                    const g = actx.createGain();
                    o.type = 'sine';
                    o.frequency.setValueAtTime(600 + Math.random() * 400, t);
                    o.frequency.exponentialRampToValueAtTime(1200, t + 0.05);
                    o.frequency.exponentialRampToValueAtTime(800, t + 0.12);
                    g.gain.setValueAtTime(0.1, t);
                    g.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
                    o.connect(g); g.connect(getAudioDest());
                    o.start(t); o.stop(t + 0.15);
                }
            }

            // Visual feedback: show stamp growing animation at tap point
            const drawScreen = canvas.closest('.sketch-draw-screen') || document.getElementById('canvas-area');
            if (drawScreen) {
                const feedback = document.createElement('div');
                const cssX = clientX - rect.left;
                const cssY = clientY - rect.top;
                feedback.textContent = CanvasGame.currentStamp;
                feedback.style.cssText = `position:absolute;left:${cssX}px;top:${cssY}px;font-size:${stampSize/dpr}px;pointer-events:none;z-index:50;transform:translate(-50%,-50%) scale(0);animation:stampPlace 0.4s cubic-bezier(0.34,1.56,0.64,1) forwards;opacity:0.7;`;
                drawScreen.appendChild(feedback);
                setTimeout(() => feedback.remove(), 500);
            }
        }

        // Check how much of the outline has been filled and celebrate when >60%
        function checkSketchCompletion() {
            if (!CanvasGame.running || CanvasGame._celebrated) return;
            const maskCanvas = CanvasGame.canvases.mask;
            const drawCanvas = CanvasGame.canvases.draw;
            if (!maskCanvas || !drawCanvas) return;

            try {
                const maskCtx = maskCanvas.getContext('2d');
                const drawCtx = drawCanvas.getContext('2d');
                const w = maskCanvas.width;
                const h = maskCanvas.height;
                if (w < 50 || h < 50) return;

                const maskData = maskCtx.getImageData(0, 0, w, h).data;
                const drawData = drawCtx.getImageData(0, 0, w, h).data;

                let maskPixels = 0;
                let filledPixels = 0;

                // Sample every 4th pixel for performance
                for (let i = 3; i < maskData.length; i += 16) {
                    if (maskData[i] > 128) {
                        maskPixels++;
                        if (drawData[i] > 10) filledPixels++;
                    }
                }

                if (maskPixels > 0) {
                    const fillPercent = filledPixels / maskPixels;
                    // Update fill progress bar
                    const fillBar = document.getElementById('sketch-fill-bar');
                    const fillLabel = document.getElementById('sketch-fill-label');
                    const pct = Math.min(Math.round(fillPercent * 100), 100);
                    if (fillBar) fillBar.style.width = pct + '%';
                    if (fillLabel) fillLabel.textContent = pct + '%';
                    // Change bar color based on progress
                    if (fillBar) {
                        if (pct >= 80) fillBar.style.background = 'linear-gradient(90deg, #66BB6A, #43A047, #00C853)';
                        else if (pct >= 50) fillBar.style.background = 'linear-gradient(90deg, #FFB74D, #FF9800, #F57C00)';
                    }
                    if (fillPercent > 0.55) {
                        CanvasGame._celebrated = true;
                        showSketchCompletionCelebration();
                    }
                }
            } catch(e) { /* ignore cross-origin or other canvas errors */ }
        }

        function showSketchCompletionCelebration() {
            haptic('success');

            // Play celebration jingle
            if (Settings.soundEnabled) {
                const ctx = getAudioContext();
                if (ctx) {
                    const t = ctx.currentTime;
                    const dest = getAudioDest();
                    const notes = [523, 659, 784, 1047];
                    notes.forEach((f, i) => {
                        const o = ctx.createOscillator();
                        const g = ctx.createGain();
                        o.type = 'sine';
                        o.frequency.setValueAtTime(f, t + i * 0.12);
                        g.gain.setValueAtTime(0, t + i * 0.12);
                        g.gain.linearRampToValueAtTime(0.2, t + i * 0.12 + 0.03);
                        g.gain.exponentialRampToValueAtTime(0.001, t + i * 0.12 + 0.3);
                        o.connect(g); g.connect(dest);
                        o.start(t + i * 0.12); o.stop(t + i * 0.12 + 0.3);
                    });
                }
            }

            // Show floating celebration text
            const area = document.getElementById('canvas-area');
            if (!area) return;
            const celebDiv = document.createElement('div');
            celebDiv.style.cssText = 'position:absolute;top:15%;left:50%;transform:translateX(-50%);z-index:500;pointer-events:none;text-align:center;animation:stageUpPop 0.7s cubic-bezier(0.34,1.56,0.64,1),stageUpFade 3s ease forwards;';
            celebDiv.innerHTML = `
                <div style="font-size:clamp(3rem,10vw,5rem);margin-bottom:8px;">🎉</div>
                <div style="font-size:clamp(1.5rem,5vw,2.5rem);font-weight:900;color:#FF6D00;text-shadow:0 2px 8px rgba(255,109,0,0.3);">잘했어요!</div>
                <div style="font-size:clamp(0.9rem,2.5vw,1.2rem);font-weight:700;color:#666;margin-top:4px;">✨ 마법! 버튼을 눌러보세요 ✨</div>
            `;
            area.appendChild(celebDiv);

            // Sparkle particles around the celebration
            const sparkles = ['✨', '⭐', '🌟', '💫', '🎊'];
            for (let i = 0; i < 12; i++) {
                const sp = document.createElement('div');
                const angle = (i / 12) * Math.PI * 2;
                const dist = 80 + Math.random() * 120;
                const dx = Math.cos(angle) * dist;
                const dy = Math.sin(angle) * dist;
                sp.textContent = sparkles[i % sparkles.length];
                sp.style.cssText = `position:absolute;top:20%;left:50%;font-size:${20+Math.random()*16}px;pointer-events:none;z-index:501;animation:cardSparkleBurst 1.5s ease-out ${i*0.04}s forwards;--sx:${dx}px;--sy:${dy}px;`;
                area.appendChild(sp);
                setTimeout(() => sp.remove(), 1600);
            }

            setTimeout(() => celebDiv.remove(), 3200);

            // Pulse the magic button to draw attention
            const magicBtn = document.querySelector('.sketch-magic-btn');
            if (magicBtn) {
                magicBtn.style.animation = 'startButtonPulse 1s ease-in-out infinite';
                magicBtn.style.transform = 'scale(1.08)';
            }
        }

        function startAquarium() {
            const area = document.getElementById('canvas-area');

            // Play magic sparkle sound
            if (Settings.soundEnabled) {
                const ctx = getAudioContext();
                if (ctx) {
                    const now = ctx.currentTime;
                    const dest = getAudioDest();
                    // Ascending magic harp glissando
                    const magicNotes = [523, 659, 784, 988, 1175, 1397, 1568, 2093];
                    magicNotes.forEach((freq, i) => {
                        const t = now + i * 0.06;
                        const osc = ctx.createOscillator();
                        const gain = ctx.createGain();
                        osc.type = 'sine';
                        osc.frequency.setValueAtTime(freq, t);
                        gain.gain.setValueAtTime(0, t);
                        gain.gain.linearRampToValueAtTime(0.18, t + 0.02);
                        gain.gain.exponentialRampToValueAtTime(0.001, t + 0.25);
                        osc.connect(gain); gain.connect(dest);
                        osc.start(t); osc.stop(t + 0.25);
                    });
                    // Sparkle shimmer
                    const shimBuf = ctx.createBuffer(1, ctx.sampleRate * 0.5, ctx.sampleRate);
                    const shimData = shimBuf.getChannelData(0);
                    for (let j = 0; j < shimData.length; j++) shimData[j] = (Math.random() * 2 - 1) * Math.pow(1 - j / shimData.length, 1.5) * 0.2;
                    const shimSrc = ctx.createBufferSource(); shimSrc.buffer = shimBuf;
                    const shimFlt = ctx.createBiquadFilter(); shimFlt.type = 'highpass'; shimFlt.frequency.setValueAtTime(4000, now);
                    const shimG = ctx.createGain();
                    shimG.gain.setValueAtTime(0.08, now + 0.2); shimG.gain.exponentialRampToValueAtTime(0.001, now + 0.6);
                    shimSrc.connect(shimFlt); shimFlt.connect(shimG); shimG.connect(dest);
                    shimSrc.start(now + 0.2); shimSrc.stop(now + 0.6);
                }
            }

            // Show sparkle transition overlay
            const sparkleOverlay = document.createElement('div');
            sparkleOverlay.style.cssText = 'position:absolute;inset:0;z-index:500;background:radial-gradient(circle at center,rgba(255,255,255,0.95),rgba(200,220,255,0.9));display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;animation:sparkleTransIn 0.8s ease-out forwards;pointer-events:none;';
            sparkleOverlay.innerHTML = `
                <div style="font-size:clamp(5rem,18vw,9rem);animation:stageUpSpin 0.8s ease;">✨</div>
                <div style="font-size:clamp(1.5rem,5vw,2.5rem);font-weight:900;color:#7B1FA2;animation:stageUpPop 0.7s cubic-bezier(0.34, 1.56, 0.64, 1);">마법 시작!</div>
            `;
            // Add sparkle particles floating around
            const sparkleColors = ['#FFD700', '#FF6B6B', '#7B1FA2', '#2196F3', '#4CAF50', '#FF9800'];
            for (let i = 0; i < 20; i++) {
                const sp = document.createElement('div');
                const c = sparkleColors[Math.floor(Math.random() * sparkleColors.length)];
                sp.style.cssText = `position:absolute;left:${Math.random()*100}%;top:${Math.random()*100}%;width:${4+Math.random()*8}px;height:${4+Math.random()*8}px;border-radius:50%;background:${c};box-shadow:0 0 8px ${c};animation:sparkleGlow ${0.5+Math.random()*0.8}s ease-in-out ${Math.random()*0.5}s infinite;pointer-events:none;`;
                sparkleOverlay.appendChild(sp);
            }
            area.appendChild(sparkleOverlay);

            // After sparkle transition, build the actual aquarium
            setTimeout(() => {
                sparkleOverlay.style.animation = 'screenFadeOut 0.3s ease forwards';
                setTimeout(() => {
                    sparkleOverlay.remove();
                }, 300);
            }, 900);

            // Delay aquarium build slightly to let transition play
            setTimeout(() => { buildAquarium(); }, 600);
        }

        function buildAquarium() {
            const area = document.getElementById('canvas-area');
            // Remove everything except the sparkle overlay (which fades on its own)
            const sparkle = area.querySelector('[style*="z-index:500"]');
            Array.from(area.children).forEach(child => {
                if (child !== sparkle) child.remove();
            });

            const aquarium = document.createElement('div');
            aquarium.className = 'aquarium-screen';

            // Shape-specific background setup
            const shapeId = CanvasGame.currentShape;
            const bgConfigs = {
                fish: { className: 'aquarium-bg', extraStyle: '' },
                butterfly: { className: 'aquarium-bg', extraStyle: 'background:linear-gradient(180deg,#87CEEB 0%,#B3E5FC 30%,#E1F5FE 60%,#FFFDE7 90%,#C8E6C9 100%) !important;' },
                car: { className: 'aquarium-bg', extraStyle: 'background:linear-gradient(180deg,#81D4FA 0%,#B3E5FC 20%,#E3F2FD 50%,#90A4AE 80%,#78909C 100%) !important;' },
                dino: { className: 'aquarium-bg', extraStyle: 'background:linear-gradient(180deg,#A5D6A7 0%,#66BB6A 20%,#388E3C 50%,#2E7D32 80%,#1B5E20 100%) !important;' }
            };
            const bgConfig = bgConfigs[shapeId] || bgConfigs.fish;

            const bg = document.createElement('div');
            bg.className = bgConfig.className;
            if (bgConfig.extraStyle) bg.style.cssText = bgConfig.extraStyle;
            aquarium.appendChild(bg);

            // Light rays from surface
            const raysDiv = document.createElement('div');
            raysDiv.style.cssText = 'position:absolute;inset:0;z-index:2;overflow:hidden;pointer-events:none;';
            for (let i = 0; i < 5; i++) {
                const ray = document.createElement('div');
                const left = 10 + i * 20;

                let speed = 1.0 + Math.random() * 0.6;
                let goingRight = true;
                let currentScaleX = 1;
                let targetScaleX = 1;
                const flipSpeed = 0.12; // smooth flip interpolation

                function animateSwim() {
                    if (!CanvasGame.aquariumAnimId) return;
                    const maxX = window.innerWidth + 100;
                    const minX = -250;

                    if (goingRight) {
                        posX += speed;
                        if (posX > maxX) {
                            goingRight = false;
                            targetScaleX = -1;
                            const newTop = Math.random() * 40 + 20;

                            goingRight = true;
                            targetScaleX = 1;
                            const newTop = Math.random() * 40 + 20;
                            drawing.style.top = newTop + '%';
                        }
                    }

                    // Smooth interpolation for head direction flip
                    if (currentScaleX !== targetScaleX) {
                        currentScaleX += (targetScaleX - currentScaleX) * flipSpeed;
                        if (Math.abs(currentScaleX - targetScaleX) < 0.05) currentScaleX = targetScaleX;
                    }

                    // Smooth dual-sine bobbing + gentle rotation for natural, lively motion
                    const bob = Math.sin(Date.now() / 800) * 8 + Math.sin(Date.now() / 1200) * 3;
                    const tilt = Math.sin(Date.now() / 1500) * 4 + Math.sin(Date.now() / 2200) * 2;
                    const pulse = 1 + Math.sin(Date.now() / 2000) * 0.03;
                    drawing.style.left = posX + 'px';
                    drawing.style.transform = `scaleX(${currentScaleX}) translateY(${bob}px) rotate(${tilt}deg) scale(${pulse})`;

                    // Sparkle trail particles (emit every ~45 frames)
                    if (!animateSwim._fc) animateSwim._fc = 0;
                    animateSwim._fc++;
                    if (animateSwim._fc % 45 === 0 && posX > -100 && posX < window.innerWidth + 50) {
                        const sp = document.createElement('div');
                        const sparkChars = ['✦', '✧', '·', '⋆'];
                        const trailX = posX + (goingRight ? -10 : 100);
                        const trailY = parseFloat(drawing.style.top) / 100 * window.innerHeight + bob;
                        sp.textContent = sparkChars[Math.floor(Math.random() * sparkChars.length)];
                        sp.style.cssText = `position:absolute;left:${trailX}px;top:${trailY}px;font-size:${8+Math.random()*10}px;color:rgba(255,215,0,0.7);pointer-events:none;z-index:9;animation:aquaSparkleTrail 1s ease-out forwards;text-shadow:0 0 6px rgba(255,215,0,0.5);`;
                        aquarium.appendChild(sp);
                        setTimeout(() => sp.remove(), 1000);
                    }

                    CanvasGame.aquariumAnimId = requestAnimationFrame(animateSwim);
                }

                CanvasGame.aquariumAnimId = requestAnimationFrame(animateSwim);

                // Add a second drawing with different speed and height (created once, not on every frame)
                if (Math.random() > 0.3) {
                    CanvasGame.secondDrawTimer = setTimeout(() => {
                        CanvasGame.secondDrawTimer = null;
                        const drawing2 = document.createElement('div');
                        drawing2.className = 'aquarium-drawing';
                        const img2 = document.createElement('img');
                        img2.src = capturedImageURL;
                        img2.style.cssText = 'width:clamp(110px,32vw,200px);height:auto;pointer-events:none;';
                        drawing2.appendChild(img2);
                        drawing2.style.top = Math.random() * 35 + 35 + '%';
                        drawing2.style.left = (window.innerWidth + 100) + 'px';
                        aquarium.appendChild(drawing2);

                        let posX2 = window.innerWidth + 100;
                        let speed2 = (0.5 + Math.random() * 0.4);
                        let goingRight2 = false;
                        let currentScaleX2 = -1;
                        let targetScaleX2 = -1;

                        function animateSwim2() {
                            if (!CanvasGame.aquariumAnimId2) return;
                            const maxX = window.innerWidth + 100;
                            const minX = -250;

                            if (goingRight2) {
                                posX2 += speed2;
                                if (posX2 > maxX) {
                                    goingRight2 = false;
                                    targetScaleX2 = -1;
                                    const newTop = Math.random() * 35 + 35;
                                    drawing2.style.top = newTop + '%';
                                }
                            } else {
                                posX2 -= speed2;
                                if (posX2 < minX) {
                                    goingRight2 = true;
                                    targetScaleX2 = 1;
                                    const newTop = Math.random() * 35 + 35;
                                    drawing2.style.top = newTop + '%';
                                }
                            }

                            // Smooth interpolation for head direction flip
                            if (currentScaleX2 !== targetScaleX2) {
                                currentScaleX2 += (targetScaleX2 - currentScaleX2) * 0.12;
                                if (Math.abs(currentScaleX2 - targetScaleX2) < 0.05) currentScaleX2 = targetScaleX2;
                            }

                            const bob2 = Math.sin(Date.now() / 600) * 6 + Math.sin(Date.now() / 1000) * 2;
                            const tilt2 = Math.sin(Date.now() / 1300) * 3 + Math.sin(Date.now() / 1800) * 2;
                            const pulse2 = 1 + Math.sin(Date.now() / 1700) * 0.03;
                            drawing2.style.left = posX2 + 'px';
                            drawing2.style.transform = `scaleX(${currentScaleX2}) translateY(${bob2}px) rotate(${tilt2}deg) scale(${pulse2})`;

                            CanvasGame.aquariumAnimId2 = requestAnimationFrame(animateSwim2);
                        }

                        CanvasGame.aquariumAnimId2 = requestAnimationFrame(animateSwim2);
                    }, 1500);
                }

                // Add jellyfish only for fish/aquarium environments
                if (shapeId === 'fish') {
                    for (let j = 0; j < 2; j++) {
                        const jelly = document.createElement('div');
                        jelly.className = 'aquarium-jellyfish';
                        jelly.textContent = '🪼';
                        jelly.style.left = Math.random() * 80 + 10 + '%';
                        jelly.style.top = Math.random() * 40 - 10 + '%';
                        jelly.style.animationDelay = (Math.random() * 4) + 's';
                        jelly.style.animationDuration = (6 + Math.random() * 4) + 's';
                        aquarium.appendChild(jelly);
                    }
                }
            }

            // Ambient underwater bubble sound loop
            if (Settings.soundEnabled) {
                const actx = getAudioContext();
                if (actx) {
                    const dest = getAudioDest();
                    // Create a repeating gentle bubble sound loop
                    function playAquaBubble() {
                        if (!CanvasGame.aquariumAnimId) return;
                        const t = actx.currentTime;
                        const freq = 800 + Math.random() * 600;
                        const o = actx.createOscillator();
                        const g = actx.createGain();
                        o.type = 'sine';
                        o.frequency.setValueAtTime(freq, t);
                        o.frequency.exponentialRampToValueAtTime(freq * 0.5, t + 0.15);
                        g.gain.setValueAtTime(0.001, t);
                        g.gain.linearRampToValueAtTime(0.04, t + 0.02);
                        g.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
                        o.connect(g); g.connect(dest);
                        o.start(t); o.stop(t + 0.15);
                        // Schedule next bubble randomly
                        CanvasGame.aquaBubbleTimer = setTimeout(playAquaBubble, 800 + Math.random() * 2000);
                    }
                    CanvasGame.aquaBubbleTimer = setTimeout(playAquaBubble, 500);

                    // Gentle ocean wave ambient drone (filtered noise fading in/out)
                    if (shapeId === 'fish') {
                        const waveDur = 6.0;
                        const waveBuf = actx.createBuffer(1, actx.sampleRate * waveDur, actx.sampleRate);
                        const waveData = waveBuf.getChannelData(0);
                        // Generate gentle noise with slow amplitude modulation
                        for (let s = 0; s < waveData.length; s++) {
                            const t2 = s / actx.sampleRate;
                            const envelope = Math.sin(t2 / waveDur * Math.PI); // fade in/out
                            waveData[s] = (Math.random() * 2 - 1) * 0.015 * envelope;
                        }
                        function playOceanWave() {
                            if (!CanvasGame.aquariumAnimId) return;
                            const src = actx.createBufferSource();
                            src.buffer = waveBuf;
                            const lpf = actx.createBiquadFilter();
                            lpf.type = 'lowpass';
                            lpf.frequency.setValueAtTime(400, actx.currentTime);
                            lpf.Q.setValueAtTime(0.5, actx.currentTime);
                            const wg = actx.createGain();
                            wg.gain.setValueAtTime(0.12, actx.currentTime);
                            src.connect(lpf); lpf.connect(wg); wg.connect(dest);
                            src.start();
                            src.onended = () => {
                                CanvasGame.oceanWaveTimer = setTimeout(playOceanWave, 500 + Math.random() * 1000);
                            };
                        }
                        CanvasGame.oceanWaveTimer = setTimeout(playOceanWave, 1000);
                    }
                }
            }

            // Home button for aquarium screen
            const aquaHomeBtn = document.createElement('button');
            aquaHomeBtn.className = 'aquarium-home-btn';
            aquaHomeBtn.textContent = '🏠';
            aquaHomeBtn.onclick = goHome;
            aquarium.appendChild(aquaHomeBtn);

            const redrawBtn = document.createElement('button');
            redrawBtn.className = 'aquarium-redraw-btn';
            redrawBtn.textContent = '🎨';
            redrawBtn.title = '다시 그리기';
            redrawBtn.onclick = () => { haptic('light'); initCanvasGame(); };
            aquarium.appendChild(redrawBtn);

            area.appendChild(aquarium);
        }

        function cleanupCanvasGame() {
            CanvasGame.running = false;
            CanvasGame.paused = false;
            CanvasGame.currentShape = null;
            CanvasGame.colorInsideOnly = true; // reset to default
            CanvasGame.canvases.mask = null;
            CanvasGame.canvasCtx.mask = null;

            if (CanvasGame.aquariumAnimId) {
                cancelAnimationFrame(CanvasGame.aquariumAnimId);
                CanvasGame.aquariumAnimId = null;
            }
            if (CanvasGame.aquariumAnimId2) {
                cancelAnimationFrame(CanvasGame.aquariumAnimId2);
                CanvasGame.aquariumAnimId2 = null;
            }
            if (CanvasGame.secondDrawTimer) {
                clearTimeout(CanvasGame.secondDrawTimer);
                CanvasGame.secondDrawTimer = null;
            }
            if (CanvasGame.aquaBubbleTimer) {
                clearTimeout(CanvasGame.aquaBubbleTimer);
                CanvasGame.aquaBubbleTimer = null;
            }
            if (CanvasGame.oceanWaveTimer) {
                clearTimeout(CanvasGame.oceanWaveTimer);
                CanvasGame.oceanWaveTimer = null;
            }

            if (CanvasGame.resizeHandler) {
                window.removeEventListener('resize', CanvasGame.resizeHandler);
                CanvasGame.resizeHandler = null;
            }

            // Restore home button, hide pause button
            const homeBtn = document.getElementById('home-btn-3');
            if (homeBtn) homeBtn.style.display = 'flex';
            const pauseBtn = document.getElementById('canvas-pause-btn');
            if (pauseBtn) { pauseBtn.style.display = 'none'; pauseBtn.textContent = '⏸️'; }

            // Remove pause overlay if exists
            const pauseOverlay = document.querySelector('.canvas-pause-overlay');
            if (pauseOverlay) pauseOverlay.remove();

            const area = document.getElementById('canvas-area');
            if (area) area.innerHTML = '';
        }

        function toggleCanvasPause() {
            if (CanvasGame.paused) {
                // Resume
                CanvasGame.paused = false;
                const pauseOverlay = document.querySelector('.canvas-pause-overlay');
                if (pauseOverlay) pauseOverlay.remove();
                const pauseBtn = document.getElementById('canvas-pause-btn');
                if (pauseBtn) pauseBtn.textContent = '⏸️';
            } else {
                // Pause
                CanvasGame.paused = true;
                const pauseBtn = document.getElementById('canvas-pause-btn');
                if (pauseBtn) pauseBtn.textContent = '▶️';

                // Show pause overlay
                const gameScreen = document.getElementById('game-canvas');
                const overlay = document.createElement('div');
                overlay.className = 'canvas-pause-overlay pause-overlay';
                overlay.innerHTML = `
                    <div class="pause-title">⏸️ 일시정지</div>
                    <button class="pause-btn-action pause-btn-continue" onclick="toggleCanvasPause()">계속하기 ▶️</button>
                    <button class="pause-btn-action pause-btn-home" onclick="goHome()">홈으로 🏠</button>
                `;
                gameScreen.appendChild(overlay);
            }
        }

        /* ===== Card Ripple Effect + Enhanced Touch Feedback ===== */
        document.addEventListener('touchstart', function(e) {
            const card = e.target.closest('.game-card, .animal-card, .sketch-option');
            if (!card) return;
            const rect = card.getBoundingClientRect();
            const touch = e.touches[0];
            const x = ((touch.clientX - rect.left) / rect.width * 100).toFixed(1);
            const y = ((touch.clientY - rect.top) / rect.height * 100).toFixed(1);
            card.style.setProperty('--tap-x', x + '%');
            card.style.setProperty('--tap-y', y + '%');

            // Create expanding ripple circle at tap point
            const ripple = document.createElement('div');
            const rippleX = touch.clientX - rect.left;
            const rippleY = touch.clientY - rect.top;
            const maxDim = Math.max(rect.width, rect.height) * 2;
            ripple.style.cssText = `position:absolute;left:${rippleX}px;top:${rippleY}px;width:${maxDim}px;height:${maxDim}px;border-radius:50%;background:rgba(255,255,255,0.35);transform:translate(-50%,-50%) scale(0);animation:rippleExpand 0.5s ease-out forwards;pointer-events:none;z-index:10;`;
            card.style.position = 'relative';
            card.style.overflow = 'hidden';
            card.appendChild(ripple);
            setTimeout(() => ripple.remove(), 600);
        }, { passive: true });

        // Add ripple expand keyframe
        if (!document.getElementById('ripple-expand-style')) {
            const rs = document.createElement('style');
            rs.id = 'ripple-expand-style';
            rs.textContent = `
                @keyframes rippleExpand {
                    0% { transform: translate(-50%,-50%) scale(0); opacity: 1; }
                    100% { transform: translate(-50%,-50%) scale(1); opacity: 0; }
                }
            `;
            document.head.appendChild(rs);
        }

        // Add subtle tap sound for all interactive elements
        document.addEventListener('touchstart', function(e) {
            const btn = e.target.closest('button, .game-card, .animal-card, .sketch-option');
            if (!btn) return;
            if (!Settings.soundEnabled) return;
            const ctx = getAudioContext();
            if (!ctx) return;
            const now = ctx.currentTime;
            // Very light tap click sound
            const osc = ctx.createOscillator();
            const g = ctx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(1800, now);
            osc.frequency.exponentialRampToValueAtTime(1200, now + 0.03);
            g.gain.setValueAtTime(0.04, now);
            g.gain.exponentialRampToValueAtTime(0.001, now + 0.04);
            osc.connect(g); g.connect(getAudioDest());
            osc.start(now); osc.stop(now + 0.04);
        }, { passive: true });

        /* ===== Idle Breathing Animation for Menu Cards ===== */
        function addCardBreathing() {
            if (!document.getElementById('breathing-style')) {
                const s = document.createElement('style');
                s.id = 'breathing-style';
                s.textContent = `
                    @keyframes cardBreathe {
                        0%, 100% { transform: translateY(0) scale(1); }
                        50% { transform: translateY(-4px) scale(1.01); }
                    }
                    .game-card { animation: cardBreathe 3s ease-in-out infinite, cardGlowPulse 3.2s ease-in-out infinite; }
                    .game-card:nth-child(2) { animation-delay: 0.8s, 1.3s; }
                    .game-card:nth-child(3) { animation-delay: 1.6s, 2.6s; }
                `;
                document.head.appendChild(s);
            }
        }

        /* ===== Initialize ===== */
        buildMenu();
        addCardBreathing();
    </script>
</body>
</html>
