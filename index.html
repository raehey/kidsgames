        function updateAnimalStage() {
            const stageEl = document.getElementById('animal-stage');
            if (stageEl) {
                stageEl.textContent = `${AnimalGame.stage}단계`;
            }
        }

        /* ===== Web Audio API: 동물 소리 합성 ===== */

        function playAnimalSound(animalId) {
            const ctx = getAudioContext();
            if (!ctx) return;
            const now = ctx.currentTime;

            // 유틸: 오실레이터+게인 빠른 생성
            function makeOsc(type, freq, t, dur, vol) {
                const o = ctx.createOscillator();
                const g = ctx.createGain();
                o.type = type;
                if (typeof freq === 'number') o.frequency.setValueAtTime(freq, t);
                g.gain.setValueAtTime(vol || 0.3, t);
                g.gain.exponentialRampToValueAtTime(0.001, t + dur);
                o.connect(g); g.connect(ctx.destination);
                o.start(t); o.stop(t + dur);
                return o;
            }

            switch (animalId) {

                case 'dog': {
                    // 멍멍! - 2회 짖음, 급격한 주파수 변화
                    for (let i = 0; i < 2; i++) {
                        const t = now + i * 0.35;
                        const o = ctx.createOscillator();
                        const g = ctx.createGain();
                        const flt = ctx.createBiquadFilter();
                        o.type = 'sawtooth';
                        // 빠르게 올라갔다 내려오는 짖는 패턴
                        o.frequency.setValueAtTime(200, t);
                        o.frequency.linearRampToValueAtTime(450, t + 0.04);
                        o.frequency.setValueAtTime(400, t + 0.06);
                        o.frequency.linearRampToValueAtTime(250, t + 0.18);
                        flt.type = 'lowpass';
                        flt.frequency.setValueAtTime(1200, t);
                        flt.Q.setValueAtTime(2, t);
                        g.gain.setValueAtTime(0, t);
                        g.gain.linearRampToValueAtTime(0.4, t + 0.02);
                        g.gain.setValueAtTime(0.4, t + 0.06);
                        g.gain.exponentialRampToValueAtTime(0.001, t + 0.22);
                        o.connect(flt); flt.connect(g); g.connect(ctx.destination);
                        o.start(t); o.stop(t + 0.22);
                    }
                    break;
                }

                case 'cat': {
                    // 야~옹 - 부드러운 상승 후 하강, 2연속
                    for (let i = 0; i < 2; i++) {
                        const t = now + i * 0.7;
                        const o = ctx.createOscillator();
                        const g = ctx.createGain();
                        o.type = 'sine';
                        o.frequency.setValueAtTime(250, t);
                        o.frequency.linearRampToValueAtTime(520, t + 0.15);
                        o.frequency.setValueAtTime(520, t + 0.25);
                        o.frequency.linearRampToValueAtTime(380, t + 0.45);
                        o.frequency.linearRampToValueAtTime(280, t + 0.55);
                        g.gain.setValueAtTime(0, t);
                        g.gain.linearRampToValueAtTime(0.3, t + 0.04);
                        g.gain.setValueAtTime(0.28, t + 0.25);
                        g.gain.exponentialRampToValueAtTime(0.001, t + 0.58);
                        o.connect(g); g.connect(ctx.destination);
                        o.start(t); o.stop(t + 0.58);
                        // 비브라토
                        const v = ctx.createOscillator();
                        const vg = ctx.createGain();
                        v.frequency.setValueAtTime(5.5, t);
                        vg.gain.setValueAtTime(12, t);
                        v.connect(vg); vg.connect(o.frequency);
                        v.start(t); v.stop(t + 0.58);
                    }
                    break;
                }

                case 'lion': {
                    // 으르렁~ - 아주 낮은 떨리는 소리
                    const dur = 1.4;
                    const o = ctx.createOscillator();
                    const g = ctx.createGain();
                    const flt = ctx.createBiquadFilter();
                    o.type = 'sawtooth';
                    o.frequency.setValueAtTime(70, now);
                    o.frequency.linearRampToValueAtTime(110, now + 0.3);
                    o.frequency.linearRampToValueAtTime(85, now + 0.8);
                    o.frequency.linearRampToValueAtTime(60, now + dur);
                    flt.type = 'lowpass'; flt.frequency.setValueAtTime(500, now);
                    g.gain.setValueAtTime(0, now);
                    g.gain.linearRampToValueAtTime(0.4, now + 0.15);
                    g.gain.setValueAtTime(0.4, now + 0.5);
                    g.gain.exponentialRampToValueAtTime(0.001, now + dur);
                    o.connect(flt); flt.connect(g); g.connect(ctx.destination);
                    o.start(now); o.stop(now + dur);
                    // 떨림
                    const tr = ctx.createOscillator();
                    const trg = ctx.createGain();
                    tr.frequency.setValueAtTime(7, now); trg.gain.setValueAtTime(18, now);
                    tr.connect(trg); trg.connect(o.frequency);
                    tr.start(now); tr.stop(now + dur);
                    // 서브베이스
                    makeOsc('sine', 45, now, dur, 0.2);
                    // 숨소리 노이즈
                    const bs = Math.floor(ctx.sampleRate * dur);
                    const nb = ctx.createBuffer(1, bs, ctx.sampleRate);
                    const nd = nb.getChannelData(0);
                    for (let i = 0; i < bs; i++) { const e = Math.min(1, i/(ctx.sampleRate*0.2)) * Math.max(0, 1-(i-bs*0.6)/(bs*0.4)); nd[i] = (Math.random()*2-1)*0.12*e; }
                    const ns = ctx.createBufferSource(); ns.buffer = nb;
                    const ng = ctx.createGain(); ng.gain.setValueAtTime(0.15, now);
                    const lp = ctx.createBiquadFilter(); lp.type='lowpass'; lp.frequency.setValueAtTime(350, now);
                    ns.connect(ng); ng.connect(lp); lp.connect(ctx.destination);
                    ns.start(now); ns.stop(now + dur);
                    break;
                }

                case 'cow': {
                    // 음~메~ - 2음절, 낮은 음에서 올라갔다 길게 유지
                    const dur = 1.6;
                    const o = ctx.createOscillator();
                    const g = ctx.createGain();
                    const flt = ctx.createBiquadFilter();
                    o.type = 'sawtooth';
                    o.frequency.setValueAtTime(110, now);
                    o.frequency.linearRampToValueAtTime(155, now + 0.25);
                    o.frequency.setValueAtTime(155, now + 0.7);
                    o.frequency.linearRampToValueAtTime(140, now + 1.1);
                    o.frequency.linearRampToValueAtTime(100, now + dur);
                    flt.type = 'lowpass'; flt.frequency.setValueAtTime(600, now); flt.Q.setValueAtTime(1.5, now);
                    g.gain.setValueAtTime(0, now);
                    g.gain.linearRampToValueAtTime(0.35, now + 0.08);
                    g.gain.setValueAtTime(0.35, now + 0.7);
                    g.gain.exponentialRampToValueAtTime(0.001, now + dur);
                    o.connect(flt); flt.connect(g); g.connect(ctx.destination);
                    o.start(now); o.stop(now + dur);
                    // 비브라토
                    const v = ctx.createOscillator(); const vg = ctx.createGain();
                    v.frequency.setValueAtTime(4, now); vg.gain.setValueAtTime(6, now);
                    v.connect(vg); vg.connect(o.frequency);
                    v.start(now); v.stop(now + dur);
                    // 서브
                    makeOsc('sine', 55, now, dur, 0.18);
                    break;
                }

                case 'chicken': {
                    // 꼬-끼-오~ - 3음절, 점점 높아졌다 길게
                    // 꼬
                    const o1 = ctx.createOscillator(); const g1 = ctx.createGain();
                    o1.type = 'sawtooth';
                    o1.frequency.setValueAtTime(300, now);
                    o1.frequency.linearRampToValueAtTime(500, now + 0.1);
                    g1.gain.setValueAtTime(0, now);
                    g1.gain.linearRampToValueAtTime(0.3, now + 0.02);
                    g1.gain.exponentialRampToValueAtTime(0.001, now + 0.14);
                    o1.connect(g1); g1.connect(ctx.destination);
                    o1.start(now); o1.stop(now + 0.14);
                    // 끼
                    const o2 = ctx.createOscillator(); const g2 = ctx.createGain();
                    o2.type = 'sawtooth';
                    o2.frequency.setValueAtTime(550, now + 0.18);
                    o2.frequency.linearRampToValueAtTime(800, now + 0.28);
                    g2.gain.setValueAtTime(0, now + 0.18);
                    g2.gain.linearRampToValueAtTime(0.3, now + 0.2);
                    g2.gain.exponentialRampToValueAtTime(0.001, now + 0.35);
                    o2.connect(g2); g2.connect(ctx.destination);
                    o2.start(now + 0.18); o2.stop(now + 0.35);
                    // 오~~~ (길게 높은 음)
                    const o3 = ctx.createOscillator(); const g3 = ctx.createGain();
                    const flt = ctx.createBiquadFilter();
                    o3.type = 'sawtooth';
                    o3.frequency.setValueAtTime(850, now + 0.4);
                    o3.frequency.linearRampToValueAtTime(950, now + 0.55);
                    o3.frequency.linearRampToValueAtTime(700, now + 0.9);
                    o3.frequency.linearRampToValueAtTime(450, now + 1.2);
                    flt.type = 'bandpass'; flt.frequency.setValueAtTime(900, now + 0.4); flt.Q.setValueAtTime(1, now + 0.4);
                    g3.gain.setValueAtTime(0, now + 0.4);
                    g3.gain.linearRampToValueAtTime(0.3, now + 0.43);
                    g3.gain.setValueAtTime(0.28, now + 0.7);
                    g3.gain.exponentialRampToValueAtTime(0.001, now + 1.25);
                    o3.connect(flt); flt.connect(g3); g3.connect(ctx.destination);
                    o3.start(now + 0.4); o3.stop(now + 1.25);
                    break;
                }

                case 'duck': {
                    // 꽥꽥꽥 - 납작한 콧소리, 빠르게 3회
                    for (let i = 0; i < 3; i++) {
                        const t = now + i * 0.25;
                        const o = ctx.createOscillator(); const g = ctx.createGain();
                        const flt = ctx.createBiquadFilter();
                        o.type = 'sawtooth';
                        o.frequency.setValueAtTime(180, t);
                        o.frequency.linearRampToValueAtTime(350, t + 0.03);
                        o.frequency.linearRampToValueAtTime(220, t + 0.1);
                        o.frequency.linearRampToValueAtTime(160, t + 0.16);
                        flt.type = 'bandpass'; flt.frequency.setValueAtTime(800, t); flt.Q.setValueAtTime(4, t);
                        g.gain.setValueAtTime(0, t);
                        g.gain.linearRampToValueAtTime(0.3, t + 0.015);
                        g.gain.setValueAtTime(0.28, t + 0.06);
                        g.gain.exponentialRampToValueAtTime(0.001, t + 0.18);
                        o.connect(flt); flt.connect(g); g.connect(ctx.destination);
                        o.start(t); o.stop(t + 0.18);
                    }
                    break;
                }

                case 'sheep': {
                    // 메~에~ - 떨리는 중간음 2회
                    for (let i = 0; i < 2; i++) {
                        const t = now + i * 0.6;
                        const o = ctx.createOscillator(); const g = ctx.createGain();
                        o.type = 'sawtooth';
                        o.frequency.setValueAtTime(220, t);
                        o.frequency.linearRampToValueAtTime(330, t + 0.08);
                        o.frequency.setValueAtTime(330, t + 0.2);
                        o.frequency.linearRampToValueAtTime(280, t + 0.4);
                        const flt = ctx.createBiquadFilter();
                        flt.type = 'lowpass'; flt.frequency.setValueAtTime(800, t);
                        g.gain.setValueAtTime(0, t);
                        g.gain.linearRampToValueAtTime(0.28, t + 0.03);
                        g.gain.setValueAtTime(0.25, t + 0.2);
                        g.gain.exponentialRampToValueAtTime(0.001, t + 0.45);
                        o.connect(flt); flt.connect(g); g.connect(ctx.destination);
                        o.start(t); o.stop(t + 0.45);
                        // 강한 비브라토 (떨리는 양 울음)
                        const v = ctx.createOscillator(); const vg = ctx.createGain();
                        v.frequency.setValueAtTime(8, t); vg.gain.setValueAtTime(25, t);
                        v.connect(vg); vg.connect(o.frequency);
                        v.start(t); v.stop(t + 0.45);
                    }
                    break;
                }

                case 'pig': {
                    // 꿀꿀 - 낮고 짧은 코 고는 소리 2회
                    for (let i = 0; i < 2; i++) {
                        const t = now + i * 0.3;
                        const o = ctx.createOscillator(); const g = ctx.createGain();
                        const flt = ctx.createBiquadFilter();
                        o.type = 'sawtooth';
                        o.frequency.setValueAtTime(120, t);
                        o.frequency.linearRampToValueAtTime(200, t + 0.04);
                        o.frequency.linearRampToValueAtTime(140, t + 0.12);
                        o.frequency.linearRampToValueAtTime(100, t + 0.2);
                        flt.type = 'lowpass'; flt.frequency.setValueAtTime(500, t); flt.Q.setValueAtTime(3, t);
                        g.gain.setValueAtTime(0, t);
                        g.gain.linearRampToValueAtTime(0.35, t + 0.02);
                        g.gain.setValueAtTime(0.3, t + 0.08);
                        g.gain.exponentialRampToValueAtTime(0.001, t + 0.22);
                        o.connect(flt); flt.connect(g); g.connect(ctx.destination);
                        o.start(t); o.stop(t + 0.22);
                        // 콧소리 노이즈
                        const bs = Math.floor(ctx.sampleRate * 0.15);
                        const nb = ctx.createBuffer(1, bs, ctx.sampleRate);
                        const nd = nb.getChannelData(0);
                        for (let j = 0; j < bs; j++) nd[j] = (Math.random()*2-1)*0.2*(1-j/bs);
                        const ns = ctx.createBufferSource(); ns.buffer = nb;
                        const ng = ctx.createGain(); ng.gain.setValueAtTime(0.12, t); ng.gain.exponentialRampToValueAtTime(0.001, t+0.15);
                        const lp = ctx.createBiquadFilter(); lp.type='lowpass'; lp.frequency.setValueAtTime(400, t);
                        ns.connect(ng); ng.connect(lp); lp.connect(ctx.destination);
                        ns.start(t); ns.stop(t + 0.15);
                    }
                    break;
                }

                case 'horse': {
                    // 히힝~ - 높은 울음소리, 올라갔다 내려옴
                    const dur = 1.0;
                    const o = ctx.createOscillator(); const g = ctx.createGain();
                    o.type = 'sawtooth';
                    o.frequency.setValueAtTime(300, now);
                    o.frequency.linearRampToValueAtTime(600, now + 0.15);
                    o.frequency.linearRampToValueAtTime(700, now + 0.3);
                    o.frequency.linearRampToValueAtTime(550, now + 0.6);
                    o.frequency.linearRampToValueAtTime(350, now + dur);
                    const flt = ctx.createBiquadFilter();
                    flt.type = 'lowpass'; flt.frequency.setValueAtTime(1500, now);
                    g.gain.setValueAtTime(0, now);
                    g.gain.linearRampToValueAtTime(0.3, now + 0.05);
                    g.gain.setValueAtTime(0.3, now + 0.3);
                    g.gain.exponentialRampToValueAtTime(0.001, now + dur);
                    o.connect(flt); flt.connect(g); g.connect(ctx.destination);
                    o.start(now); o.stop(now + dur);
                    // 떨림
                    const v = ctx.createOscillator(); const vg = ctx.createGain();
                    v.frequency.setValueAtTime(6, now); vg.gain.setValueAtTime(20, now);
                    v.connect(vg); vg.connect(o.frequency);
                    v.start(now); v.stop(now + dur);
                    // 콧바람
                    const bs = Math.floor(ctx.sampleRate * 0.3);
                    const nb = ctx.createBuffer(1, bs, ctx.sampleRate);
                    const nd = nb.getChannelData(0);
                    for (let j = 0; j < bs; j++) nd[j] = (Math.random()*2-1)*0.08*(1-j/bs);
                    const ns = ctx.createBufferSource(); ns.buffer = nb;
                    const ng = ctx.createGain(); ng.gain.setValueAtTime(0.1, now+0.7); ng.gain.exponentialRampToValueAtTime(0.001, now+1.0);
                    ns.connect(ng); ng.connect(ctx.destination);
                    ns.start(now+0.7); ns.stop(now+1.0);
                    break;
                }

                case 'elephant': {
                    // 뿌우~ - 트럼펫 같은 낮고 웅장한 소리
                    const dur = 1.5;
                    const o = ctx.createOscillator(); const g = ctx.createGain();
                    o.type = 'sawtooth';
                    o.frequency.setValueAtTime(150, now);
                    o.frequency.linearRampToValueAtTime(350, now + 0.15);
                    o.frequency.setValueAtTime(350, now + 0.4);
                    o.frequency.linearRampToValueAtTime(280, now + 0.8);
                    o.frequency.linearRampToValueAtTime(200, now + dur);
                    const flt = ctx.createBiquadFilter();
                    flt.type = 'lowpass'; flt.frequency.setValueAtTime(800, now); flt.Q.setValueAtTime(2, now);
                    g.gain.setValueAtTime(0, now);
                    g.gain.linearRampToValueAtTime(0.4, now + 0.08);
                    g.gain.setValueAtTime(0.4, now + 0.4);
                    g.gain.exponentialRampToValueAtTime(0.001, now + dur);
                    o.connect(flt); flt.connect(g); g.connect(ctx.destination);
                    o.start(now); o.stop(now + dur);
                    // 서브베이스
                    makeOsc('sine', 75, now, dur, 0.25);
                    // 2번째 하모닉
                    const o2 = ctx.createOscillator(); const g2 = ctx.createGain();
                    o2.type = 'sine';
                    o2.frequency.setValueAtTime(300, now);
                    o2.frequency.linearRampToValueAtTime(700, now + 0.15);
                    o2.frequency.linearRampToValueAtTime(560, now + 0.8);
                    g2.gain.setValueAtTime(0, now);
                    g2.gain.linearRampToValueAtTime(0.15, now + 0.08);
                    g2.gain.exponentialRampToValueAtTime(0.001, now + dur);
                    o2.connect(g2); g2.connect(ctx.destination);
                    o2.start(now); o2.stop(now + dur);
                    break;
                }
            }
        }

        // 정답 효과음 (밝은 상승 멜로디)
        function playCorrectSound() {
            const ctx = getAudioContext();
            if (!ctx) return;
            const now = ctx.currentTime;

            const notes = [523, 659, 784, 1047];
            notes.forEach((freq, i) => {
                const t = now + i * 0.1;
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(freq, t);
                gain.gain.setValueAtTime(0, t);
                gain.gain.linearRampToValueAtTime(0.25, t + 0.02);
                gain.gain.setValueAtTime(0.25, t + 0.08);
                gain.gain.exponentialRampToValueAtTime(0.001, t + 0.25);
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.start(t);
                osc.stop(t + 0.25);
            });
        }

        // 오답 효과음 (짧은 하강 톤)
        function playWrongSound() {
            const ctx = getAudioContext();
            if (!ctx) return;
            const now = ctx.currentTime;

            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(350, now);
            osc.frequency.linearRampToValueAtTime(200, now + 0.25);
            gain.gain.setValueAtTime(0.2, now);
            gain.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.start(now);
            osc.stop(now + 0.3);

            const osc2 = ctx.createOscillator();
            const gain2 = ctx.createGain();
            osc2.type = 'triangle';
            osc2.frequency.setValueAtTime(300, now + 0.15);
            osc2.frequency.linearRampToValueAtTime(150, now + 0.4);
            gain2.gain.setValueAtTime(0.18, now + 0.15);
            gain2.gain.exponentialRampToValueAtTime(0.001, now + 0.45);
            osc2.connect(gain2);
            gain2.connect(ctx.destination);
            osc2.start(now + 0.15);
            osc2.stop(now + 0.45);
        }

        function cleanupAnimalGame() {
            AnimalGame.running = false;
            AnimalGame.locked = false;
            AnimalGame.currentAnswer = null;
            AnimalGame.stage = 1;
            AnimalGame.stageScore = 0;
            AnimalGame.usedAnswers = [];

            if (AnimalGame.advanceTimer) {
                clearTimeout(AnimalGame.advanceTimer);
                AnimalGame.advanceTimer = null;
            }

            const area = document.getElementById('animal-area');
            if (area) area.innerHTML = '';
        }

        /* ==============================================
         *  게임 3: 마법의 스케치북 (Magic Sketchbook)
         *  - Canvas 그리기 (터치/마우스)
         *  - 윤곽선 배경 (물고기)
         *  - 6색 색상 버튼 + 3단계 브러시
         *  - 마법 보내기 → 수족관 애니메이션
         * ============================================== */
        const SketchGame = {
            drawCanvas: null,
            drawCtx: null,
            outlineCanvas: null,
            outlineCtx: null,
            drawing: false,
            currentColor: '#FF1744',
            brushSize: 12,
            lastX: 0,
            lastY: 0,
            mode: 'draw',  // 'draw' | 'aquarium'
            aquariumAnim: null,
            aquariumDrawings: [],

            colors: [
                { name: '빨강', hex: '#FF1744' },
                { name: '노랑', hex: '#FFD600' },
                { name: '파랑', hex: '#2979FF' },
                { name: '초록', hex: '#00C853' },
                { name: '보라', hex: '#AA00FF' },
                { name: '주황', hex: '#FF6D00' }
            ],

            brushes: [
                { label: '작게', size: 6 },
                { label: '보통', size: 14 },
                { label: '크게', size: 26 }
            ]
        };

        function initCanvasGame() {
            const area = document.getElementById('canvas-area');
            area.innerHTML = '';

            // 시작 오버레이
            const overlay = document.createElement('div');
            overlay.className = 'sketch-start-overlay';
            overlay.id = 'sketch-start-overlay';
            overlay.innerHTML = `
                <div class="start-emoji">🎨</div>
                <div class="start-text">그림을 그리고 움직여요!</div>
                <button class="sketch-start-btn" id="sketch-start-btn">시작! 🎉</button>
            `;
            area.appendChild(overlay);

            document.getElementById('sketch-start-btn').addEventListener('click', startSketchGameplay);
            document.getElementById('sketch-start-btn').addEventListener('touchend', (e) => {
                e.preventDefault();
                startSketchGameplay();
            });
        }

        function startSketchGameplay() {
            const overlay = document.getElementById('sketch-start-overlay');
            if (overlay) overlay.remove();

            SketchGame.mode = 'draw';
            buildSketchDrawScreen();
        }

        function buildSketchDrawScreen() {
            const area = document.getElementById('canvas-area');
            area.innerHTML = '';

            const drawScreen = document.createElement('div');
            drawScreen.className = 'sketch-draw-screen';
            drawScreen.id = 'sketch-draw-screen';

            // 캔버스 영역
            const canvasWrap = document.createElement('div');
            canvasWrap.className = 'sketch-canvas-wrap';
            canvasWrap.id = 'sketch-canvas-wrap';

            const outlineCanvas = document.createElement('canvas');
            outlineCanvas.id = 'sketch-outline-canvas';
            const drawCanvas = document.createElement('canvas');
            drawCanvas.id = 'sketch-draw-canvas';

            canvasWrap.appendChild(outlineCanvas);
            canvasWrap.appendChild(drawCanvas);

            // 툴바
            const toolbar = document.createElement('div');
            toolbar.className = 'sketch-toolbar';
            toolbar.id = 'sketch-toolbar';

            // 색상 버튼
            SketchGame.colors.forEach((c, i) => {
                const btn = document.createElement('div');
                btn.className = 'sketch-color-btn' + (i === 0 ? ' active' : '');
                btn.style.background = c.hex;
                btn.dataset.color = c.hex;
                btn.addEventListener('click', () => selectSketchColor(c.hex, btn));
                btn.addEventListener('touchend', (e) => { e.preventDefault(); selectSketchColor(c.hex, btn); });
                toolbar.appendChild(btn);
            });

            // 구분선
            const div1 = document.createElement('div');
            div1.className = 'sketch-divider';
            toolbar.appendChild(div1);

            // 브러시 크기 버튼
            SketchGame.brushes.forEach((b, i) => {
                const btn = document.createElement('div');
                btn.className = 'sketch-brush-btn' + (i === 1 ? ' active' : '');
                btn.dataset.size = b.size;
                const dot = document.createElement('div');
                dot.className = 'sketch-brush-dot';
                const dotSize = Math.max(6, b.size * 0.7);
                dot.style.width = dotSize + 'px';
                dot.style.height = dotSize + 'px';
                btn.appendChild(dot);
                btn.addEventListener('click', () => selectSketchBrush(b.size, btn));
                btn.addEventListener('touchend', (e) => { e.preventDefault(); selectSketchBrush(b.size, btn); });
                toolbar.appendChild(btn);
            });

            // 구분선
            const div2 = document.createElement('div');
            div2.className = 'sketch-divider';
            toolbar.appendChild(div2);

            // 액션 버튼들
            const actionBtns = document.createElement('div');
            actionBtns.className = 'sketch-action-btns';

            const clearBtn = document.createElement('button');
            clearBtn.className = 'sketch-action-btn sketch-clear-btn';
            clearBtn.textContent = '🔄 다시';
            clearBtn.addEventListener('click', clearSketchCanvas);
            clearBtn.addEventListener('touchend', (e) => { e.preventDefault(); clearSketchCanvas(); });

            const magicBtn = document.createElement('button');
            magicBtn.className = 'sketch-action-btn sketch-magic-btn';
            magicBtn.textContent = '마법 보내기 🪄';
            magicBtn.addEventListener('click', sendToAquarium);
            magicBtn.addEventListener('touchend', (e) => { e.preventDefault(); sendToAquarium(); });

            actionBtns.appendChild(clearBtn);
            actionBtns.appendChild(magicBtn);
            toolbar.appendChild(actionBtns);

            drawScreen.appendChild(canvasWrap);
            drawScreen.appendChild(toolbar);
            area.appendChild(drawScreen);

            // 캔버스 초기화 (약간 딜레이 후 크기 설정)
            requestAnimationFrame(() => {
                setupSketchCanvases();
                drawOutlineFish();
            });
        }

        function setupSketchCanvases() {
            const wrap = document.getElementById('sketch-canvas-wrap');
            if (!wrap) return;

            const rect = wrap.getBoundingClientRect();
            const dpr = window.devicePixelRatio || 1;
            const w = rect.width;
            const h = rect.height;

            const outline = document.getElementById('sketch-outline-canvas');
            const draw = document.getElementById('sketch-draw-canvas');

            [outline, draw].forEach(c => {
                c.width = w * dpr;
                c.height = h * dpr;
                c.style.width = w + 'px';
                c.style.height = h + 'px';
                c.getContext('2d').scale(dpr, dpr);
            });

            SketchGame.outlineCanvas = outline;
            SketchGame.outlineCtx = outline.getContext('2d');
            SketchGame.drawCanvas = draw;
            SketchGame.drawCtx = draw.getContext('2d');

            SketchGame.drawCtx.lineCap = 'round';
            SketchGame.drawCtx.lineJoin = 'round';
            SketchGame.drawCtx.strokeStyle = SketchGame.currentColor;
            SketchGame.drawCtx.lineWidth = SketchGame.brushSize;

            // 터치/마우스 이벤트
            draw.addEventListener('mousedown', sketchStart);
            draw.addEventListener('mousemove', sketchMove);
            draw.addEventListener('mouseup', sketchEnd);
            draw.addEventListener('mouseleave', sketchEnd);

            draw.addEventListener('touchstart', sketchTouchStart, { passive: false });
            draw.addEventListener('touchmove', sketchTouchMove, { passive: false });
            draw.addEventListener('touchend', sketchTouchEnd, { passive: false });
        }

        function drawOutlineFish() {
            const ctx = SketchGame.outlineCtx;
            if (!ctx) return;

            const c = SketchGame.outlineCanvas;
            const dpr = window.devicePixelRatio || 1;
            const w = c.width / dpr;
            const h = c.height / dpr;

            ctx.clearRect(0, 0, w, h);
            ctx.strokeStyle = '#BDBDBD';
            ctx.lineWidth = 3;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';

            // 물고기 - 화면 중앙에 크게
            const cx = w * 0.45;
            const cy = h * 0.48;
            const scale = Math.min(w, h) * 0.0035;

            ctx.save();
            ctx.translate(cx, cy);
            ctx.scale(scale, scale);

            // 몸통 (타원)
            ctx.beginPath();
            ctx.ellipse(0, 0, 80, 50, 0, 0, Math.PI * 2);
            ctx.stroke();

            // 꼬리
            ctx.beginPath();
            ctx.moveTo(70, -10);
            ctx.lineTo(110, -40);
            ctx.lineTo(110, 40);
            ctx.lineTo(70, 10);
            ctx.stroke();

            // 눈
            ctx.beginPath();
            ctx.arc(-35, -10, 10, 0, Math.PI * 2);
            ctx.stroke();
            // 눈동자
            ctx.beginPath();
            ctx.arc(-33, -10, 4, 0, Math.PI * 2);
            ctx.stroke();

            // 입
            ctx.beginPath();
            ctx.moveTo(-65, 5);
            ctx.quadraticCurveTo(-55, 15, -45, 5);
            ctx.stroke();

            // 지느러미 (위)
            ctx.beginPath();
            ctx.moveTo(-15, -45);
            ctx.quadraticCurveTo(0, -80, 25, -48);
            ctx.stroke();

            // 지느러미 (아래)
            ctx.beginPath();
            ctx.moveTo(0, 45);
            ctx.quadraticCurveTo(15, 70, 30, 45);
            ctx.stroke();

            // 비늘 무늬
            for (let i = 0; i < 3; i++) {
                ctx.beginPath();
                ctx.arc(-10 + i * 25, 0, 12, 0.3, Math.PI - 0.3);
                ctx.stroke();
            }

            // 거품들
            ctx.restore();

            // 물거품 장식
            const bubbles = [
                { x: w * 0.15, y: h * 0.2, r: 8 },
                { x: w * 0.12, y: h * 0.35, r: 5 },
                { x: w * 0.2, y: h * 0.15, r: 6 },
                { x: w * 0.78, y: h * 0.7, r: 7 },
                { x: w * 0.82, y: h * 0.6, r: 4 },
                { x: w * 0.75, y: h * 0.8, r: 9 },
            ];
            bubbles.forEach(b => {
                ctx.beginPath();
                ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
                ctx.stroke();
            });
        }

        // ===== 그리기 이벤트 =====
        function getSketchPos(e) {
            const rect = SketchGame.drawCanvas.getBoundingClientRect();
            return {
                x: e.clientX - rect.left,
                y: e.clientY - rect.top
            };
        }

        function sketchStart(e) {
            SketchGame.drawing = true;
            const pos = getSketchPos(e);
            SketchGame.lastX = pos.x;
            SketchGame.lastY = pos.y;
            // 점 찍기
            SketchGame.drawCtx.beginPath();
            SketchGame.drawCtx.arc(pos.x, pos.y, SketchGame.brushSize / 2, 0, Math.PI * 2);
            SketchGame.drawCtx.fillStyle = SketchGame.currentColor;
            SketchGame.drawCtx.fill();
        }

        function sketchMove(e) {
            if (!SketchGame.drawing) return;
            const pos = getSketchPos(e);
            const ctx = SketchGame.drawCtx;
            ctx.strokeStyle = SketchGame.currentColor;
            ctx.lineWidth = SketchGame.brushSize;
            ctx.beginPath();
            ctx.moveTo(SketchGame.lastX, SketchGame.lastY);
            ctx.lineTo(pos.x, pos.y);
            ctx.stroke();
            SketchGame.lastX = pos.x;
            SketchGame.lastY = pos.y;
        }

        function sketchEnd() {
            SketchGame.drawing = false;
        }

        function sketchTouchStart(e) {
            e.preventDefault();
            const touch = e.touches[0];
            sketchStart({ clientX: touch.clientX, clientY: touch.clientY });
        }

        function sketchTouchMove(e) {
            e.preventDefault();
            const touch = e.touches[0];
            sketchMove({ clientX: touch.clientX, clientY: touch.clientY });
        }

        function sketchTouchEnd(e) {
            e.preventDefault();
            sketchEnd();
        }

        // ===== 색상/브러시 선택 =====
        function selectSketchColor(hex, btn) {
            SketchGame.currentColor = hex;
            document.querySelectorAll('.sketch-color-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        function selectSketchBrush(size, btn) {
            SketchGame.brushSize = size;
            document.querySelectorAll('.sketch-brush-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        function clearSketchCanvas() {
            if (!SketchGame.drawCtx) return;
            const c = SketchGame.drawCanvas;
            const dpr = window.devicePixelRatio || 1;
            SketchGame.drawCtx.clearRect(0, 0, c.width / dpr, c.height / dpr);
        }

        // ===== 마법 보내기 → 수족관 =====
        function sendToAquarium() {
            if (!SketchGame.drawCanvas) return;

            // 그린 그림 캡처 (윤곽선 + 그림 합성)
            const dpr = window.devicePixelRatio || 1;
            const w = SketchGame.drawCanvas.width;
            const h = SketchGame.drawCanvas.height;

            const mergeCanvas = document.createElement('canvas');
            mergeCanvas.width = w;
            mergeCanvas.height = h;
            const mergeCtx = mergeCanvas.getContext('2d');
            mergeCtx.drawImage(SketchGame.outlineCanvas, 0, 0);
            mergeCtx.drawImage(SketchGame.drawCanvas, 0, 0);

            // 내용 영역만 잘라내기 (여백 제거)
            const imgData = mergeCtx.getImageData(0, 0, w, h);
            let minX = w, minY = h, maxX = 0, maxY = 0;
            for (let y = 0; y < h; y++) {
                for (let x = 0; x < w; x++) {
                    const a = imgData.data[(y * w + x) * 4 + 3];
                    if (a > 10) {
                        if (x < minX) minX = x;
                        if (x > maxX) maxX = x;
                        if (y < minY) minY = y;
                        if (y > maxY) maxY = y;
                    }
                }
            }

            // 여백 패딩
            const pad = 10;
            minX = Math.max(0, minX - pad);
            minY = Math.max(0, minY - pad);
            maxX = Math.min(w, maxX + pad);
            maxY = Math.min(h, maxY + pad);

            const cropW = maxX - minX;
            const cropH = maxY - minY;

            if (cropW < 10 || cropH < 10) {
                // 거의 안 그렸음
                return;
            }

            const cropCanvas = document.createElement('canvas');
            cropCanvas.width = cropW;
            cropCanvas.height = cropH;
            cropCanvas.getContext('2d').drawImage(mergeCanvas, minX, minY, cropW, cropH, 0, 0, cropW, cropH);

            const drawingDataURL = cropCanvas.toDataURL('image/png');

            SketchGame.mode = 'aquarium';
            buildAquariumScreen(drawingDataURL, cropW / dpr, cropH / dpr);
            playMagicSound();
        }

        function buildAquariumScreen(drawingURL, drawW, drawH) {
            const area = document.getElementById('canvas-area');
            area.innerHTML = '';

            const aquarium = document.createElement('div');
            aquarium.className = 'aquarium-screen';
            aquarium.id = 'aquarium-screen';

            // 배경
            const bg = document.createElement('div');
            bg.className = 'aquarium-bg';
            aquarium.appendChild(bg);

            // 바닥
            const floor = document.createElement('div');
            floor.className = 'aquarium-floor';
            aquarium.appendChild(floor);

            // 해초
            for (let i = 0; i < 6; i++) {
                const sw = document.createElement('div');
                sw.className = 'aquarium-seaweed';
                sw.style.left = (8 + i * 17 + Math.random() * 5) + '%';
                sw.style.height = (40 + Math.random() * 50) + 'px';
                sw.style.animationDelay = (Math.random() * 2) + 's';
                sw.style.background = i % 2 === 0 ? '#388E3C' : '#2E7D32';
                aquarium.appendChild(sw);
            }

            // 거품
            for (let i = 0; i < 10; i++) {
                const bub = document.createElement('div');
                bub.className = 'aquarium-bubble';
                bub.style.left = (Math.random() * 90 + 5) + '%';
                bub.style.bottom = (Math.random() * 20) + '%';
                const bubSize = 6 + Math.random() * 12;
                bub.style.width = bubSize + 'px';
                bub.style.height = bubSize + 'px';
                bub.style.animationDuration = (4 + Math.random() * 6) + 's';
                bub.style.animationDelay = (Math.random() * 5) + 's';
                aquarium.appendChild(bub);
            }

            // 그린 그림 수영시키기 (여러 개)
            const maxH = 120;
            const displayH = Math.min(maxH, drawH * 0.6);
            const displayW = drawW * (displayH / drawH);

            for (let i = 0; i < 3; i++) {
                const img = document.createElement('img');
                img.src = drawingURL;
                img.className = 'aquarium-drawing';
                img.style.width = displayW + 'px';
                img.style.height = displayH + 'px';
                img.style.top = (15 + i * 25 + Math.random() * 10) + '%';
                img.style.animationDuration = (6 + i * 3 + Math.random() * 3) + 's';
                img.style.animationDelay = (i * 2.5) + 's';
                img.draggable = false;
                aquarium.appendChild(img);
            }

            // 다시 그리기 버튼
            const redrawBtn = document.createElement('button');
            redrawBtn.className = 'aquarium-redraw-btn';
            redrawBtn.textContent = '다시 그리기 🔄';
            redrawBtn.addEventListener('click', () => {
                SketchGame.mode = 'draw';
                buildSketchDrawScreen();
            });
            redrawBtn.addEventListener('touchend', (e) => {
                e.preventDefault();
                SketchGame.mode = 'draw';
                buildSketchDrawScreen();
            });
            aquarium.appendChild(redrawBtn);

            area.appendChild(aquarium);
        }

        function playMagicSound() {
            const ctx = getAudioContext();
            if (!ctx) return;
            const now = ctx.currentTime;

            // 마법 효과음 (글리산도 + 벨)
            const notes = [523, 659, 784, 1047, 1319, 1568];
            notes.forEach((freq, i) => {
                const t = now + i * 0.07;
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(freq, t);
                gain.gain.setValueAtTime(0, t);
                gain.gain.linearRampToValueAtTime(0.2, t + 0.02);
                gain.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.start(t);
                osc.stop(t + 0.4);
            });

            // 반짝이 노이즈
            const bufSize = Math.floor(ctx.sampleRate * 0.3);
            const buf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
            const data = buf.getChannelData(0);
            for (let i = 0; i < bufSize; i++) {
                data[i] = (Math.random() * 2 - 1) * 0.05 * (1 - i / bufSize);
            }
            const src = ctx.createBufferSource();
            src.buffer = buf;
            const g = ctx.createGain();
            g.gain.setValueAtTime(0.1, now);
            g.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
            src.connect(g);
            g.connect(ctx.destination);
            src.start(now + 0.2);
            src.stop(now + 0.5);
        }

        function cleanupCanvasGame() {
            SketchGame.drawing = false;
            SketchGame.drawCanvas = null;
            SketchGame.drawCtx = null;
            SketchGame.outlineCanvas = null;
            SketchGame.outlineCtx = null;
            SketchGame.mode = 'draw';

            const area = document.getElementById('canvas-area');
            if (area) area.innerHTML = '';
        }

        /* ===== 초기화 ===== */
        document.addEventListener('DOMContentLoaded', () => {
            buildMenu();
        });

        /* ===== PWA 풀스크린 지원 (iOS 홈화면 추가 시) ===== */
        if ('standalone' in navigator && navigator.standalone) {
            document.documentElement.style.height = '100vh';
        }
    </script>
