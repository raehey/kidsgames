        const ONOMATOPOEIA = {
            dog: '멍멍!',
            cat: '야옹~',
            lion: '어흥!',
            cow: '음메~',
            chicken: '꼬끼오!',
            duck: '꽥꽥!',
            sheep: '메에~',
            pig: '꿀꿀!',
            horse: '히힝~',
            elephant: '뿌우~'
        };

        function showOnomatopoeia(animalId) {
            const text = ONOMATOPOEIA[animalId];
            if (!text) return;

            // Remove previous
            const old = document.querySelector('.onomatopoeia-float');
            if (old) old.remove();

            const el = document.createElement('div');
            el.className = 'onomatopoeia-float';
            el.textContent = text;
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 1600);
        }

        function playAnimalSound(animalId) {
            showOnomatopoeia(animalId);

            if (!Settings.soundEnabled) return;
            const ctx = getAudioContext();
            if (!ctx) return;
            const now = ctx.currentTime;

            switch (animalId) {
                case 'dog': {
                    // 멍멍! - Two short punchy barks
                    for (let i = 0; i < 2; i++) {
                        const t = now + i * 0.35;
                        const o = ctx.createOscillator();
                        const g = ctx.createGain();
                        const flt = ctx.createBiquadFilter();
                        o.type = 'square';
                        o.frequency.setValueAtTime(180, t);
                        o.frequency.linearRampToValueAtTime(380, t + 0.04);
                        o.frequency.linearRampToValueAtTime(250, t + 0.12);
                        o.frequency.linearRampToValueAtTime(180, t + 0.22);
                        flt.type = 'lowpass';
                        flt.frequency.setValueAtTime(1200, t);
                        flt.Q.setValueAtTime(1, t);
                        g.gain.setValueAtTime(0.001, t);
                        g.gain.linearRampToValueAtTime(0.42, t + 0.02);
                        g.gain.setValueAtTime(0.38, t + 0.1);
                        g.gain.exponentialRampToValueAtTime(0.001, t + 0.22);
                        o.connect(flt); flt.connect(g); g.connect(ctx.destination);
                        o.start(t); o.stop(t + 0.22);
                    }
                    break;
                }
                case 'cat': {
                    // 야옹~ - Smooth rising-falling meow with vibrato
                    const o = ctx.createOscillator();
                    const g = ctx.createGain();
                    o.type = 'sine';
                    o.frequency.setValueAtTime(280, now);
                    o.frequency.linearRampToValueAtTime(520, now + 0.15);
                    o.frequency.setValueAtTime(520, now + 0.35);
                    o.frequency.linearRampToValueAtTime(380, now + 0.55);
                    o.frequency.linearRampToValueAtTime(300, now + 0.8);
                    g.gain.setValueAtTime(0.001, now);
                    g.gain.linearRampToValueAtTime(0.35, now + 0.05);
                    g.gain.setValueAtTime(0.32, now + 0.35);
                    g.gain.exponentialRampToValueAtTime(0.001, now + 0.8);
                    o.connect(g); g.connect(ctx.destination);
                    o.start(now); o.stop(now + 0.8);
                    const v = ctx.createOscillator();
                    const vg = ctx.createGain();
                    v.frequency.setValueAtTime(5.5, now);
                    vg.gain.setValueAtTime(12, now);
                    v.connect(vg); vg.connect(o.frequency);
                    v.start(now); v.stop(now + 0.8);
                    break;
                }
                case 'lion': {
                    // 어흥! - Deep powerful roar with sub-bass rumble
                    const dur = 1.6;
                    const o = ctx.createOscillator();
                    const g = ctx.createGain();
                    const flt = ctx.createBiquadFilter();
                    o.type = 'sawtooth';
                    o.frequency.setValueAtTime(65, now);
                    o.frequency.linearRampToValueAtTime(110, now + 0.3);
                    o.frequency.setValueAtTime(100, now + 0.8);
                    o.frequency.linearRampToValueAtTime(55, now + dur);
                    flt.type = 'lowpass'; flt.frequency.setValueAtTime(350, now); flt.Q.setValueAtTime(0.8, now);
                    g.gain.setValueAtTime(0.001, now);
                    g.gain.linearRampToValueAtTime(0.45, now + 0.15);
                    g.gain.setValueAtTime(0.42, now + 0.6);
                    g.gain.exponentialRampToValueAtTime(0.001, now + dur);
                    o.connect(flt); flt.connect(g); g.connect(ctx.destination);
                    o.start(now); o.stop(now + dur);
                    // Sub bass layer
                    const o2 = ctx.createOscillator();
                    const g2 = ctx.createGain();
                    o2.type = 'sine';
                    o2.frequency.setValueAtTime(40, now);
                    o2.frequency.linearRampToValueAtTime(65, now + 0.3);
                    o2.frequency.linearRampToValueAtTime(35, now + 1.4);
                    g2.gain.setValueAtTime(0.001, now);
                    g2.gain.linearRampToValueAtTime(0.25, now + 0.15);
                    g2.gain.exponentialRampToValueAtTime(0.001, now + 1.4);
                    o2.connect(g2); g2.connect(ctx.destination);
                    o2.start(now); o2.stop(now + 1.4);
                    // Tremor vibrato
                    const tr = ctx.createOscillator();
                    const trg = ctx.createGain();
                    tr.frequency.setValueAtTime(7, now); trg.gain.setValueAtTime(18, now);
                    tr.connect(trg); trg.connect(o.frequency);
                    tr.start(now); tr.stop(now + dur);
                    break;
                }
                case 'cow': {
                    // 음메~ - Long sustained moo with nasal quality
                    const dur = 1.8;
                    const o = ctx.createOscillator();
                    const g = ctx.createGain();
                    const flt = ctx.createBiquadFilter();
                    o.type = 'sawtooth';
                    o.frequency.setValueAtTime(100, now);
                    o.frequency.linearRampToValueAtTime(155, now + 0.25);
                    o.frequency.setValueAtTime(155, now + 0.9);
                    o.frequency.linearRampToValueAtTime(125, now + 1.4);
                    o.frequency.linearRampToValueAtTime(95, now + dur);
                    flt.type = 'lowpass'; flt.frequency.setValueAtTime(650, now); flt.Q.setValueAtTime(1.5, now);
                    g.gain.setValueAtTime(0.001, now);
                    g.gain.linearRampToValueAtTime(0.4, now + 0.1);
                    g.gain.setValueAtTime(0.38, now + 0.9);
                    g.gain.exponentialRampToValueAtTime(0.001, now + dur);
                    o.connect(flt); flt.connect(g); g.connect(ctx.destination);
                    o.start(now); o.stop(now + dur);
                    const v = ctx.createOscillator(); const vg = ctx.createGain();
                    v.frequency.setValueAtTime(4.5, now); vg.gain.setValueAtTime(8, now);
                    v.connect(vg); vg.connect(o.frequency);
                    v.start(now); v.stop(now + dur);
                    break;
                }
                case 'chicken': {
                    // 꼬끼오! - Three ascending chirps: ko-ki-o!
                    const o1 = ctx.createOscillator(); const g1 = ctx.createGain();
                    o1.type = 'square';
                    o1.frequency.setValueAtTime(350, now);
                    o1.frequency.linearRampToValueAtTime(550, now + 0.08);
                    o1.frequency.linearRampToValueAtTime(400, now + 0.14);
                    g1.gain.setValueAtTime(0.001, now);
                    g1.gain.linearRampToValueAtTime(0.32, now + 0.02);
                    g1.gain.exponentialRampToValueAtTime(0.001, now + 0.14);
                    const f1 = ctx.createBiquadFilter(); f1.type = 'lowpass'; f1.frequency.setValueAtTime(1800, now);
                    o1.connect(f1); f1.connect(g1); g1.connect(ctx.destination);
                    o1.start(now); o1.stop(now + 0.14);
                    // ki
                    const o2 = ctx.createOscillator(); const g2 = ctx.createGain();
                    o2.type = 'square';
                    o2.frequency.setValueAtTime(650, now + 0.18);
                    o2.frequency.linearRampToValueAtTime(900, now + 0.26);
                    o2.frequency.linearRampToValueAtTime(700, now + 0.32);
                    g2.gain.setValueAtTime(0.001, now + 0.18);
                    g2.gain.linearRampToValueAtTime(0.35, now + 0.2);
                    g2.gain.exponentialRampToValueAtTime(0.001, now + 0.32);
                    const f2 = ctx.createBiquadFilter(); f2.type = 'lowpass'; f2.frequency.setValueAtTime(2000, now + 0.18);
                    o2.connect(f2); f2.connect(g2); g2.connect(ctx.destination);
                    o2.start(now + 0.18); o2.stop(now + 0.32);
                    // o~!
                    const o3 = ctx.createOscillator(); const g3 = ctx.createGain();
                    o3.type = 'square';
                    o3.frequency.setValueAtTime(850, now + 0.38);
                    o3.frequency.linearRampToValueAtTime(1000, now + 0.55);
                    o3.frequency.linearRampToValueAtTime(650, now + 1.2);
                    g3.gain.setValueAtTime(0.001, now + 0.38);
                    g3.gain.linearRampToValueAtTime(0.35, now + 0.4);
                    g3.gain.setValueAtTime(0.32, now + 0.7);
                    g3.gain.exponentialRampToValueAtTime(0.001, now + 1.2);
                    const f3 = ctx.createBiquadFilter(); f3.type = 'bandpass'; f3.frequency.setValueAtTime(950, now + 0.38); f3.Q.setValueAtTime(1.2, now + 0.38);
                    o3.connect(f3); f3.connect(g3); g3.connect(ctx.destination);
                    o3.start(now + 0.38); o3.stop(now + 1.2);
                    break;
                }
                case 'duck': {
                    // 꽥꽥! - Two flat nasal quacks
                    for (let i = 0; i < 2; i++) {
                        const t = now + i * 0.3;
                        const o = ctx.createOscillator(); const g = ctx.createGain();
                        const bp = ctx.createBiquadFilter();
                        o.type = 'sawtooth';
                        o.frequency.setValueAtTime(220, t);
                        o.frequency.linearRampToValueAtTime(350, t + 0.03);
                        o.frequency.linearRampToValueAtTime(260, t + 0.09);
                        o.frequency.linearRampToValueAtTime(200, t + 0.18);
                        bp.type = 'bandpass'; bp.frequency.setValueAtTime(800, t); bp.Q.setValueAtTime(5, t);
                        g.gain.setValueAtTime(0.001, t);
                        g.gain.linearRampToValueAtTime(0.35, t + 0.02);
                        g.gain.setValueAtTime(0.32, t + 0.08);
                        g.gain.exponentialRampToValueAtTime(0.001, t + 0.18);
                        o.connect(bp); bp.connect(g); g.connect(ctx.destination);
                        o.start(t); o.stop(t + 0.18);
                        // Extra nasal layer
                        const o2 = ctx.createOscillator(); const g2 = ctx.createGain();
                        o2.type = 'sawtooth';
                        o2.frequency.setValueAtTime(440, t);
                        o2.frequency.linearRampToValueAtTime(700, t + 0.03);
                        o2.frequency.linearRampToValueAtTime(500, t + 0.18);
                        g2.gain.setValueAtTime(0.001, t);
                        g2.gain.linearRampToValueAtTime(0.12, t + 0.02);
                        g2.gain.exponentialRampToValueAtTime(0.001, t + 0.16);
                        o2.connect(g2); g2.connect(ctx.destination);
                        o2.start(t); o2.stop(t + 0.16);
                    }
                    break;
                }
                case 'sheep': {
                    // 메에~ - Bleating with strong trembling vibrato
                    const o = ctx.createOscillator(); const g = ctx.createGain();
                    const flt = ctx.createBiquadFilter();
                    o.type = 'sawtooth';
                    o.frequency.setValueAtTime(220, now);
                    o.frequency.linearRampToValueAtTime(340, now + 0.08);
                    o.frequency.setValueAtTime(330, now + 0.3);
                    o.frequency.linearRampToValueAtTime(280, now + 0.7);
                    flt.type = 'lowpass'; flt.frequency.setValueAtTime(800, now);
                    g.gain.setValueAtTime(0.001, now);
                    g.gain.linearRampToValueAtTime(0.32, now + 0.04);
                    g.gain.setValueAtTime(0.30, now + 0.3);
                    g.gain.exponentialRampToValueAtTime(0.001, now + 0.7);
                    o.connect(flt); flt.connect(g); g.connect(ctx.destination);
                    o.start(now); o.stop(now + 0.7);
                    // Strong vibrato for bleating character
                    const v = ctx.createOscillator(); const vg = ctx.createGain();
                    v.frequency.setValueAtTime(9, now); vg.gain.setValueAtTime(28, now);
                    v.connect(vg); vg.connect(o.frequency);
                    v.start(now); v.stop(now + 0.7);
                    break;
                }
                case 'pig': {
                    // 꿀꿀! - Two low snorty grunts with noise
                    for (let i = 0; i < 2; i++) {
                        const t = now + i * 0.4;
                        const o = ctx.createOscillator(); const g = ctx.createGain();
                        const flt = ctx.createBiquadFilter();
                        o.type = 'sawtooth';
                        o.frequency.setValueAtTime(110, t);
                        o.frequency.linearRampToValueAtTime(180, t + 0.04);
                        o.frequency.linearRampToValueAtTime(130, t + 0.12);
                        o.frequency.linearRampToValueAtTime(100, t + 0.22);
                        flt.type = 'lowpass'; flt.frequency.setValueAtTime(500, t); flt.Q.setValueAtTime(1, t);
                        g.gain.setValueAtTime(0.001, t);
                        g.gain.linearRampToValueAtTime(0.36, t + 0.02);
                        g.gain.exponentialRampToValueAtTime(0.001, t + 0.22);
                        o.connect(flt); flt.connect(g); g.connect(ctx.destination);
                        o.start(t); o.stop(t + 0.22);
                        // Snort noise burst
                        const bufSize = ctx.sampleRate * 0.06;
                        const buf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
                        const d = buf.getChannelData(0);
                        for (let j = 0; j < bufSize; j++) d[j] = (Math.random() * 2 - 1) * (1 - j / bufSize);
                        const ns = ctx.createBufferSource(); ns.buffer = buf;
                        const ng = ctx.createGain();
                        const nf = ctx.createBiquadFilter(); nf.type = 'lowpass'; nf.frequency.setValueAtTime(400, t);
                        ng.gain.setValueAtTime(0.08, t);
                        ng.gain.exponentialRampToValueAtTime(0.001, t + 0.06);
                        ns.connect(nf); nf.connect(ng); ng.connect(ctx.destination);
                        ns.start(t); ns.stop(t + 0.06);
                    }
                    break;
                }
                case 'horse': {
                    // 히힝~ - High whinny that rises then falls
                    const dur = 1.3;
                    const o = ctx.createOscillator();
                    const g = ctx.createGain();
                    o.type = 'sine';
                    o.frequency.setValueAtTime(300, now);
                    o.frequency.linearRampToValueAtTime(700, now + 0.2);
                    o.frequency.setValueAtTime(750, now + 0.4);
                    o.frequency.linearRampToValueAtTime(500, now + 0.8);
                    o.frequency.linearRampToValueAtTime(350, now + dur);
                    g.gain.setValueAtTime(0.001, now);
                    g.gain.linearRampToValueAtTime(0.38, now + 0.06);
                    g.gain.setValueAtTime(0.36, now + 0.4);
                    g.gain.exponentialRampToValueAtTime(0.001, now + dur);
                    o.connect(g); g.connect(ctx.destination);
                    o.start(now); o.stop(now + dur);
                    const v = ctx.createOscillator();
                    const vg = ctx.createGain();
                    v.frequency.setValueAtTime(6, now); vg.gain.setValueAtTime(14, now);
                    v.connect(vg); vg.connect(o.frequency);
                    v.start(now); v.stop(now + dur);
                    break;
                }
                case 'elephant': {
                    // 뿌우~ - Loud trumpet blast through trunk
                    const dur = 1.5;
                    const o = ctx.createOscillator();
                    const g = ctx.createGain();
                    const flt = ctx.createBiquadFilter();
                    o.type = 'sawtooth';
                    o.frequency.setValueAtTime(140, now);
                    o.frequency.linearRampToValueAtTime(350, now + 0.3);
                    o.frequency.setValueAtTime(380, now + 0.7);
                    o.frequency.linearRampToValueAtTime(220, now + 1.2);
                    o.frequency.linearRampToValueAtTime(150, now + dur);
                    flt.type = 'lowpass'; flt.frequency.setValueAtTime(700, now); flt.Q.setValueAtTime(0.8, now);
                    g.gain.setValueAtTime(0.001, now);
                    g.gain.linearRampToValueAtTime(0.42, now + 0.15);
                    g.gain.setValueAtTime(0.40, now + 0.7);
                    g.gain.exponentialRampToValueAtTime(0.001, now + dur);
                    o.connect(flt); flt.connect(g); g.connect(ctx.destination);
                    o.start(now); o.stop(now + dur);
                    // Brass overtone for trumpet effect
                    const o2 = ctx.createOscillator();
                    const g2 = ctx.createGain();
                    const f2 = ctx.createBiquadFilter();
                    o2.type = 'square';
                    o2.frequency.setValueAtTime(280, now + 0.1);
                    o2.frequency.linearRampToValueAtTime(700, now + 0.3);
                    o2.frequency.linearRampToValueAtTime(400, now + 1.1);
                    f2.type = 'lowpass'; f2.frequency.setValueAtTime(1200, now); f2.Q.setValueAtTime(2, now);
                    g2.gain.setValueAtTime(0.001, now + 0.1);
                    g2.gain.linearRampToValueAtTime(0.15, now + 0.2);
                    g2.gain.exponentialRampToValueAtTime(0.001, now + 1.1);
                    o2.connect(f2); f2.connect(g2); g2.connect(ctx.destination);
                    o2.start(now + 0.1); o2.stop(now + 1.1);
                    break;
                }
            }
        }

        function playCorrectSound() {
            if (!Settings.soundEnabled) return;
            const ctx = getAudioContext();
            if (!ctx) return;
            const now = ctx.currentTime;

            const notes = [523, 659, 784, 1047, 1319];
            notes.forEach((freq, i) => {
                const t = now + i * 0.08;
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(freq, t);
                gain.gain.setValueAtTime(0, t);
                gain.gain.linearRampToValueAtTime(0.25, t + 0.02);
                gain.gain.setValueAtTime(0.25, t + 0.1);
                gain.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.start(t);
                osc.stop(t + 0.3);
            });
        }

        function playWrongSound() {
            if (!Settings.soundEnabled) return;
            const ctx = getAudioContext();
            if (!ctx) return;
            const now = ctx.currentTime;

            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(150, now);
            osc.frequency.linearRampToValueAtTime(100, now + 0.3);
            gain.gain.setValueAtTime(0.25, now);
            gain.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.start(now);
            osc.stop(now + 0.3);
        }

        /* ===== GAME 3: 마법의 스케치북 ===== */

        function initCanvasGame() {

        function resizeCanvases(outlineCanvas, drawCanvas) {
            const wrap = document.querySelector('.sketch-canvas-wrap');
            if (!wrap) return;
            const rect = wrap.getBoundingClientRect();
            outlineCanvas.width = rect.width;
            outlineCanvas.height = rect.height;
            drawCanvas.width = rect.width;
            drawCanvas.height = rect.height;
            drawOutline(outlineCanvas);
        }

        function drawOutline(canvas) {
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const cx = canvas.width / 2;
            const cy = canvas.height / 2;
            const scale = Math.min(canvas.width, canvas.height) * 0.003;

            ctx.save();
            ctx.translate(cx, cy);
            ctx.scale(scale, scale);
            ctx.strokeStyle = 'rgba(100, 100, 100, 0.35)';
            ctx.lineWidth = 3;
            ctx.setLineDash([8, 6]);
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';

            switch (CanvasGame.currentShape) {
                case 'fish':
                    drawFishOutline(ctx);
                    break;
                case 'car':
                    drawCarOutline(ctx);
                    break;
                case 'house':
                    drawHouseOutline(ctx);
                    break;
                case 'butterfly':
                    drawButterflyOutline(ctx);
                    break;
                default:
                    ctx.beginPath();
                    ctx.arc(0, 0, 60, 0, Math.PI * 2);
                    ctx.stroke();
            }

            ctx.restore();
        }

        function drawFishOutline(ctx) {
            // Body - smooth fish shape with bezier curves
            ctx.beginPath();
            ctx.moveTo(75, 0);
            ctx.bezierCurveTo(80, -30, 60, -55, 30, -52);
            ctx.bezierCurveTo(0, -50, -40, -45, -65, -25);
            ctx.bezierCurveTo(-80, -15, -80, 15, -65, 25);
            ctx.bezierCurveTo(-40, 45, 0, 50, 30, 52);
            ctx.bezierCurveTo(60, 55, 80, 30, 75, 0);
            ctx.closePath();
            ctx.stroke();
            // Tail fin - flowing forked tail
            ctx.beginPath();
            ctx.moveTo(-65, -15);
            ctx.bezierCurveTo(-85, -20, -110, -55, -125, -50);
            ctx.bezierCurveTo(-115, -35, -100, -15, -80, -5);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(-65, 15);
            ctx.bezierCurveTo(-85, 20, -110, 55, -125, 50);
            ctx.bezierCurveTo(-115, 35, -100, 15, -80, 5);
            ctx.stroke();
            // Tail center connection
            ctx.beginPath();
            ctx.moveTo(-80, -5);
            ctx.bezierCurveTo(-75, 0, -75, 0, -80, 5);
            ctx.stroke();
            // Dorsal fin - tall and elegant
            ctx.beginPath();
            ctx.moveTo(10, -50);
            ctx.bezierCurveTo(5, -75, 20, -95, 35, -80);
            ctx.bezierCurveTo(45, -70, 50, -58, 42, -50);
            ctx.stroke();
            // Dorsal fin inner lines
            ctx.beginPath();
            ctx.moveTo(20, -52);
            ctx.bezierCurveTo(18, -68, 28, -78, 34, -72);
            ctx.stroke();
            // Belly fin (pelvic)
            ctx.beginPath();
            ctx.moveTo(5, 48);
            ctx.bezierCurveTo(0, 65, 15, 75, 25, 65);
            ctx.bezierCurveTo(30, 58, 28, 50, 22, 48);
            ctx.stroke();
            // Small anal fin
            ctx.beginPath();
            ctx.moveTo(-30, 42);
            ctx.bezierCurveTo(-35, 55, -22, 60, -18, 50);
            ctx.bezierCurveTo(-15, 45, -20, 42, -25, 42);
            ctx.stroke();
            // Eye - large and expressive
            ctx.beginPath();
            ctx.arc(42, -12, 14, 0, Math.PI * 2);
            ctx.stroke();
            // Pupil
            ctx.beginPath();
            ctx.arc(45, -12, 7, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(100,100,100,0.25)';
            ctx.fill();
            // Eye highlight
            ctx.beginPath();
            ctx.arc(48, -16, 3, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(100,100,100,0.15)';
            ctx.fill();
            // Mouth - cute smile
            ctx.beginPath();
            ctx.moveTo(72, 2);
            ctx.bezierCurveTo(68, 10, 60, 14, 55, 10);
            ctx.stroke();
            // Lip detail
            ctx.beginPath();
            ctx.moveTo(74, -2);
            ctx.bezierCurveTo(76, 0, 76, 4, 72, 2);
            ctx.stroke();
            // Scale pattern - 3 rows of arcs
            for (let row = 0; row < 3; row++) {
                for (let i = 0; i < 4; i++) {
                    ctx.beginPath();
                    const sx = -15 + i * 20 - row * 5;
                    const sy = -20 + row * 18;
                    ctx.arc(sx, sy, 10, -0.8, 0.8);
                    ctx.stroke();
                }
            }
            // Gill line
            ctx.beginPath();
            ctx.arc(30, 0, 22, -1.0, 1.0);
            ctx.stroke();
            // Side stripe
            ctx.beginPath();
            ctx.moveTo(60, -5);
            ctx.bezierCurveTo(30, -3, -10, 0, -50, 5);
            ctx.stroke();
        }

        function drawCarOutline(ctx) {
            // Main body - rounded sedan shape
            ctx.beginPath();
            ctx.moveTo(-95, 5);
            ctx.quadraticCurveTo(-100, -5, -95, -15);
            ctx.lineTo(-90, -28);
            ctx.quadraticCurveTo(-88, -35, -78, -35);
            ctx.lineTo(-42, -35);
            // Roof curve
            ctx.lineTo(-30, -72);
            ctx.quadraticCurveTo(-28, -78, -22, -78);
            ctx.lineTo(38, -78);
            ctx.quadraticCurveTo(44, -78, 46, -72);
            ctx.lineTo(62, -35);
            ctx.lineTo(82, -35);
            ctx.quadraticCurveTo(100, -35, 102, -15);
            ctx.lineTo(102, 5);
            ctx.quadraticCurveTo(102, 18, 92, 22);
            ctx.lineTo(78, 22);
            // Wheel arch front
            ctx.quadraticCurveTo(75, 35, 60, 38);
            ctx.quadraticCurveTo(45, 35, 42, 22);
            ctx.lineTo(-28, 22);
            // Wheel arch rear
            ctx.quadraticCurveTo(-32, 35, -47, 38);
            ctx.quadraticCurveTo(-62, 35, -65, 22);
            ctx.lineTo(-82, 22);
            ctx.quadraticCurveTo(-95, 18, -95, 5);
            ctx.closePath();
            ctx.stroke();
            // Windshield (front)
            ctx.beginPath();
            ctx.moveTo(46, -72);
            ctx.lineTo(58, -40);
            ctx.lineTo(8, -40);
            ctx.lineTo(8, -72);
            ctx.closePath();
            ctx.stroke();
            // Rear window
            ctx.beginPath();
            ctx.moveTo(-22, -72);
            ctx.lineTo(-36, -40);
            ctx.lineTo(2, -40);
            ctx.lineTo(2, -72);
            ctx.closePath();
            ctx.stroke();
            // Window divider pillar
            ctx.beginPath();
            ctx.moveTo(5, -72);
            ctx.lineTo(5, -40);
            ctx.stroke();
            // Door line
            ctx.beginPath();
            ctx.moveTo(5, -35);
            ctx.lineTo(5, 20);
            ctx.stroke();
            // Door handle (front)
            ctx.beginPath();
            ctx.moveTo(18, -10);
            ctx.lineTo(30, -10);
            ctx.stroke();
            // Door handle (rear)
            ctx.beginPath();
            ctx.moveTo(-8, -10);
            ctx.lineTo(-20, -10);
            ctx.stroke();
            // Front wheel - detailed
            ctx.beginPath();
            ctx.arc(60, 25, 20, 0, Math.PI * 2);
            ctx.stroke();
            ctx.beginPath();
            ctx.arc(60, 25, 12, 0, Math.PI * 2);

        function setupDrawing(canvas) {
            let isDrawing = false;
            let currentColor = '#FF1744';

            canvas.addEventListener('touchstart', (e) => {
                e.preventDefault();
                isDrawing = true;
                const rect = canvas.getBoundingClientRect();
                const touch = e.touches[0];
                const x = touch.clientX - rect.left;
                const y = touch.clientY - rect.top;
                const ctx = CanvasGame.canvasCtx.draw;
                ctx.beginPath();
                ctx.moveTo(x, y);
            });

            canvas.addEventListener('touchmove', (e) => {
                if (!isDrawing) return;
                e.preventDefault();
                const rect = canvas.getBoundingClientRect();
                const touch = e.touches[0];
                const x = touch.clientX - rect.left;
                const y = touch.clientY - rect.top;
                const ctx = CanvasGame.canvasCtx.draw;
                ctx.strokeStyle = currentColor;
                ctx.lineWidth = CanvasGame.brushSize || 8;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.lineTo(x, y);
                ctx.stroke();
            });

            canvas.addEventListener('touchend', () => {
                isDrawing = false;
            });

            canvas.addEventListener('mousedown', (e) => {
                isDrawing = true;
                const rect = canvas.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const ctx = CanvasGame.canvasCtx.draw;
                ctx.beginPath();
                ctx.moveTo(x, y);
            });

            canvas.addEventListener('mousemove', (e) => {
                if (!isDrawing) return;
                const rect = canvas.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const ctx = CanvasGame.canvasCtx.draw;
                ctx.strokeStyle = currentColor;
                ctx.lineWidth = CanvasGame.brushSize || 8;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.lineTo(x, y);
                ctx.stroke();
            });

            canvas.addEventListener('mouseup', () => {
                isDrawing = false;
            });

            canvas.addEventListener('mouseleave', () => {
                isDrawing = false;
            });

            window.selectColor = (color, btn) => {
                currentColor = color;
                document.querySelectorAll('.sketch-color-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            };
        }

        function clearCanvas() {
            const ctx = CanvasGame.canvasCtx.draw;
            ctx.clearRect(0, 0, ctx.canvas.width, ctx.canvas.height);
        }

            if (capturedImageURL) {
                const drawing = document.createElement('div');
                drawing.className = 'aquarium-drawing';
                // Use the actual captured drawing as an <img>
                const img = document.createElement('img');
                img.src = capturedImageURL;
                img.style.cssText = 'width:clamp(120px,35vw,220px);height:auto;pointer-events:none;';
                drawing.textContent = '';
                drawing.style.fontSize = '0';
                drawing.appendChild(img);
                drawing.style.top = Math.random() * 40 + 20 + '%';
                drawing.style.left = '-220px';
                aquarium.appendChild(drawing);

                // Bidirectional swimming with head direction matching movement
                let posX = -220;
                let speed = 1.0 + Math.random() * 0.6;
                let goingRight = true;
                // Start facing right (default orientation)
                drawing.style.transition = 'transform 0.4s ease';
                drawing.style.transform = 'scaleX(1)';

                function animateSwim() {
                    if (!CanvasGame.aquariumAnimId) return;
                    const maxX = window.innerWidth + 100;
                    const minX = -250;

                    if (goingRight) {
                        posX += speed;
                        if (posX > maxX) {
                            goingRight = false;
                            // Flip horizontally so head faces left (movement direction)
                            drawing.style.transform = 'scaleX(-1)';
                            const newTop = Math.random() * 40 + 20;
                            drawing.style.top = newTop + '%';
                        }
                    } else {
                        posX -= speed;
                        if (posX < minX) {
                            goingRight = true;
                            // Flip back so head faces right (movement direction)
                            drawing.style.transform = 'scaleX(1)';
                            const newTop = Math.random() * 40 + 20;
                            drawing.style.top = newTop + '%';
                        }
                    }

                    // Gentle bobbing motion
                    const bob = Math.sin(Date.now() / 600) * 5;
                    drawing.style.left = posX + 'px';
                    drawing.style.marginTop = bob + 'px';

                    CanvasGame.aquariumAnimId = requestAnimationFrame(animateSwim);
                }

                CanvasGame.aquariumAnimId = requestAnimationFrame(animateSwim);
            }

            const redrawBtn = document.createElement('button');
            redrawBtn.className = 'aquarium-redraw-btn';
            redrawBtn.textContent = '다시 그리기';
            redrawBtn.onclick = initCanvasGame;
            aquarium.appendChild(redrawBtn);

            area.appendChild(aquarium);
        }

        function cleanupCanvasGame() {
            CanvasGame.running = false;
            CanvasGame.currentShape = null;

            if (CanvasGame.aquariumAnimId) {
                cancelAnimationFrame(CanvasGame.aquariumAnimId);
                CanvasGame.aquariumAnimId = null;
            }

            window.removeEventListener('resize', () => resizeCanvases);

            const homeBtn = document.getElementById('home-btn-3');

            const area = document.getElementById('canvas-area');
            if (area) area.innerHTML = '';
        }

        /* ===== Initialize ===== */
        buildMenu();
    </script>
</body>
</html>
