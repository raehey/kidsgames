        function initAnimalGame() {
            const area = document.getElementById('animal-area');
            area.innerHTML = '';

            const overlay = document.createElement('div');
            overlay.className = 'animal-start-overlay';
            overlay.id = 'animal-start-overlay';
            overlay.innerHTML = `
                <div class="start-emoji">🦁</div>
                <div class="start-text">어떤 동물 소리일까요?</div>
                <button class="animal-start-btn" id="animal-start-btn">시작! 🎉</button>
            `;
            area.appendChild(overlay);

            document.getElementById('animal-start-btn').addEventListener('click', startAnimalGameplay);
            document.getElementById('animal-start-btn').addEventListener('touchend', (e) => {
                e.preventDefault();
                startAnimalGameplay();
            });
        }

        function startAnimalGameplay() {
            getAudioContext().resume();

            const overlay = document.getElementById('animal-start-overlay');
            if (overlay) overlay.remove();

            // Hide home button, show pause button during gameplay
            const homeBtn = document.getElementById('home-btn-2');
            if (homeBtn) homeBtn.style.display = 'none';
            const pauseBtn = document.getElementById('animal-pause-btn');
            if (pauseBtn) pauseBtn.style.display = 'flex';

            AnimalGame.score = 0;
            AnimalGame.stage = 1;
            AnimalGame.stageScore = 0;
            AnimalGame.usedAnswers = [];
            AnimalGame.running = true;
            AnimalGame.locked = false;
            AnimalGame.paused = false;
            updateAnimalScore();
            updateAnimalStage();

            startAnimalRound();
        }

        function startAnimalRound() {
            if (!AnimalGame.running) return;

            AnimalGame.locked = false;

            const oldOverlay = document.querySelector('.animal-result-overlay');
            if (oldOverlay) oldOverlay.remove();
            const oldCelebration = document.querySelector('.confetti-container');
            if (oldCelebration) oldCelebration.remove();
            const oldStageUp = document.querySelector('.bubble-stage-up');
            if (oldStageUp) oldStageUp.remove();

            const choiceCount = AnimalGame.getChoiceCount();

            let availableForAnswer = AnimalGame.animals.filter(
                a => !AnimalGame.usedAnswers.includes(a.id)
            );
            if (availableForAnswer.length === 0) {
                AnimalGame.usedAnswers = [];
                availableForAnswer = [...AnimalGame.animals];
            }

            const answerAnimal = availableForAnswer[Math.floor(Math.random() * availableForAnswer.length)];
            AnimalGame.currentAnswer = answerAnimal.id;
            AnimalGame.usedAnswers.push(answerAnimal.id);

            const others = AnimalGame.animals.filter(a => a.id !== answerAnimal.id);
            const shuffledOthers = others.sort(() => Math.random() - 0.5);
            const choices = [answerAnimal, ...shuffledOthers.slice(0, choiceCount - 1)];
            AnimalGame.currentChoices = choices.sort(() => Math.random() - 0.5);

            buildAnimalGameUI();

            setTimeout(() => {
                if (AnimalGame.running && AnimalGame.currentAnswer) {
                    playAnimalSound(AnimalGame.currentAnswer);
                }
            }, 500);
        }

        function onAnimalCardTap(selectedId) {
            if (!AnimalGame.running || AnimalGame.locked) return;

            const isCorrect = selectedId === AnimalGame.currentAnswer;
            const selectedCard = document.querySelector(`.animal-card[data-animal-id="${selectedId}"]`);
            const area = document.getElementById('animal-area');

            if (isCorrect) {
                AnimalGame.locked = true;
                AnimalGame.score++;
                AnimalGame.stageScore++;
                updateAnimalScore();
                updateAnimalProgress();
                haptic('success');

                if (selectedCard) selectedCard.classList.add('correct-flash');
                showAnimalResultOverlay('⭕', area);
                showConfetti(area);
                playCorrectSound();

                const isStageUp = AnimalGame.stageScore >= AnimalGame.getStageGoal();
                if (isStageUp) {
                    AnimalGame.stage++;
                    AnimalGame.stageScore = 0;
                    AnimalGame.usedAnswers = [];
                    updateAnimalStage();
                    updateAnimalProgress();
                    playStageUpSound();
                    haptic('stageup');

                    const stageOverlay = document.createElement('div');
                    stageOverlay.className = 'bubble-stage-up';
                    stageOverlay.innerHTML = `
                        <div class="stage-up-emoji">🎉</div>
                        <div class="stage-up-text">${AnimalGame.stage}단계!</div>
                    `;
                    area.appendChild(stageOverlay);
                    setTimeout(() => stageOverlay.remove(), 2200);
                }

                AnimalGame.advanceTimer = setTimeout(() => {
                    if (AnimalGame.running) {
                        startAnimalRound();
                    }
                }, isStageUp ? 2500 : 1500);

            } else {
                AnimalGame.locked = true;
                haptic('wrong');

                if (selectedCard) selectedCard.classList.add('wrong-flash');
                showAnimalResultOverlay('❌', area);
                playWrongSound();

                setTimeout(() => {
                    if (AnimalGame.running) {
                        AnimalGame.locked = false;
                        const overlay = document.querySelector('.animal-result-overlay');
                        if (overlay) overlay.remove();
                        if (selectedCard) {
                            selectedCard.classList.remove('wrong-flash');
                            selectedCard.style.background = 'white';
                        }
                    }
                }, 1000);
            }
        }

        function playAnimalSound(animalId) {
            showOnomatopoeia(animalId);

            if (!Settings.soundEnabled) return;
            const ctx = getAudioContext();
            if (!ctx) return;
            const now = ctx.currentTime;

            switch (animalId) {
                case 'dog': {
                    // 멍멍! - Two friendly barks: warm, round, clearly "멍멍" for toddlers
                    const dest = getAudioDest();
                    for (let i = 0; i < 2; i++) {
                        const t = now + i * 0.45;
                        const pitchVar = 1 + (i * 0.05); // second bark slightly higher
                        // Main bark: warm "멍" with clear vowel
                        const o = ctx.createOscillator();
                        const g = ctx.createGain();
                        const f1 = ctx.createBiquadFilter();
                        o.type = 'sawtooth';
                        o.frequency.setValueAtTime(180 * pitchVar, t);
                        o.frequency.linearRampToValueAtTime(350 * pitchVar, t + 0.03);
                        o.frequency.linearRampToValueAtTime(250 * pitchVar, t + 0.10);
                        o.frequency.linearRampToValueAtTime(160 * pitchVar, t + 0.28);
                        // Warm bandpass for clear "ㅓ" vowel
                        f1.type = 'bandpass'; f1.frequency.setValueAtTime(650, t); f1.Q.setValueAtTime(3, t);
                        g.gain.setValueAtTime(0.001, t);
                        g.gain.linearRampToValueAtTime(0.45, t + 0.015);
                        g.gain.setValueAtTime(0.38, t + 0.10);
                        g.gain.exponentialRampToValueAtTime(0.001, t + 0.28);
                        o.connect(f1); f1.connect(g); g.connect(dest);
                        o.start(t); o.stop(t + 0.28);
                        // Warm sub for body
                        const sub = ctx.createOscillator();
                        const subG = ctx.createGain();
                        sub.type = 'sine';
                        sub.frequency.setValueAtTime(110 * pitchVar, t);
                        sub.frequency.linearRampToValueAtTime(85 * pitchVar, t + 0.25);
                        subG.gain.setValueAtTime(0.001, t);
                        subG.gain.linearRampToValueAtTime(0.18, t + 0.02);
                        subG.gain.exponentialRampToValueAtTime(0.001, t + 0.25);
                        sub.connect(subG); subG.connect(dest);
                        sub.start(t); sub.stop(t + 0.25);
                        // Soft "ㅁ" attack noise
                        const nBuf = ctx.createBuffer(1, ctx.sampleRate * 0.025, ctx.sampleRate);
                        const nData = nBuf.getChannelData(0);
                        for (let j = 0; j < nData.length; j++) nData[j] = (Math.random() * 2 - 1) * (1 - j / nData.length) * 0.6;
                        const ns = ctx.createBufferSource(); ns.buffer = nBuf;
                        const nf = ctx.createBiquadFilter(); nf.type = 'lowpass'; nf.frequency.setValueAtTime(1200, t);
                        const ng = ctx.createGain();
                        ng.gain.setValueAtTime(0.12, t); ng.gain.exponentialRampToValueAtTime(0.001, t + 0.025);
                        ns.connect(nf); nf.connect(ng); ng.connect(dest);
                        ns.start(t); ns.stop(t + 0.025);
                    }
                    break;
                }
                case 'cat': {
                    // 야옹~ - Sweet meow: clear "야" rising → "옹" falling, gentle vibrato
                    const dest = getAudioDest();
                    const dur = 0.85;
                    const o = ctx.createOscillator();
                    const g = ctx.createGain();
                    o.type = 'sine';
                    // Clear pitch contour: "야" rises, "옹" falls gently
                    o.frequency.setValueAtTime(320, now);
                    o.frequency.linearRampToValueAtTime(580, now + 0.10);
                    o.frequency.setValueAtTime(570, now + 0.28);
                    o.frequency.linearRampToValueAtTime(440, now + 0.50);
                    o.frequency.linearRampToValueAtTime(340, now + dur);
                    g.gain.setValueAtTime(0.001, now);
                    g.gain.linearRampToValueAtTime(0.32, now + 0.04);
                    g.gain.setValueAtTime(0.30, now + 0.30);
                    g.gain.exponentialRampToValueAtTime(0.001, now + dur);
                    o.connect(g); g.connect(dest);
                    o.start(now); o.stop(now + dur);
                    // Soft harmonic for warmth
                    const o2 = ctx.createOscillator();
                    const g2 = ctx.createGain();
                    o2.type = 'sine';
                    o2.frequency.setValueAtTime(640, now);
                    o2.frequency.linearRampToValueAtTime(1160, now + 0.10);
                    o2.frequency.setValueAtTime(1140, now + 0.28);
                    o2.frequency.linearRampToValueAtTime(880, now + 0.50);
                    o2.frequency.linearRampToValueAtTime(680, now + dur);
                    g2.gain.setValueAtTime(0.001, now);
                    g2.gain.linearRampToValueAtTime(0.12, now + 0.04);
                    g2.gain.setValueAtTime(0.10, now + 0.30);
                    g2.gain.exponentialRampToValueAtTime(0.001, now + dur);
                    o2.connect(g2); g2.connect(dest);
                    o2.start(now); o2.stop(now + dur);
                    // Gentle vibrato for meow character
                    const v = ctx.createOscillator();
                    const vg = ctx.createGain();
                    v.frequency.setValueAtTime(5.5, now); vg.gain.setValueAtTime(16, now);
                    v.connect(vg); vg.connect(o.frequency);
                    v.start(now); v.stop(now + dur);
                    break;
                }
                case 'lion': {
                    // 어흥! - Deep growl: clearly "어흥" with rumble, but not scary for toddlers
                    const dest = getAudioDest();
                    const dur = 1.3;
                    const o = ctx.createOscillator();
                    const g = ctx.createGain();
                    const flt = ctx.createBiquadFilter();
                    o.type = 'sawtooth';
                    o.frequency.setValueAtTime(75, now);
                    o.frequency.linearRampToValueAtTime(130, now + 0.20);
                    o.frequency.setValueAtTime(120, now + 0.6);
                    o.frequency.linearRampToValueAtTime(65, now + dur);
                    flt.type = 'lowpass'; flt.frequency.setValueAtTime(420, now); flt.Q.setValueAtTime(1, now);
                    g.gain.setValueAtTime(0.001, now);
                    g.gain.linearRampToValueAtTime(0.38, now + 0.10);
                    g.gain.setValueAtTime(0.34, now + 0.45);
                    g.gain.exponentialRampToValueAtTime(0.001, now + dur);
                    o.connect(flt); flt.connect(g); g.connect(dest);
                    o.start(now); o.stop(now + dur);
                    // Sub-bass body
                    const o2 = ctx.createOscillator();
                    const g2 = ctx.createGain();
                    o2.type = 'sine';
                    o2.frequency.setValueAtTime(45, now);
                    o2.frequency.linearRampToValueAtTime(72, now + 0.20);
                    o2.frequency.linearRampToValueAtTime(40, now + 1.1);
                    g2.gain.setValueAtTime(0.001, now);
                    g2.gain.linearRampToValueAtTime(0.22, now + 0.10);
                    g2.gain.exponentialRampToValueAtTime(0.001, now + 1.1);
                    o2.connect(g2); g2.connect(dest);
                    o2.start(now); o2.stop(now + 1.1);
                    // Gentle growl tremor
                    const tr = ctx.createOscillator();

        function playCorrectSound() {
            if (!Settings.soundEnabled) return;
            const ctx = getAudioContext();
            if (!ctx) return;
            const now = ctx.currentTime;

            // Celebratory ding ding ding - 3 ascending tones
            const dingFreqs = [800, 1000, 1200];
            dingFreqs.forEach((freq, i) => {
                const t = now + i * 0.15;
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(freq, t);
                gain.gain.setValueAtTime(0.001, t);
                gain.gain.linearRampToValueAtTime(0.35, t + 0.03);
                gain.gain.setValueAtTime(0.32, t + 0.08);
                gain.gain.exponentialRampToValueAtTime(0.001, t + 0.22);
                osc.connect(gain);
                gain.connect(getAudioDest());
                osc.start(t);
                osc.stop(t + 0.22);
            });

            // Extended celebratory notes
            const notes = [523, 659, 784, 1047, 1319];
            notes.forEach((freq, i) => {
                const t = now + 0.5 + i * 0.08;
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(freq, t);
                gain.gain.setValueAtTime(0, t);
                gain.gain.linearRampToValueAtTime(0.2, t + 0.02);
                gain.gain.setValueAtTime(0.2, t + 0.1);
                gain.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
                osc.connect(gain);
                gain.connect(getAudioDest());
                osc.start(t);
                osc.stop(t + 0.3);
            });
        }

            if (!Settings.soundEnabled) return;

                clearTimeout(AnimalGame.advanceTimer);
                AnimalGame.advanceTimer = null;
            }

            // Restore home button, hide pause button
            const homeBtn = document.getElementById('home-btn-2');
            if (homeBtn) homeBtn.style.display = 'flex';
            const pauseBtn = document.getElementById('animal-pause-btn');
            if (pauseBtn) { pauseBtn.style.display = 'none'; pauseBtn.textContent = '⏸️'; }

            // Remove pause overlay if exists
            const pauseOverlay = document.querySelector('.animal-pause-overlay');

            const area = document.getElementById('animal-area');
            if (area) area.innerHTML = '';

        function initCanvasGame() {
            const area = document.getElementById('canvas-area');
            area.innerHTML = '';

            const overlay = document.createElement('div');
            overlay.className = 'sketch-start-overlay';
            overlay.id = 'sketch-start-overlay';

            const selection = document.createElement('div');
            selection.className = 'sketch-selection';

            const shapes = [
                { id: 'fish', emoji: '🐟', name: '물고기' },
                { id: 'car', emoji: '🚗', name: '자동차' },
                { id: 'dino', emoji: '🦕', name: '공룡' },
                { id: 'butterfly', emoji: '🦋', name: '나비' }
            ];

            shapes.forEach(shape => {
                const option = document.createElement('div');
                option.className = 'sketch-option';
                option.innerHTML = `
                    <div class="sketch-option-emoji">${shape.emoji}</div>
                    <div class="sketch-option-text">${shape.name}</div>
                `;
                option.onclick = () => { haptic('light'); startSketchDrawing(shape.id); };
                option.ontouchend = (e) => { e.preventDefault(); haptic('light'); startSketchDrawing(shape.id); };
                selection.appendChild(option);
            });

            overlay.appendChild(selection);
            area.appendChild(overlay);
        }

        function startSketchDrawing(shapeId) {

            if (homeBtn) homeBtn.style.display = 'none';
            const pauseBtn = document.getElementById('canvas-pause-btn');
            if (pauseBtn) pauseBtn.style.display = 'flex';

            CanvasGame.currentShape = shapeId;
            CanvasGame.running = true;
            CanvasGame.paused = false;

            const area = document.getElementById('canvas-area');
            area.innerHTML = '';

            const screenDiv = document.createElement('div');
            screenDiv.className = 'sketch-draw-screen';

            const canvasWrap = document.createElement('div');
            canvasWrap.className = 'sketch-canvas-wrap';

            const outlineCanvas = document.createElement('canvas');
            outlineCanvas.id = 'sketch-outline-canvas';
            const drawCanvas = document.createElement('canvas');
            drawCanvas.id = 'sketch-draw-canvas';

            canvasWrap.appendChild(outlineCanvas);
            canvasWrap.appendChild(drawCanvas);

        function resizeCanvases(outlineCanvas, drawCanvas) {
            const wrap = document.querySelector('.sketch-canvas-wrap');
            if (!wrap) return;
            const rect = wrap.getBoundingClientRect();
            outlineCanvas.width = rect.width;
            outlineCanvas.height = rect.height;
            drawCanvas.width = rect.width;
            drawCanvas.height = rect.height;
            drawOutline(outlineCanvas);
        }

        function drawOutline(canvas) {
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const cx = canvas.width / 2;
            const cy = canvas.height / 2;
            const scale = Math.min(canvas.width, canvas.height) * 0.003;

            ctx.save();
            ctx.translate(cx, cy);
            ctx.scale(scale, scale);
            ctx.strokeStyle = 'rgba(100, 100, 100, 0.35)';
            ctx.lineWidth = 3;
            ctx.setLineDash([8, 6]);
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';

            switch (CanvasGame.currentShape) {
                case 'fish':
                    drawFishOutline(ctx);
                    break;
                case 'car':
                    drawCarOutline(ctx);
                    break;
                case 'dino':
                    drawDinoOutline(ctx);
                    break;
                case 'butterfly':
                    drawButterflyOutline(ctx);
                    break;
                default:
                    ctx.beginPath();
                    ctx.arc(0, 0, 60, 0, Math.PI * 2);
                    ctx.stroke();
            }

            ctx.restore();
        }

        function drawFishOutline(ctx) {

            ctx.bezierCurveTo(-115, -35, -100, -15, -80, -5);

            ctx.beginPath();

            ctx.bezierCurveTo(-85, 20, -110, 55, -125, 50);
            ctx.bezierCurveTo(-115, 35, -100, 15, -80, 5);
            ctx.stroke();
            // Tail center connection
            ctx.beginPath();
            ctx.moveTo(-80, -5);
            ctx.bezierCurveTo(-75, 0, -75, 0, -80, 5);
            ctx.stroke();
            // Dorsal fin - tall and elegant
            ctx.beginPath();
            ctx.moveTo(10, -50);
            ctx.bezierCurveTo(5, -75, 20, -95, 35, -80);
            ctx.bezierCurveTo(45, -70, 50, -58, 42, -50);

            // Dorsal fin inner lines

            // Belly fin (pelvic)

            ctx.bezierCurveTo(0, 65, 15, 75, 25, 65);
            ctx.bezierCurveTo(30, 58, 28, 50, 22, 48);

            // Small anal fin
            ctx.beginPath();
            ctx.moveTo(-30, 42);
            ctx.bezierCurveTo(-35, 55, -22, 60, -18, 50);
            ctx.bezierCurveTo(-15, 45, -20, 42, -25, 42);
            ctx.stroke();
            // Eye - large and expressive
            ctx.beginPath();
            ctx.arc(42, -12, 14, 0, Math.PI * 2);
            ctx.stroke();
            // Pupil
            ctx.beginPath();
            ctx.arc(45, -12, 7, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(100,100,100,0.25)';
            ctx.fill();
            // Eye highlight
            ctx.beginPath();
            ctx.arc(48, -16, 3, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(100,100,100,0.15)';
            ctx.fill();
            // Mouth - cute smile
            ctx.beginPath();
            ctx.moveTo(72, 2);
            ctx.bezierCurveTo(68, 10, 60, 14, 55, 10);

            // Lip detail
            ctx.beginPath();
            ctx.moveTo(74, -2);
            ctx.bezierCurveTo(76, 0, 76, 4, 72, 2);
            ctx.stroke();
            // Scale pattern - 3 rows of arcs
            for (let row = 0; row < 3; row++) {
                for (let i = 0; i < 4; i++) {

            ctx.beginPath();
            ctx.ellipse(0, 5, 5, 8, 0, 0, Math.PI * 2);
            ctx.stroke();
            ctx.beginPath();
            ctx.ellipse(0, 18, 5, 8, 0, 0, Math.PI * 2);
            ctx.stroke();
            ctx.beginPath();
            ctx.ellipse(0, 30, 4, 7, 0, 0, Math.PI * 2);
            ctx.stroke();
            // Thorax
            ctx.beginPath();
            ctx.ellipse(0, -5, 6, 8, 0, 0, Math.PI * 2);
            ctx.stroke();
            // Head
            ctx.beginPath();
            ctx.arc(0, -18, 9, 0, Math.PI * 2);
            ctx.stroke();
            // Eyes
            ctx.beginPath();
            ctx.arc(-5, -20, 3, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(100,100,100,0.25)';
            ctx.fill();
            ctx.beginPath();
            ctx.arc(5, -20, 3, 0, Math.PI * 2);
            ctx.fill();
            // Antennae - curling elegantly
            ctx.beginPath();
            ctx.moveTo(-4, -26);
            ctx.bezierCurveTo(-12, -45, -25, -60, -35, -65);
            ctx.bezierCurveTo(-40, -67, -42, -62, -38, -58);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(4, -26);
            ctx.bezierCurveTo(12, -45, 25, -60, 35, -65);
            ctx.bezierCurveTo(40, -67, 42, -62, 38, -58);
            ctx.stroke();
            // Antenna tip dots
            ctx.beginPath();
            ctx.arc(-38, -58, 4, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(100,100,100,0.2)';
            ctx.fill();
            ctx.beginPath();
            ctx.arc(38, -58, 4, 0, Math.PI * 2);
            ctx.fill();
            // Tiny legs
            ctx.beginPath();
            ctx.moveTo(-4, 8);
            ctx.lineTo(-12, 14);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(4, 8);
            ctx.lineTo(12, 14);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(-4, 18);
            ctx.lineTo(-12, 24);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(4, 18);
            ctx.lineTo(12, 24);
            ctx.stroke();
        }

        function setupDrawing(canvas) {
            let isDrawing = false;
            let currentColor = '#FF1744';

            canvas.addEventListener('touchstart', (e) => {
                e.preventDefault();
                isDrawing = true;
                const rect = canvas.getBoundingClientRect();
                const touch = e.touches[0];
                const x = touch.clientX - rect.left;
                const y = touch.clientY - rect.top;
                const ctx = CanvasGame.canvasCtx.draw;
                ctx.beginPath();
                ctx.moveTo(x, y);
            });

            canvas.addEventListener('touchmove', (e) => {
                if (!isDrawing) return;
                e.preventDefault();
                const rect = canvas.getBoundingClientRect();
                const touch = e.touches[0];
                const x = touch.clientX - rect.left;
                const y = touch.clientY - rect.top;
                const ctx = CanvasGame.canvasCtx.draw;
                if (CanvasGame.eraserMode) {
                    ctx.globalCompositeOperation = 'destination-out';
                    ctx.strokeStyle = 'rgba(0,0,0,1)';
                } else {
                    ctx.globalCompositeOperation = 'source-over';
                    ctx.strokeStyle = currentColor;
                }
                ctx.lineWidth = CanvasGame.brushSize || 8;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.lineTo(x, y);
                ctx.stroke();
            });

            canvas.addEventListener('touchend', () => {
                isDrawing = false;
            });

            canvas.addEventListener('mousedown', (e) => {
                isDrawing = true;
                const rect = canvas.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const ctx = CanvasGame.canvasCtx.draw;
                ctx.beginPath();
                ctx.moveTo(x, y);
            });

            canvas.addEventListener('mousemove', (e) => {
                if (!isDrawing) return;
                const rect = canvas.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const ctx = CanvasGame.canvasCtx.draw;
                if (CanvasGame.eraserMode) {
                    ctx.globalCompositeOperation = 'destination-out';
                    ctx.strokeStyle = 'rgba(0,0,0,1)';
                } else {
                    ctx.globalCompositeOperation = 'source-over';
                    ctx.strokeStyle = currentColor;
                }
                ctx.lineWidth = CanvasGame.brushSize || 8;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.lineTo(x, y);
                ctx.stroke();
            });

            canvas.addEventListener('mouseup', () => {
                isDrawing = false;
            });

            canvas.addEventListener('mouseleave', () => {
                isDrawing = false;
            });

            window.selectColor = (color, btn) => {
                currentColor = color;
                CanvasGame.eraserMode = false;
                document.querySelectorAll('.sketch-color-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.sketch-brush-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            };
        }

            const ctx = CanvasGame.canvasCtx.draw;

            const rect = card.getBoundingClientRect();

                        50% { transform: translateY(-4px) scale(1.01); }
                    }
                    .game-card { animation: cardBreathe 3s ease-in-out infinite, cardGlowPulse 3.2s ease-in-out infinite; }
                    .game-card:nth-child(2) { animation-delay: 0.8s, 1.3s; }
                    .game-card:nth-child(3) { animation-delay: 1.6s, 2.6s; }
                `;
                document.head.appendChild(s);
            }
        }

        /* ===== Initialize ===== */
        buildMenu();
        addCardBreathing();
    </script>
</body>
