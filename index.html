        function playCorrectSound() {
            if (!Settings.soundEnabled) return;
            const ctx = getAudioContext();
            if (!ctx) return;
            const now = ctx.currentTime;

            const notes = [523, 659, 784, 1047];
            notes.forEach((freq, i) => {
                const t = now + i * 0.1;
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(freq, t);
                gain.gain.setValueAtTime(0, t);
                gain.gain.linearRampToValueAtTime(0.25, t + 0.02);
                gain.gain.setValueAtTime(0.25, t + 0.08);
                gain.gain.exponentialRampToValueAtTime(0.001, t + 0.25);
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.start(t);
                osc.stop(t + 0.25);
            });
        }

        function playWrongSound() {
            if (!Settings.soundEnabled) return;
            const ctx = getAudioContext();
            if (!ctx) return;
            const now = ctx.currentTime;

            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(350, now);
            osc.frequency.linearRampToValueAtTime(200, now + 0.25);
            gain.gain.setValueAtTime(0.2, now);
            gain.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.start(now);
            osc.stop(now + 0.3);

            const osc2 = ctx.createOscillator();
            const gain2 = ctx.createGain();
            osc2.type = 'triangle';
            osc2.frequency.setValueAtTime(300, now + 0.15);
            osc2.frequency.linearRampToValueAtTime(150, now + 0.4);
            gain2.gain.setValueAtTime(0.18, now + 0.15);
            gain2.gain.exponentialRampToValueAtTime(0.001, now + 0.45);
            osc2.connect(gain2);
            gain2.connect(ctx.destination);
            osc2.start(now + 0.15);
            osc2.stop(now + 0.45);
        }

        function cleanupAnimalGame() {
            AnimalGame.running = false;
            AnimalGame.locked = false;
            AnimalGame.currentAnswer = null;
            AnimalGame.stage = 1;
            AnimalGame.stageScore = 0;
            AnimalGame.usedAnswers = [];

            if (AnimalGame.advanceTimer) {
                clearTimeout(AnimalGame.advanceTimer);
                AnimalGame.advanceTimer = null;
            }

            const area = document.getElementById('animal-area');
            if (area) area.innerHTML = '';
        }

        /* ===== GAME 3: 마법의 스케치북 ===== */
        const SketchGame = {
            drawCanvas: null,
            drawCtx: null,
            outlineCanvas: null,
            outlineCtx: null,
            drawing: false,
            currentColor: '#FF1744',
            brushSize: 12,
            lastX: 0,
            lastY: 0,
            mode: 'draw',
            selectedOutline: 'fish',
            aquariumDrawings: [],

            colors: [
                { name: '빨강', hex: '#FF1744' },
                { name: '노랑', hex: '#FFD600' },
                { name: '파랑', hex: '#2979FF' },
                { name: '초록', hex: '#00C853' },
                { name: '보라', hex: '#AA00FF' },
                { name: '주황', hex: '#FF6D00' }
            ],

            brushes: [
                { label: '작게', size: 6 },
                { label: '보통', size: 14 },
                { label: '크게', size: 26 }
            ],

            outlines: [
                { id: 'fish', label: '물고기' },
                { id: 'car', label: '자동차' },
                { id: 'house', label: '집' },
                { id: 'butterfly', label: '나비' }
            ]
        };

        function initCanvasGame() {
            const area = document.getElementById('canvas-area');
            area.innerHTML = '';

            const overlay = document.createElement('div');
            overlay.className = 'sketch-start-overlay';
            overlay.id = 'sketch-start-overlay';
            overlay.innerHTML = `
                <div class="start-emoji">🎨</div>
                <div class="start-text">윤곽선을 선택하세요!</div>
                <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; width: 100%; max-width: 300px;">
                    ${SketchGame.outlines.map((out, i) => `
                        <button style="background: linear-gradient(135deg, #FFB74D, #FFA726); color: white; border: none; border-radius: 16px; padding: 16px; font-size: 1rem; font-weight: 700; cursor: pointer; transition: transform 0.2s;" onclick="selectOutline('${out.id}')">${out.label}</button>
                    `).join('')}
                </div>
            `;
            area.appendChild(overlay);
        }

        function selectOutline(id) {
            SketchGame.selectedOutline = id;
            const overlay = document.getElementById('sketch-start-overlay');
            if (overlay) overlay.remove();
            startSketchGameplay();
        }

        function startSketchGameplay() {
            buildSketchDrawScreen();
        }

        function buildSketchDrawScreen() {
            const area = document.getElementById('canvas-area');
            area.innerHTML = '';

            const drawScreen = document.createElement('div');
            drawScreen.className = 'sketch-draw-screen';
            drawScreen.id = 'sketch-draw-screen';

            const canvasWrap = document.createElement('div');
            canvasWrap.className = 'sketch-canvas-wrap';
            canvasWrap.id = 'sketch-canvas-wrap';

            const outlineCanvas = document.createElement('canvas');
            outlineCanvas.id = 'sketch-outline-canvas';
            const drawCanvas = document.createElement('canvas');
            drawCanvas.id = 'sketch-draw-canvas';

            canvasWrap.appendChild(outlineCanvas);
            canvasWrap.appendChild(drawCanvas);

            const toolbar = document.createElement('div');
            toolbar.className = 'sketch-toolbar';
            toolbar.id = 'sketch-toolbar';

            SketchGame.colors.forEach((c, i) => {
                const btn = document.createElement('div');
                btn.className = 'sketch-color-btn' + (i === 0 ? ' active' : '');
                btn.style.background = c.hex;
                btn.dataset.color = c.hex;
                btn.addEventListener('click', () => selectSketchColor(c.hex, btn));
                btn.addEventListener('touchend', (e) => { e.preventDefault(); selectSketchColor(c.hex, btn); });
                toolbar.appendChild(btn);
            });

            const div1 = document.createElement('div');
            div1.className = 'sketch-divider';
            toolbar.appendChild(div1);

            SketchGame.brushes.forEach((b, i) => {
                const btn = document.createElement('div');
                btn.className = 'sketch-brush-btn' + (i === 1 ? ' active' : '');
                btn.dataset.size = b.size;
                const dot = document.createElement('div');
                dot.className = 'sketch-brush-dot';
                const dotSize = Math.max(6, b.size * 0.7);
                dot.style.width = dotSize + 'px';
                dot.style.height = dotSize + 'px';
                btn.appendChild(dot);
                btn.addEventListener('click', () => selectSketchBrush(b.size, btn));
                btn.addEventListener('touchend', (e) => { e.preventDefault(); selectSketchBrush(b.size, btn); });
                toolbar.appendChild(btn);
            });

            const div2 = document.createElement('div');
            div2.className = 'sketch-divider';
            toolbar.appendChild(div2);

            const actionBtns = document.createElement('div');
            actionBtns.className = 'sketch-action-btns';

            const clearBtn = document.createElement('button');
            clearBtn.className = 'sketch-action-btn sketch-clear-btn';
            clearBtn.textContent = '🔄 다시';
            clearBtn.addEventListener('click', clearSketchCanvas);
            clearBtn.addEventListener('touchend', (e) => { e.preventDefault(); clearSketchCanvas(); });

            const magicBtn = document.createElement('button');
            magicBtn.className = 'sketch-action-btn sketch-magic-btn';
            magicBtn.textContent = '마법 보내기 🪄';
            magicBtn.addEventListener('click', sendToAnimation);
            magicBtn.addEventListener('touchend', (e) => { e.preventDefault(); sendToAnimation(); });

            actionBtns.appendChild(clearBtn);
            actionBtns.appendChild(magicBtn);
            toolbar.appendChild(actionBtns);

            drawScreen.appendChild(canvasWrap);
            drawScreen.appendChild(toolbar);
            area.appendChild(drawScreen);

            requestAnimationFrame(() => {
                setupSketchCanvases();
                drawOutlineShape();
            });
        }

        function setupSketchCanvases() {
            const wrap = document.getElementById('sketch-canvas-wrap');
            if (!wrap) return;

            const rect = wrap.getBoundingClientRect();
            const dpr = window.devicePixelRatio || 1;
            const w = rect.width;
            const h = rect.height;

            const outline = document.getElementById('sketch-outline-canvas');
            const draw = document.getElementById('sketch-draw-canvas');

            [outline, draw].forEach(c => {
                c.width = w * dpr;
                c.height = h * dpr;
                c.style.width = w + 'px';
                c.style.height = h + 'px';
                c.getContext('2d').scale(dpr, dpr);
            });

            SketchGame.outlineCanvas = outline;
            SketchGame.outlineCtx = outline.getContext('2d');
            SketchGame.drawCanvas = draw;
            SketchGame.drawCtx = draw.getContext('2d');

            SketchGame.drawCtx.lineCap = 'round';
            SketchGame.drawCtx.lineJoin = 'round';
            SketchGame.drawCtx.strokeStyle = SketchGame.currentColor;
            SketchGame.drawCtx.lineWidth = SketchGame.brushSize;

            draw.addEventListener('mousedown', sketchStart);
            draw.addEventListener('mousemove', sketchMove);
            draw.addEventListener('mouseup', sketchEnd);
            draw.addEventListener('mouseleave', sketchEnd);

            draw.addEventListener('touchstart', sketchTouchStart, { passive: false });
            draw.addEventListener('touchmove', sketchTouchMove, { passive: false });
            draw.addEventListener('touchend', sketchTouchEnd, { passive: false });
        }

        function drawOutlineShape() {
            const ctx = SketchGame.outlineCtx;
            if (!ctx) return;

            const c = SketchGame.outlineCanvas;
            const dpr = window.devicePixelRatio || 1;
            const w = c.width / dpr;
            const h = c.height / dpr;

            ctx.clearRect(0, 0, w, h);
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 4;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';

            const cx = w * 0.5;
            const cy = h * 0.5;

            if (SketchGame.selectedOutline === 'fish') {
                const scale = Math.min(w, h) * 0.003;
                ctx.save();
                ctx.translate(cx, cy);
                ctx.scale(scale, scale);
                ctx.beginPath();
                ctx.ellipse(0, 0, 80, 50, 0, 0, Math.PI * 2);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(70, -10);
                ctx.lineTo(110, -40);
                ctx.lineTo(110, 40);
                ctx.lineTo(70, 10);
                ctx.stroke();
                ctx.beginPath();
                ctx.arc(-35, -10, 10, 0, Math.PI * 2);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(-15, -45);
                ctx.quadraticCurveTo(0, -80, 25, -48);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, 45);
                ctx.quadraticCurveTo(15, 70, 30, 45);
                ctx.stroke();
                ctx.restore();
            } else if (SketchGame.selectedOutline === 'car') {
                ctx.beginPath();
                ctx.rect(cx - 80, cy - 20, 160, 40);
                ctx.stroke();
                ctx.beginPath();
                ctx.arc(cx - 50, cy + 25, 12, 0, Math.PI * 2);
                ctx.stroke();
                ctx.beginPath();
                ctx.arc(cx + 50, cy + 25, 12, 0, Math.PI * 2);
                ctx.stroke();
                ctx.beginPath();
                ctx.rect(cx - 60, cy - 45, 120, 30);
                ctx.stroke();
            } else if (SketchGame.selectedOutline === 'house') {
                ctx.beginPath();
                ctx.moveTo(cx - 70, cy + 50);
                ctx.lineTo(cx, cy - 50);
                ctx.lineTo(cx + 70, cy + 50);
                ctx.closePath();
                ctx.stroke();
                ctx.beginPath();
                ctx.rect(cx - 60, cy - 20, 120, 70);
                ctx.stroke();
                ctx.beginPath();
                ctx.rect(cx - 25, cy, 50, 50);
                ctx.stroke();
                ctx.beginPath();
                ctx.arc(cx + 45, cy + 20, 10, 0, Math.PI * 2);
                ctx.stroke();
            } else if (SketchGame.selectedOutline === 'butterfly') {
                ctx.beginPath();
                ctx.ellipse(cx - 40, cy - 20, 35, 45, -0.3, 0, Math.PI * 2);
                ctx.stroke();
                ctx.beginPath();
                ctx.ellipse(cx + 40, cy - 20, 35, 45, 0.3, 0, Math.PI * 2);
                ctx.stroke();
                ctx.beginPath();
                ctx.ellipse(cx - 40, cy + 20, 35, 45, 0.3, 0, Math.PI * 2);
                ctx.stroke();
                ctx.beginPath();
                ctx.ellipse(cx + 40, cy + 20, 35, 45, -0.3, 0, Math.PI * 2);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(cx, cy - 50);
                ctx.lineTo(cx, cy + 50);
                ctx.stroke();
            }
        }

        function getSketchPos(e) {
            const rect = SketchGame.drawCanvas.getBoundingClientRect();
            return {
                x: e.clientX - rect.left,
                y: e.clientY - rect.top
            };
        }

        function sketchStart(e) {
            SketchGame.drawing = true;
            const pos = getSketchPos(e);
            SketchGame.lastX = pos.x;
            SketchGame.lastY = pos.y;
            SketchGame.drawCtx.beginPath();
            SketchGame.drawCtx.arc(pos.x, pos.y, SketchGame.brushSize / 2, 0, Math.PI * 2);
            SketchGame.drawCtx.fillStyle = SketchGame.currentColor;
            SketchGame.drawCtx.fill();
        }

        function sketchMove(e) {
            if (!SketchGame.drawing) return;
            const pos = getSketchPos(e);
            const ctx = SketchGame.drawCtx;
            ctx.strokeStyle = SketchGame.currentColor;
            ctx.lineWidth = SketchGame.brushSize;
            ctx.beginPath();
            ctx.moveTo(SketchGame.lastX, SketchGame.lastY);
            ctx.lineTo(pos.x, pos.y);
            ctx.stroke();
            SketchGame.lastX = pos.x;
            SketchGame.lastY = pos.y;
        }

        function sketchEnd() {
            SketchGame.drawing = false;
        }

        function sketchTouchStart(e) {
            e.preventDefault();
            const touch = e.touches[0];
            sketchStart({ clientX: touch.clientX, clientY: touch.clientY });
        }

        function sketchTouchMove(e) {
            e.preventDefault();
            const touch = e.touches[0];
            sketchMove({ clientX: touch.clientX, clientY: touch.clientY });
        }

        function sketchTouchEnd(e) {
            e.preventDefault();
            sketchEnd();
        }

        function selectSketchColor(hex, btn) {
            SketchGame.currentColor = hex;
            document.querySelectorAll('.sketch-color-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        function selectSketchBrush(size, btn) {
            SketchGame.brushSize = size;
            document.querySelectorAll('.sketch-brush-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        function clearSketchCanvas() {
            if (!SketchGame.drawCtx) return;
            const c = SketchGame.drawCanvas;
            const dpr = window.devicePixelRatio || 1;
            SketchGame.drawCtx.clearRect(0, 0, c.width / dpr, c.height / dpr);
        }

        function sendToAnimation() {
            if (!SketchGame.drawCanvas) return;

            const dpr = window.devicePixelRatio || 1;
            const w = SketchGame.drawCanvas.width;
            const h = SketchGame.drawCanvas.height;

            const mergeCanvas = document.createElement('canvas');
            mergeCanvas.width = w;
            mergeCanvas.height = h;
            const mergeCtx = mergeCanvas.getContext('2d');
            mergeCtx.drawImage(SketchGame.outlineCanvas, 0, 0);
            mergeCtx.drawImage(SketchGame.drawCanvas, 0, 0);

            const imgData = mergeCtx.getImageData(0, 0, w, h);
            let minX = w, minY = h, maxX = 0, maxY = 0;
            for (let y = 0; y < h; y++) {
                for (let x = 0; x < w; x++) {
                    const a = imgData.data[(y * w + x) * 4 + 3];
                    if (a > 10) {
                        if (x < minX) minX = x;
                        if (x > maxX) maxX = x;
                        if (y < minY) minY = y;
                        if (y > maxY) maxY = y;
                    }
                }
            }

            const pad = 10;
            minX = Math.max(0, minX - pad);
            minY = Math.max(0, minY - pad);
            maxX = Math.min(w, maxX + pad);
            maxY = Math.min(h, maxY + pad);

            const cropW = maxX - minX;
            const cropH = maxY - minY;

            if (cropW < 10 || cropH < 10) {
                return;
            }

            const cropCanvas = document.createElement('canvas');
            cropCanvas.width = cropW;
            cropCanvas.height = cropH;
            cropCanvas.getContext('2d').drawImage(mergeCanvas, minX, minY, cropW, cropH, 0, 0, cropW, cropH);

            const drawingDataURL = cropCanvas.toDataURL('image/png');

            SketchGame.mode = 'animation';
            buildAnimationScreen(drawingDataURL, cropW / dpr, cropH / dpr);
            playMagicSound();
        }

        function buildAnimationScreen(drawingURL, drawW, drawH) {
            const area = document.getElementById('canvas-area');
            area.innerHTML = '';

            const screen = document.createElement('div');
            screen.className = 'aquarium-screen';
            screen.id = 'aquarium-screen';

            const bg = document.createElement('div');
            bg.className = 'aquarium-bg';
            screen.appendChild(bg);

            const floor = document.createElement('div');
            floor.className = 'aquarium-floor';
            screen.appendChild(floor);

            const maxH = 120;
            const displayH = Math.min(maxH, drawH * 0.6);
            const displayW = drawW * (displayH / drawH);

            for (let i = 0; i < 3; i++) {
                const img = document.createElement('img');
                img.src = drawingURL;
                img.className = 'aquarium-drawing';
                img.style.width = displayW + 'px';
                img.style.height = displayH + 'px';
                img.style.top = (15 + i * 25 + Math.random() * 10) + '%';
                img.style.animationDuration = (6 + i * 3 + Math.random() * 3) + 's';
                img.style.animationDelay = (i * 2.5) + 's';
                img.draggable = false;
                screen.appendChild(img);
            }

            const redrawBtn = document.createElement('button');
            redrawBtn.className = 'aquarium-redraw-btn';
            redrawBtn.textContent = '다시 그리기 🔄';
            redrawBtn.addEventListener('click', () => {
                SketchGame.mode = 'draw';
                buildSketchDrawScreen();
            });
            redrawBtn.addEventListener('touchend', (e) => {
                e.preventDefault();
                SketchGame.mode = 'draw';
                buildSketchDrawScreen();
            });
            screen.appendChild(redrawBtn);

            area.appendChild(screen);
        }

        function playMagicSound() {
            if (!Settings.soundEnabled) return;
            const ctx = getAudioContext();
            if (!ctx) return;
            const now = ctx.currentTime;

            const notes = [523, 659, 784, 1047, 1319, 1568];
            notes.forEach((freq, i) => {
                const t = now + i * 0.07;
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(freq, t);
                gain.gain.setValueAtTime(0, t);
                gain.gain.linearRampToValueAtTime(0.2, t + 0.02);
                gain.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.start(t);
                osc.stop(t + 0.4);
            });
        }

        function cleanupCanvasGame() {
            SketchGame.drawing = false;
            SketchGame.drawCanvas = null;
            SketchGame.drawCtx = null;
            SketchGame.outlineCanvas = null;
            SketchGame.outlineCtx = null;
            SketchGame.mode = 'draw';

            const area = document.getElementById('canvas-area');
            if (area) area.innerHTML = '';
        }

        /* ===== 초기화 ===== */
        document.addEventListener('DOMContentLoaded', () => {
            buildMenu();
        });

        if ('standalone' in navigator && navigator.standalone) {
            document.documentElement.style.height = '100vh';
        }
    </script>
</body>
