            screenDiv.appendChild(toolbar);
            area.appendChild(screenDiv);

            resizeCanvases(outlineCanvas, drawCanvas, maskCanvas);
            CanvasGame.resizeHandler = () => resizeCanvases(outlineCanvas, drawCanvas, maskCanvas);
            window.addEventListener('resize', CanvasGame.resizeHandler);

            CanvasGame.canvases.outline = outlineCanvas;
            CanvasGame.canvases.draw = drawCanvas;
            CanvasGame.canvases.mask = maskCanvas;
            CanvasGame.canvasCtx.outline = outlineCanvas.getContext('2d');
            CanvasGame.canvasCtx.draw = drawCanvas.getContext('2d');
            CanvasGame.canvasCtx.mask = maskCanvas.getContext('2d');

            drawOutline(outlineCanvas);
            fillMask(maskCanvas);
            applyColoringMode();
            setupDrawing(drawCanvas);
        }

        function resizeCanvases(outlineCanvas, drawCanvas, maskCanvas) {
            const wrap = document.querySelector('.sketch-canvas-wrap');
            if (!wrap) return;
            const rect = wrap.getBoundingClientRect();
            outlineCanvas.width = rect.width;
            outlineCanvas.height = rect.height;
            drawCanvas.width = rect.width;
            drawCanvas.height = rect.height;
            if (maskCanvas) {
                maskCanvas.width = rect.width;
                maskCanvas.height = rect.height;
                fillMask(maskCanvas);
            }
            drawOutline(outlineCanvas);
            applyColoringMode();
        }

        function drawOutline(canvas) {
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const cx = canvas.width / 2;
            const cy = canvas.height / 2;
            const scale = Math.min(canvas.width, canvas.height) * 0.003;

            // Draw a soft colored shadow layer first for depth
            const shadowColors = { fish: '#4FC3F7', car: '#FF8A65', dino: '#81C784', butterfly: '#CE93D8' };
            const shadowColor = shadowColors[CanvasGame.currentShape] || '#999';
            ctx.save();
            ctx.translate(cx, cy + 3 * scale);
            ctx.scale(scale, scale);
            ctx.strokeStyle = shadowColor;
            ctx.globalAlpha = 0.22;
            ctx.lineWidth = 190;
            ctx.setLineDash([]);
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';

            switch (CanvasGame.currentShape) {
                case 'fish': drawFishOutline(ctx); break;
                case 'car': drawCarOutline(ctx); break;
                case 'dino': drawDinoOutline(ctx); break;
                case 'butterfly': drawButterflyOutline(ctx); break;
                default: ctx.beginPath(); ctx.arc(0, 0, 60, 0, Math.PI * 2); ctx.stroke();
            }
            ctx.restore();

            // Main outline on top - extra thick for kids
            ctx.save();
            ctx.translate(cx, cy);
            ctx.scale(scale, scale);
            ctx.strokeStyle = 'rgba(5, 5, 5, 1.0)';
            ctx.lineWidth = 160;
            ctx.setLineDash([]);
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';

            switch (CanvasGame.currentShape) {
                case 'fish':
                    drawFishOutline(ctx);
                    break;
                case 'car':
                    drawCarOutline(ctx);
                    break;
                case 'dino':
                    drawDinoOutline(ctx);
                    break;
                case 'butterfly':
                    drawButterflyOutline(ctx);
                    break;
                default:
                    ctx.beginPath();
                    ctx.arc(0, 0, 60, 0, Math.PI * 2);
                    ctx.stroke();
            }

            ctx.restore();
        }

        // Fill the hidden mask canvas with the outline's interior region (solid white)
        function fillMask(canvas) {
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const cx = canvas.width / 2;
            const cy = canvas.height / 2;
            const scale = Math.min(canvas.width, canvas.height) * 0.003;

            ctx.save();
            ctx.translate(cx, cy);
            ctx.scale(scale, scale);
            ctx.fillStyle = '#FFFFFF';

            switch (CanvasGame.currentShape) {
                case 'fish': fillFishMask(ctx); break;
                case 'car': fillCarMask(ctx); break;
                case 'dino': fillDinoMask(ctx); break;
                case 'butterfly': fillButterflyMask(ctx); break;
                default:
                    ctx.beginPath();
                    ctx.arc(0, 0, 60, 0, Math.PI * 2);
                    ctx.fill();
            }
            ctx.restore();
        }

        function fillFishMask(ctx) {

        // Build the shape clip path on the draw canvas context (used for inside-only coloring)
        // This traces the same filled regions as the fillXxxMask functions
        function buildShapeClipPath(ctx, canvas) {
            const cx = canvas.width / 2;
            const cy = canvas.height / 2;
            const scale = Math.min(canvas.width, canvas.height) * 0.003;

            ctx.save();
            ctx.setTransform(1, 0, 0, 1, 0, 0);
            ctx.beginPath();

            // We need to build the path in the same coordinate system as the mask
            const buildInTransform = (pathFn) => {
                ctx.save();
                ctx.translate(cx, cy);
                ctx.scale(scale, scale);
                pathFn(ctx);
                ctx.restore();
            };

            switch (CanvasGame.currentShape) {
                case 'fish': buildInTransform(buildFishClipPath); break;
                case 'car': buildInTransform(buildCarClipPath); break;
                case 'dino': buildInTransform(buildDinoClipPath); break;
                case 'butterfly': buildInTransform(buildButterflyClipPath); break;
                default:
                    ctx.arc(cx, cy, 60 * scale, 0, Math.PI * 2);
            }

            ctx.clip();
            ctx.restore();
        }

        function buildButterflyClipPath(ctx) {

        // Apply coloring mode: in "inside-only" mode, use native canvas clip() for perfect containment
        function applyColoringMode() {
            const drawCanvas = CanvasGame.canvases.draw;
            const maskCanvas = CanvasGame.canvases.mask;
            if (!drawCanvas || !maskCanvas) return;
            const ctx = CanvasGame.canvasCtx.draw;
            ctx.globalCompositeOperation = 'source-over';
        }

        // Clip the entire draw canvas to only show inside mask (fallback compositing method)
        function clipDrawToMask() {
            const drawCanvas = CanvasGame.canvases.draw;
            const maskCanvas = CanvasGame.canvases.mask;
            if (!drawCanvas || !maskCanvas || !CanvasGame.colorInsideOnly) return;
            const ctx = CanvasGame.canvasCtx.draw;
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = drawCanvas.width;
            tempCanvas.height = drawCanvas.height;
            const tempCtx = tempCanvas.getContext('2d');
            tempCtx.drawImage(drawCanvas, 0, 0);
            ctx.clearRect(0, 0, drawCanvas.width, drawCanvas.height);
            ctx.globalCompositeOperation = 'source-over';
            ctx.drawImage(maskCanvas, 0, 0);
            ctx.globalCompositeOperation = 'source-in';
            ctx.drawImage(tempCanvas, 0, 0);
            ctx.globalCompositeOperation = 'source-over';
        }

        function toggleColoringMode() {
            const drawCanvas = CanvasGame.canvases.draw;
            const ctx = CanvasGame.canvasCtx.draw;
            if (!drawCanvas || !ctx) return;

            // Save current visible drawing before toggling
            const savedDrawing = ctx.getImageData(0, 0, drawCanvas.width, drawCanvas.height);

            CanvasGame.colorInsideOnly = !CanvasGame.colorInsideOnly;

            // Update toggle button UI
            const toggleBtn = document.getElementById('sketch-mode-toggle');
            const modeLabel = document.getElementById('sketch-mode-label');
            if (toggleBtn) {
                if (CanvasGame.colorInsideOnly) {
                    toggleBtn.textContent = '🔒';
                    toggleBtn.title = '윤곽선 안에서만 색칠';
                    toggleBtn.classList.remove('free-mode');
                } else {
                    toggleBtn.textContent = '🔓';
                    toggleBtn.title = '자유 그리기';
                    toggleBtn.classList.add('free-mode');
                }
            }
            if (modeLabel) {
                if (CanvasGame.colorInsideOnly) {
                    modeLabel.textContent = '윤곽 안만';
                    modeLabel.classList.remove('free-mode');
                } else {
                    modeLabel.textContent = '자유 그리기';
                    modeLabel.classList.add('free-mode');
                }
            }

            if (CanvasGame.colorInsideOnly) {
                // Switching TO inside-only mode: clip existing drawing to mask
                ctx.clearRect(0, 0, drawCanvas.width, drawCanvas.height);
                ctx.globalCompositeOperation = 'source-over';
                ctx.putImageData(savedDrawing, 0, 0);
                clipDrawToMask();
            } else {
                // Switching TO free mode
                ctx.clearRect(0, 0, drawCanvas.width, drawCanvas.height);
                ctx.globalCompositeOperation = 'source-over';
                ctx.putImageData(savedDrawing, 0, 0);
            }

            // Play subtle mode toggle sound
            if (Settings.soundEnabled) {
                const actx = getAudioContext();
                if (actx) {
                    const t = actx.currentTime;
                    const o = actx.createOscillator();
                    const g = actx.createGain();
                    o.type = 'sine';
                    if (CanvasGame.colorInsideOnly) {
                        o.frequency.setValueAtTime(500, t);
                        o.frequency.linearRampToValueAtTime(700, t + 0.08);
                    } else {
                        o.frequency.setValueAtTime(700, t);
                        o.frequency.linearRampToValueAtTime(500, t + 0.08);
                    }
                    g.gain.setValueAtTime(0.08, t);
                    g.gain.exponentialRampToValueAtTime(0.001, t + 0.1);
                    o.connect(g); g.connect(getAudioDest());
                    o.start(t); o.stop(t + 0.1);
                }
            }
            haptic('light');
        }

        function drawFishOutline(ctx) {
            // Body - smooth fish shape with bezier curves
            // Subtle fill hint (increased alpha for better visibility)
            ctx.save();
            ctx.globalAlpha = 0.38;
            ctx.fillStyle = '#4FC3F7';
            ctx.beginPath();
            ctx.moveTo(75, 0);
            ctx.bezierCurveTo(80, -30, 60, -55, 30, -52);
            ctx.bezierCurveTo(0, -50, -40, -45, -65, -25);
            ctx.bezierCurveTo(-80, -15, -80, 15, -65, 25);

        function setupDrawing(canvas) {
            let isDrawing = false;
            let currentColor = '#FF1744';

            // Helper: begin a clipped stroke session
            function beginClippedStroke(ctx, x, y) {
                ctx.save();
                if (CanvasGame.colorInsideOnly && !CanvasGame.eraserMode) {
                    // Apply native clip path so paint CANNOT go outside the shape
                    const cx = canvas.width / 2;
                    const cy = canvas.height / 2;
                    const scale = Math.min(canvas.width, canvas.height) * 0.003;
                    ctx.beginPath();
                    ctx.save();
                    ctx.translate(cx, cy);
                    ctx.scale(scale, scale);
                    switch (CanvasGame.currentShape) {
                        case 'fish': buildFishClipPath(ctx); break;
                        case 'car': buildCarClipPath(ctx); break;
                        case 'dino': buildDinoClipPath(ctx); break;
                        case 'butterfly': buildButterflyClipPath(ctx); break;
                        default: ctx.arc(0, 0, 60, 0, Math.PI * 2);
                    }
                    ctx.restore();
                    ctx.clip();
                }
                ctx.beginPath();
                ctx.moveTo(x, y);
            }

            function endClippedStroke(ctx) {
                ctx.restore(); // removes clip
            }

            function drawSegment(ctx, x, y) {
                if (CanvasGame.eraserMode) {
                    ctx.globalCompositeOperation = 'destination-out';
                    ctx.strokeStyle = 'rgba(0,0,0,1)';
                } else {
                    ctx.globalCompositeOperation = 'source-over';
                    ctx.strokeStyle = currentColor;
                }
                ctx.lineWidth = CanvasGame.brushSize || 8;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.lineTo(x, y);
                ctx.stroke();
            }

            canvas.addEventListener('touchstart', (e) => {
                e.preventDefault();
                isDrawing = true;
                const rect = canvas.getBoundingClientRect();
                const touch = e.touches[0];
                const x = touch.clientX - rect.left;
                const y = touch.clientY - rect.top;
                const ctx = CanvasGame.canvasCtx.draw;
                beginClippedStroke(ctx, x, y);
            });

            canvas.addEventListener('touchmove', (e) => {
                if (!isDrawing) return;
                e.preventDefault();
                const rect = canvas.getBoundingClientRect();
                const touch = e.touches[0];
                const x = touch.clientX - rect.left;
                const y = touch.clientY - rect.top;
                const ctx = CanvasGame.canvasCtx.draw;
                drawSegment(ctx, x, y);
            }, { passive: false });

            canvas.addEventListener('touchend', () => {
                if (!isDrawing) return;
                isDrawing = false;
                const ctx = CanvasGame.canvasCtx.draw;
                endClippedStroke(ctx);
                // Double-enforce: composite with mask to remove any paint outside outline
                if (CanvasGame.colorInsideOnly && !CanvasGame.eraserMode) {
                    clipDrawToMask();
                }
                saveCanvasState();
            });

            canvas.addEventListener('mousedown', (e) => {
                isDrawing = true;
                const rect = canvas.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const ctx = CanvasGame.canvasCtx.draw;
                beginClippedStroke(ctx, x, y);
            });

            canvas.addEventListener('mousemove', (e) => {
                if (!isDrawing) return;
                const rect = canvas.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const ctx = CanvasGame.canvasCtx.draw;
                drawSegment(ctx, x, y);
            });

            canvas.addEventListener('mouseup', () => {
                if (!isDrawing) return;
                isDrawing = false;
                const ctx = CanvasGame.canvasCtx.draw;
                endClippedStroke(ctx);
                // Double-enforce: composite with mask to remove any paint outside outline
                if (CanvasGame.colorInsideOnly && !CanvasGame.eraserMode) {
                    clipDrawToMask();
                }
                saveCanvasState();
            });

            canvas.addEventListener('mouseleave', () => {
                if (isDrawing) {
                    const ctx = CanvasGame.canvasCtx.draw;
                    endClippedStroke(ctx);
                    // Double-enforce: composite with mask to remove any paint outside outline
                    if (CanvasGame.colorInsideOnly && !CanvasGame.eraserMode) {
                        clipDrawToMask();
                    }
                    saveCanvasState();
                }
                isDrawing = false;
            });

            window.selectColor = (color, btn) => {
                currentColor = color;
                CanvasGame.eraserMode = false;
                document.querySelectorAll('.sketch-color-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.sketch-brush-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            };
        }

        function saveCanvasState() {
            const canvas = CanvasGame.canvases.draw;
            if (!canvas) return;
            const dataURL = canvas.toDataURL();
            CanvasGame.undoStack.push(dataURL);
            if (CanvasGame.undoStack.length > CanvasGame.maxUndoSteps) {
                CanvasGame.undoStack.shift();
            }
        }

        function undoCanvasStroke() {
            if (CanvasGame.undoStack.length === 0) return;
            CanvasGame.undoStack.pop(); // Remove current state
            const canvas = CanvasGame.canvases.draw;
            const ctx = CanvasGame.canvasCtx.draw;
            if (!canvas || !ctx) return;

            ctx.globalCompositeOperation = 'source-over';
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (CanvasGame.undoStack.length > 0) {
                const img = new Image();
                img.onload = () => {
                    ctx.globalCompositeOperation = 'source-over';
                    ctx.drawImage(img, 0, 0);
                    // Re-apply mask mode after restoring
                    if (CanvasGame.colorInsideOnly) {
                        applyColoringMode();
                    }
                };
                img.src = CanvasGame.undoStack[CanvasGame.undoStack.length - 1];
            } else {
                // No undo states left - re-apply mask if needed
                if (CanvasGame.colorInsideOnly) {
                    applyColoringMode();
                }
            }

            // Play soft undo sound
            if (Settings.soundEnabled) {
                const actx = getAudioContext();
                if (actx) {
                    const now = actx.currentTime;
                    const o = actx.createOscillator();
                    const g = actx.createGain();
                    o.type = 'sine';
                    o.frequency.setValueAtTime(600, now);
                    o.frequency.exponentialRampToValueAtTime(350, now + 0.1);
                    g.gain.setValueAtTime(0.1, now);
                    g.gain.exponentialRampToValueAtTime(0.001, now + 0.12);
                    o.connect(g); g.connect(getAudioDest());
                    o.start(now); o.stop(now + 0.12);
                }
            }

            haptic('light');
        }

        function clearCanvas() {
            const ctx = CanvasGame.canvasCtx.draw;
            ctx.globalCompositeOperation = 'source-over';
            ctx.clearRect(0, 0, ctx.canvas.width, ctx.canvas.height);
            CanvasGame.undoStack = [];
            // Re-apply mask if in inside-only mode
            if (CanvasGame.colorInsideOnly) {
                applyColoringMode();
            }
        }

        function startAquarium() {
            const area = document.getElementById('canvas-area');

            // Play magic sparkle sound
            if (Settings.soundEnabled) {
                const ctx = getAudioContext();
                if (ctx) {
                    const now = ctx.currentTime;
                    const dest = getAudioDest();
                    // Ascending magic harp glissando
                    const magicNotes = [523, 659, 784, 988, 1175, 1397, 1568, 2093];
                    magicNotes.forEach((freq, i) => {
                        const t = now + i * 0.06;
                        const osc = ctx.createOscillator();
                        const gain = ctx.createGain();
                        osc.type = 'sine';
                        osc.frequency.setValueAtTime(freq, t);
                        gain.gain.setValueAtTime(0, t);
                        gain.gain.linearRampToValueAtTime(0.18, t + 0.02);
                        gain.gain.exponentialRampToValueAtTime(0.001, t + 0.25);
                        osc.connect(gain); gain.connect(dest);
                        osc.start(t); osc.stop(t + 0.25);
                    });
                    // Sparkle shimmer
                    const shimBuf = ctx.createBuffer(1, ctx.sampleRate * 0.5, ctx.sampleRate);
                    const shimData = shimBuf.getChannelData(0);
                    for (let j = 0; j < shimData.length; j++) shimData[j] = (Math.random() * 2 - 1) * Math.pow(1 - j / shimData.length, 1.5) * 0.2;
                    const shimSrc = ctx.createBufferSource(); shimSrc.buffer = shimBuf;
                    const shimFlt = ctx.createBiquadFilter(); shimFlt.type = 'highpass'; shimFlt.frequency.setValueAtTime(4000, now);
                    const shimG = ctx.createGain();
                    shimG.gain.setValueAtTime(0.08, now + 0.2); shimG.gain.exponentialRampToValueAtTime(0.001, now + 0.6);
                    shimSrc.connect(shimFlt); shimFlt.connect(shimG); shimG.connect(dest);
                    shimSrc.start(now + 0.2); shimSrc.stop(now + 0.6);
                }
            }

            // Show sparkle transition overlay
            const sparkleOverlay = document.createElement('div');
            sparkleOverlay.style.cssText = 'position:absolute;inset:0;z-index:500;background:radial-gradient(circle at center,rgba(255,255,255,0.95),rgba(200,220,255,0.9));display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;animation:sparkleTransIn 0.8s ease-out forwards;pointer-events:none;';

            `;
            // Add sparkle particles floating around

            for (let i = 0; i < 20; i++) {

                    sw.innerHTML = `<svg width="24" height="${height}" viewBox="0 0 24 ${height}" style="overflow:visible;">
                        <path d="M12,${height} Q6,${height*0.7} 14,${height*0.5} Q4,${height*0.3} 12,${height*0.1} Q10,${height*0.05} 12,0" fill="none" stroke="${seaweedColors[i]}" stroke-width="5" stroke-linecap="round"/>
                        ${Math.random()>0.4 ? `<path d="M12,${height*0.6} Q${Math.random()>0.5?20:4},${height*0.45} ${Math.random()>0.5?18:6},${height*0.35}" fill="none" stroke="${seaweedColors[i]}" stroke-width="3" stroke-linecap="round"/>` : ''}
                    </svg>`;
                    seaweedContainer.appendChild(sw);
                });
                aquarium.appendChild(seaweedContainer);

                // Corals
                const decorations = document.createElement('div');
                decorations.style.cssText = 'position:absolute;bottom:4%;left:0;right:0;z-index:5;pointer-events:none;display:flex;align-items:flex-end;justify-content:space-around;padding:0 5%;';
                const coralData = [{color:'#FF7043',h:45},{color:'#E91E63',h:35},{color:'#FF5722',h:50},{color:'#FFA726',h:30},{color:'#AB47BC',h:40}];
                coralData.forEach(cd => {
                    const c = document.createElement('div');
                    c.innerHTML = `<svg width="40" height="${cd.h}" viewBox="0 0 40 ${cd.h}"><path d="M20,${cd.h} L20,${cd.h*0.4} Q15,${cd.h*0.2} 10,${cd.h*0.1} M20,${cd.h*0.4} Q25,${cd.h*0.15} 30,${cd.h*0.05} M20,${cd.h*0.5} Q12,${cd.h*0.35} 5,${cd.h*0.25}" fill="none" stroke="${cd.color}" stroke-width="4" stroke-linecap="round"/><circle cx="10" cy="${cd.h*0.1}" r="5" fill="${cd.color}" opacity="0.8"/><circle cx="30" cy="${cd.h*0.05}" r="5" fill="${cd.color}" opacity="0.8"/><circle cx="5" cy="${cd.h*0.25}" r="4" fill="${cd.color}" opacity="0.8"/></svg>`;
                    decorations.appendChild(c);
                });
                aquarium.appendChild(decorations);

                // Starfish, shell, treasure
                const starfish = document.createElement('div');
                starfish.style.cssText = 'position:absolute;bottom:8%;left:15%;z-index:5;font-size:28px;animation:starPulse 3s ease-in-out infinite;pointer-events:none;';
                starfish.textContent = '⭐';
                aquarium.appendChild(starfish);
                const shell = document.createElement('div');
                shell.style.cssText = 'position:absolute;bottom:6%;right:20%;z-index:5;font-size:22px;pointer-events:none;';
                shell.textContent = '🐚';
                aquarium.appendChild(shell);
                const treasure = document.createElement('div');
                treasure.style.cssText = 'position:absolute;bottom:5%;right:35%;z-index:5;pointer-events:none;animation:starPulse 4s ease-in-out 1s infinite;';
                treasure.innerHTML = `<svg width="48" height="40" viewBox="0 0 48 40"><rect x="4" y="16" width="40" height="22" rx="3" fill="#8D6E63" stroke="#5D4037" stroke-width="1.5"/><rect x="4" y="16" width="40" height="10" rx="3" fill="#A1887F"/><path d="M4,20 Q24,10 44,20" fill="#795548" stroke="#5D4037" stroke-width="1"/><rect x="20" y="18" width="8" height="8" rx="1" fill="#FFD54F" stroke="#F9A825" stroke-width="1"/><circle cx="24" cy="22" r="2" fill="#F9A825"/></svg>`;
                aquarium.appendChild(treasure);

                // Small background fish
                for (let i = 0; i < 3; i++) {
                    const bgFish = document.createElement('div');
                    const fishY = 20 + Math.random() * 40;
                    const fishSize = 18 + Math.random() * 12;
                    const fishSpeed = 8 + Math.random() * 6;
                    const fishDelay = Math.random() * 5;
                    bgFish.style.cssText = `position:absolute;top:${fishY}%;z-index:4;font-size:${fishSize}px;opacity:0.4;animation:swimRight ${fishSpeed}s linear ${fishDelay}s infinite;pointer-events:none;`;
                    bgFish.textContent = ['🐠','🐡','🦐'][i];
                    aquarium.appendChild(bgFish);
                }
            }

            // Capture the actual drawn image from canvases
            const outlineCanvas = CanvasGame.canvases.outline;
            const drawCanvas = CanvasGame.canvases.draw;
            let capturedImageURL = null;

            if (drawCanvas && outlineCanvas) {
                // Merge outline + drawing into one canvas, then export as image
                // First extract only visible strokes (filter out near-invisible mask pixels)
                const mergeCanvas = document.createElement('canvas');
                mergeCanvas.width = drawCanvas.width;
                mergeCanvas.height = drawCanvas.height;
                const mergeCtx = mergeCanvas.getContext('2d');
                mergeCtx.drawImage(outlineCanvas, 0, 0);
                // Draw the user's strokes; filter out mask base layer (alpha ~3)
                const drawData = CanvasGame.canvasCtx.draw.getImageData(0, 0, drawCanvas.width, drawCanvas.height);
                const pixels = drawData.data;
                for (let p = 3; p < pixels.length; p += 4) {
                    if (pixels[p] < 5) pixels[p] = 0; // Remove near-invisible mask pixels
                }
                const cleanDraw = document.createElement('canvas');
                cleanDraw.width = drawCanvas.width;
                cleanDraw.height = drawCanvas.height;
                const cleanCtx = cleanDraw.getContext('2d');
                cleanCtx.putImageData(drawData, 0, 0);
                mergeCtx.drawImage(cleanDraw, 0, 0);
                capturedImageURL = mergeCanvas.toDataURL('image/png');
            }

            if (capturedImageURL) {
                const drawing = document.createElement('div');
                drawing.className = 'aquarium-drawing';
                // Use the actual captured drawing as an <img>
                const img = document.createElement('img');
                img.src = capturedImageURL;
                img.style.cssText = 'width:clamp(150px,42vw,280px);height:auto;pointer-events:none;';
                drawing.textContent = '';
                drawing.style.fontSize = '0';
                drawing.appendChild(img);
                drawing.style.top = Math.random() * 40 + 20 + '%';
                drawing.style.left = '-220px';
                aquarium.appendChild(drawing);

                // Bidirectional swimming with head direction matching movement
                let posX = -220;
                let speed = 1.0 + Math.random() * 0.6;
                let goingRight = true;
                let currentScaleX = 1;
                let targetScaleX = 1;
                const flipSpeed = 0.12; // smooth flip interpolation

                function animateSwim() {
                    if (!CanvasGame.aquariumAnimId) return;
                    const maxX = window.innerWidth + 100;
                    const minX = -250;

                    if (goingRight) {
                        posX += speed;
                        if (posX > maxX) {
                            goingRight = false;
                            targetScaleX = -1;
                            const newTop = Math.random() * 40 + 20;
                            drawing.style.top = newTop + '%';
                        }
                    } else {
                        posX -= speed;
                        if (posX < minX) {
                            goingRight = true;
                            targetScaleX = 1;
                            const newTop = Math.random() * 40 + 20;
                            drawing.style.top = newTop + '%';
                        }
                    }

                    // Smooth interpolation for head direction flip
                    if (currentScaleX !== targetScaleX) {
                        currentScaleX += (targetScaleX - currentScaleX) * flipSpeed;
                        if (Math.abs(currentScaleX - targetScaleX) < 0.05) currentScaleX = targetScaleX;
                    }

                    // Smooth dual-sine bobbing for natural motion
                    const bob = Math.sin(Date.now() / 800) * 8 + Math.sin(Date.now() / 1200) * 3;
                    drawing.style.left = posX + 'px';
                    drawing.style.transform = `scaleX(${currentScaleX}) translateY(${bob}px)`;

                    CanvasGame.aquariumAnimId = requestAnimationFrame(animateSwim);
                }

                CanvasGame.aquariumAnimId = requestAnimationFrame(animateSwim);

                // Add a second drawing with different speed and height (created once, not on every frame)
                if (Math.random() > 0.3) {
                    CanvasGame.secondDrawTimer = setTimeout(() => {
                        CanvasGame.secondDrawTimer = null;
                        const drawing2 = document.createElement('div');
                        drawing2.className = 'aquarium-drawing';
                        const img2 = document.createElement('img');
                        img2.src = capturedImageURL;
                        img2.style.cssText = 'width:clamp(110px,32vw,200px);height:auto;pointer-events:none;';
                        drawing2.appendChild(img2);
                        drawing2.style.top = Math.random() * 35 + 35 + '%';
                        drawing2.style.right = '-220px';
                        aquarium.appendChild(drawing2);

                        let posX2 = window.innerWidth + 100;
                        let speed2 = (0.5 + Math.random() * 0.4);
                        let goingRight2 = false;
                        let currentScaleX2 = -1;
                        let targetScaleX2 = -1;

                        function animateSwim2() {
                            if (!CanvasGame.aquariumAnimId2) return;
                            const maxX = window.innerWidth + 100;
                            const minX = -250;

                            if (goingRight2) {
                                posX2 += speed2;
                                if (posX2 > maxX) {
                                    goingRight2 = false;
                                    targetScaleX2 = -1;
                                    const newTop = Math.random() * 35 + 35;
                                    drawing2.style.top = newTop + '%';
                                }
                            } else {
                                posX2 -= speed2;
                                if (posX2 < minX) {
                                    goingRight2 = true;
                                    targetScaleX2 = 1;
                                    const newTop = Math.random() * 35 + 35;
                                    drawing2.style.top = newTop + '%';
                                }
                            }

                            // Smooth interpolation for head direction flip
                            if (currentScaleX2 !== targetScaleX2) {
                                currentScaleX2 += (targetScaleX2 - currentScaleX2) * 0.12;
                                if (Math.abs(currentScaleX2 - targetScaleX2) < 0.05) currentScaleX2 = targetScaleX2;
                            }

                            const bob2 = Math.sin(Date.now() / 600) * 6 + Math.sin(Date.now() / 1000) * 2;
                            drawing2.style.left = posX2 + 'px';
                            drawing2.style.transform = `scaleX(${currentScaleX2}) translateY(${bob2}px)`;

                            CanvasGame.aquariumAnimId2 = requestAnimationFrame(animateSwim2);
                        }

                        CanvasGame.aquariumAnimId2 = requestAnimationFrame(animateSwim2);
                    }, 1500);
                }

                // Add jellyfish only for fish/aquarium environments
                if (shapeId === 'fish') {
                    for (let j = 0; j < 2; j++) {
                        const jelly = document.createElement('div');
                        jelly.className = 'aquarium-jellyfish';
                        jelly.textContent = '🪼';
                        jelly.style.left = Math.random() * 80 + 10 + '%';
                        jelly.style.top = Math.random() * 40 - 10 + '%';
                        jelly.style.animationDelay = (Math.random() * 4) + 's';
                        jelly.style.animationDuration = (6 + Math.random() * 4) + 's';
                        aquarium.appendChild(jelly);
                    }
                }
            }

            // Ambient underwater bubble sound loop
            if (Settings.soundEnabled) {
                const actx = getAudioContext();
                if (actx) {
                    const dest = getAudioDest();
                    // Create a repeating gentle bubble sound loop
                    function playAquaBubble() {
                        if (!CanvasGame.aquariumAnimId) return;
                        const t = actx.currentTime;
                        const freq = 800 + Math.random() * 600;
                        const o = actx.createOscillator();
                        const g = actx.createGain();
                        o.type = 'sine';
                        o.frequency.setValueAtTime(freq, t);
                        o.frequency.exponentialRampToValueAtTime(freq * 0.5, t + 0.15);
                        g.gain.setValueAtTime(0.001, t);
                        g.gain.linearRampToValueAtTime(0.04, t + 0.02);
                        g.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
                        o.connect(g); g.connect(dest);
                        o.start(t); o.stop(t + 0.15);
                        // Schedule next bubble randomly
                        CanvasGame.aquaBubbleTimer = setTimeout(playAquaBubble, 800 + Math.random() * 2000);
                    }
                    CanvasGame.aquaBubbleTimer = setTimeout(playAquaBubble, 500);
                }
            }

            // Home button for aquarium screen
            const aquaHomeBtn = document.createElement('button');
            aquaHomeBtn.className = 'aquarium-home-btn';
            aquaHomeBtn.textContent = '🏠';
            aquaHomeBtn.onclick = goHome;
            aquarium.appendChild(aquaHomeBtn);

            const redrawBtn = document.createElement('button');
            redrawBtn.className = 'aquarium-redraw-btn';
            redrawBtn.textContent = '🎨 다시 그리기';
            redrawBtn.onclick = initCanvasGame;
            aquarium.appendChild(redrawBtn);

            area.appendChild(aquarium);
        }

        function cleanupCanvasGame() {
            CanvasGame.running = false;
            CanvasGame.paused = false;
            CanvasGame.currentShape = null;
            CanvasGame.colorInsideOnly = true; // reset to default
            CanvasGame.canvases.mask = null;
            CanvasGame.canvasCtx.mask = null;

            if (CanvasGame.aquariumAnimId) {
                cancelAnimationFrame(CanvasGame.aquariumAnimId);
                CanvasGame.aquariumAnimId = null;
            }
            if (CanvasGame.aquariumAnimId2) {
                cancelAnimationFrame(CanvasGame.aquariumAnimId2);
                CanvasGame.aquariumAnimId2 = null;
            }
            if (CanvasGame.secondDrawTimer) {
                clearTimeout(CanvasGame.secondDrawTimer);
                CanvasGame.secondDrawTimer = null;
            }
            if (CanvasGame.aquaBubbleTimer) {
                clearTimeout(CanvasGame.aquaBubbleTimer);
                CanvasGame.aquaBubbleTimer = null;
            }

            if (CanvasGame.resizeHandler) {
                window.removeEventListener('resize', CanvasGame.resizeHandler);
                CanvasGame.resizeHandler = null;
            }

            // Restore home button, hide pause button
            const homeBtn = document.getElementById('home-btn-3');
            if (homeBtn) homeBtn.style.display = 'flex';
            const pauseBtn = document.getElementById('canvas-pause-btn');
            if (pauseBtn) { pauseBtn.style.display = 'none'; pauseBtn.textContent = '⏸️'; }

            // Remove pause overlay if exists
            const pauseOverlay = document.querySelector('.canvas-pause-overlay');
            if (pauseOverlay) pauseOverlay.remove();

            const area = document.getElementById('canvas-area');
            if (area) area.innerHTML = '';
        }

        function toggleCanvasPause() {
            if (CanvasGame.paused) {
                // Resume
                CanvasGame.paused = false;
                const pauseOverlay = document.querySelector('.canvas-pause-overlay');
                if (pauseOverlay) pauseOverlay.remove();
                const pauseBtn = document.getElementById('canvas-pause-btn');
                if (pauseBtn) pauseBtn.textContent = '⏸️';
            } else {
                // Pause
                CanvasGame.paused = true;
                const pauseBtn = document.getElementById('canvas-pause-btn');
                if (pauseBtn) pauseBtn.textContent = '▶️';

                // Show pause overlay
                const gameScreen = document.getElementById('game-canvas');
                const overlay = document.createElement('div');
                overlay.className = 'canvas-pause-overlay pause-overlay';
                overlay.innerHTML = `
                    <div class="pause-title">⏸️ 일시정지</div>
                    <button class="pause-btn-action pause-btn-continue" onclick="toggleCanvasPause()">계속하기 ▶️</button>
                    <button class="pause-btn-action pause-btn-home" onclick="goHome()">홈으로 🏠</button>
                `;
                gameScreen.appendChild(overlay);
            }
        }

        /* ===== Card Ripple Effect + Enhanced Touch Feedback ===== */
        document.addEventListener('touchstart', function(e) {
            const card = e.target.closest('.game-card, .animal-card, .sketch-option');
            if (!card) return;
            const rect = card.getBoundingClientRect();
            const touch = e.touches[0];
            const x = ((touch.clientX - rect.left) / rect.width * 100).toFixed(1);
            const y = ((touch.clientY - rect.top) / rect.height * 100).toFixed(1);
            card.style.setProperty('--tap-x', x + '%');
            card.style.setProperty('--tap-y', y + '%');

            // Create expanding ripple circle at tap point
            const ripple = document.createElement('div');
            const rippleX = touch.clientX - rect.left;
            const rippleY = touch.clientY - rect.top;
            const maxDim = Math.max(rect.width, rect.height) * 2;
            ripple.style.cssText = `position:absolute;left:${rippleX}px;top:${rippleY}px;width:${maxDim}px;height:${maxDim}px;border-radius:50%;background:rgba(255,255,255,0.35);transform:translate(-50%,-50%) scale(0);animation:rippleExpand 0.5s ease-out forwards;pointer-events:none;z-index:10;`;
            card.style.position = 'relative';
            card.style.overflow = 'hidden';
            card.appendChild(ripple);
            setTimeout(() => ripple.remove(), 600);
        }, { passive: true });

        // Add ripple expand keyframe
        if (!document.getElementById('ripple-expand-style')) {
            const rs = document.createElement('style');
            rs.id = 'ripple-expand-style';
            rs.textContent = `
                @keyframes rippleExpand {
                    0% { transform: translate(-50%,-50%) scale(0); opacity: 1; }
                    100% { transform: translate(-50%,-50%) scale(1); opacity: 0; }
                }
            `;
            document.head.appendChild(rs);
        }

        // Add subtle tap sound for all interactive elements
        document.addEventListener('touchstart', function(e) {
            const btn = e.target.closest('button, .game-card, .animal-card, .sketch-option');
            if (!btn) return;
            if (!Settings.soundEnabled) return;
            const ctx = getAudioContext();
            if (!ctx) return;
            const now = ctx.currentTime;
            // Very light tap click sound
            const osc = ctx.createOscillator();
            const g = ctx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(1800, now);
            osc.frequency.exponentialRampToValueAtTime(1200, now + 0.03);
            g.gain.setValueAtTime(0.04, now);
            g.gain.exponentialRampToValueAtTime(0.001, now + 0.04);
            osc.connect(g); g.connect(getAudioDest());
            osc.start(now); osc.stop(now + 0.04);
        }, { passive: true });

        /* ===== Idle Breathing Animation for Menu Cards ===== */
        function addCardBreathing() {
            if (!document.getElementById('breathing-style')) {
                const s = document.createElement('style');
                s.id = 'breathing-style';
                s.textContent = `
                    @keyframes cardBreathe {
                        0%, 100% { transform: translateY(0) scale(1); }
                        50% { transform: translateY(-4px) scale(1.01); }
                    }
                    .game-card { animation: cardBreathe 3s ease-in-out infinite, cardGlowPulse 3.2s ease-in-out infinite; }
                    .game-card:nth-child(2) { animation-delay: 0.8s, 1.3s; }
                    .game-card:nth-child(3) { animation-delay: 1.6s, 2.6s; }
                `;
                document.head.appendChild(s);
            }
        }

        /* ===== Initialize ===== */
        buildMenu();
        addCardBreathing();
    </script>
</body>
</html>
