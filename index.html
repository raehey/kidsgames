        function playAnimalSound(animalId) {
            if (!Settings.soundEnabled) return;
            const ctx = getAudioContext();
            if (!ctx) return;
            const now = ctx.currentTime;

            switch (animalId) {
                case 'dog': {
                    for (let i = 0; i < 2; i++) {
                        const t = now + i * 0.4;
                        const o = ctx.createOscillator();
                        const g = ctx.createGain();
                        const flt = ctx.createBiquadFilter();
                        o.type = 'square';
                        o.frequency.setValueAtTime(200, t);
                        o.frequency.linearRampToValueAtTime(400, t + 0.05);
                        flt.type = 'lowpass';
                        flt.frequency.setValueAtTime(1500, t);
                        g.gain.setValueAtTime(0.01, t);
                        g.gain.linearRampToValueAtTime(0.4, t + 0.02);
                        g.gain.exponentialRampToValueAtTime(0.001, t + 0.25);
                        o.connect(flt); flt.connect(g); g.connect(ctx.destination);
                        o.start(t); o.stop(t + 0.25);
                    }
                    break;
                }

                case 'cat': {
                    for (let i = 0; i < 2; i++) {
                        const t = now + i * 0.85;
                        const o = ctx.createOscillator();
                        const g = ctx.createGain();
                        o.type = 'sine';
                        o.frequency.setValueAtTime(300, t);
                        o.frequency.linearRampToValueAtTime(550, t + 0.2);
                        o.frequency.setValueAtTime(550, t + 0.35);
                        o.frequency.linearRampToValueAtTime(350, t + 0.65);
                        g.gain.setValueAtTime(0, t);
                        g.gain.linearRampToValueAtTime(0.35, t + 0.05);
                        g.gain.setValueAtTime(0.32, t + 0.35);
                        g.gain.exponentialRampToValueAtTime(0.001, t + 0.70);
                        o.connect(g); g.connect(ctx.destination);
                        o.start(t); o.stop(t + 0.70);
                        const v = ctx.createOscillator();
                        const vg = ctx.createGain();
                        v.frequency.setValueAtTime(6, t);
                        vg.gain.setValueAtTime(15, t);
                        v.connect(vg); vg.connect(o.frequency);
                        v.start(t); v.stop(t + 0.70);
                    }
                    break;
                }

                case 'lion': {
                    const dur = 1.5;
                    const o = ctx.createOscillator();
                    const g = ctx.createGain();
                    const flt = ctx.createBiquadFilter();
                    o.type = 'sawtooth';
                    o.frequency.setValueAtTime(70, now);
                    o.frequency.linearRampToValueAtTime(120, now + 0.4);
                    o.frequency.linearRampToValueAtTime(90, now + 1.0);
                    o.frequency.linearRampToValueAtTime(60, now + dur);
                    flt.type = 'lowpass'; flt.frequency.setValueAtTime(400, now);
                    g.gain.setValueAtTime(0, now);
                    g.gain.linearRampToValueAtTime(0.45, now + 0.2);
                    g.gain.setValueAtTime(0.42, now + 0.6);
                    g.gain.exponentialRampToValueAtTime(0.001, now + dur);
                    o.connect(flt); flt.connect(g); g.connect(ctx.destination);
                    o.start(now); o.stop(now + dur);
                    const tr = ctx.createOscillator();
                    const trg = ctx.createGain();
                    tr.frequency.setValueAtTime(8, now); trg.gain.setValueAtTime(20, now);
                    tr.connect(trg); trg.connect(o.frequency);
                    tr.start(now); tr.stop(now + dur);
                    break;
                }

                case 'cow': {
                    const dur = 1.7;
                    const o = ctx.createOscillator();
                    const g = ctx.createGain();
                    const flt = ctx.createBiquadFilter();
                    o.type = 'sawtooth';
                    o.frequency.setValueAtTime(110, now);
                    o.frequency.linearRampToValueAtTime(160, now + 0.3);
                    o.frequency.setValueAtTime(160, now + 0.8);
                    o.frequency.linearRampToValueAtTime(120, now + 1.3);
                    o.frequency.linearRampToValueAtTime(100, now + dur);
                    flt.type = 'lowpass'; flt.frequency.setValueAtTime(700, now); flt.Q.setValueAtTime(1.2, now);
                    g.gain.setValueAtTime(0, now);
                    g.gain.linearRampToValueAtTime(0.4, now + 0.1);
                    g.gain.setValueAtTime(0.38, now + 0.8);
                    g.gain.exponentialRampToValueAtTime(0.001, now + dur);
                    o.connect(flt); flt.connect(g); g.connect(ctx.destination);
                    o.start(now); o.stop(now + dur);
                    const v = ctx.createOscillator(); const vg = ctx.createGain();
                    v.frequency.setValueAtTime(5, now); vg.gain.setValueAtTime(8, now);
                    v.connect(vg); vg.connect(o.frequency);
                    v.start(now); v.stop(now + dur);
                    break;
                }

                case 'chicken': {
                    const o1 = ctx.createOscillator(); const g1 = ctx.createGain();
                    o1.type = 'square';
                    o1.frequency.setValueAtTime(350, now);
                    o1.frequency.linearRampToValueAtTime(600, now + 0.12);
                    g1.gain.setValueAtTime(0.01, now);
                    g1.gain.linearRampToValueAtTime(0.35, now + 0.03);
                    g1.gain.exponentialRampToValueAtTime(0.001, now + 0.16);
                    o1.connect(g1); g1.connect(ctx.destination);
                    o1.start(now); o1.stop(now + 0.16);
                    const o2 = ctx.createOscillator(); const g2 = ctx.createGain();
                    o2.type = 'square';
                    o2.frequency.setValueAtTime(700, now + 0.2);
                    o2.frequency.linearRampToValueAtTime(950, now + 0.32);
                    g2.gain.setValueAtTime(0.01, now + 0.2);
                    g2.gain.linearRampToValueAtTime(0.35, now + 0.22);
                    g2.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
                    o2.connect(g2); g2.connect(ctx.destination);
                    o2.start(now + 0.2); o2.stop(now + 0.4);
                    const o3 = ctx.createOscillator(); const g3 = ctx.createGain();
                    const flt = ctx.createBiquadFilter();
                    o3.type = 'square';
                    o3.frequency.setValueAtTime(900, now + 0.45);
                    o3.frequency.linearRampToValueAtTime(1050, now + 0.65);
                    o3.frequency.linearRampToValueAtTime(600, now + 1.3);
                    flt.type = 'bandpass'; flt.frequency.setValueAtTime(950, now + 0.45); flt.Q.setValueAtTime(1.2, now + 0.45);
                    g3.gain.setValueAtTime(0.01, now + 0.45);
                    g3.gain.linearRampToValueAtTime(0.35, now + 0.48);
                    g3.gain.setValueAtTime(0.32, now + 0.8);
                    g3.gain.exponentialRampToValueAtTime(0.001, now + 1.35);
                    o3.connect(flt); flt.connect(g3); g3.connect(ctx.destination);
                    o3.start(now + 0.45); o3.stop(now + 1.35);
                    break;
                }

                case 'duck': {
                    for (let i = 0; i < 2; i++) {
                        const t = now + i * 0.35;
                        const o = ctx.createOscillator(); const g = ctx.createGain();
                        const flt = ctx.createBiquadFilter();
                        o.type = 'sawtooth';
                        o.frequency.setValueAtTime(200, t);
                        o.frequency.linearRampToValueAtTime(380, t + 0.04);
                        o.frequency.linearRampToValueAtTime(240, t + 0.12);
                        o.frequency.linearRampToValueAtTime(180, t + 0.20);
                        flt.type = 'bandpass'; flt.frequency.setValueAtTime(900, t); flt.Q.setValueAtTime(5, t);
                        g.gain.setValueAtTime(0.01, t);
                        g.gain.linearRampToValueAtTime(0.35, t + 0.02);
                        g.gain.setValueAtTime(0.32, t + 0.08);
                        g.gain.exponentialRampToValueAtTime(0.001, t + 0.22);
                        o.connect(flt); flt.connect(g); g.connect(ctx.destination);
                        o.start(t); o.stop(t + 0.22);
                    }
                    break;
                }

                case 'sheep': {
                    for (let i = 0; i < 2; i++) {
                        const t = now + i * 0.7;
                        const o = ctx.createOscillator(); const g = ctx.createGain();
                        o.type = 'sawtooth';
                        o.frequency.setValueAtTime(240, t);
                        o.frequency.linearRampToValueAtTime(360, t + 0.1);
                        o.frequency.setValueAtTime(360, t + 0.25);
                        o.frequency.linearRampToValueAtTime(300, t + 0.5);
                        const flt = ctx.createBiquadFilter();
                        flt.type = 'lowpass'; flt.frequency.setValueAtTime(900, t);
                        g.gain.setValueAtTime(0, t);
                        g.gain.linearRampToValueAtTime(0.32, t + 0.04);
                        g.gain.setValueAtTime(0.30, t + 0.25);
                        g.gain.exponentialRampToValueAtTime(0.001, t + 0.55);
                        o.connect(flt); flt.connect(g); g.connect(ctx.destination);
                        o.start(t); o.stop(t + 0.55);
                        const v = ctx.createOscillator(); const vg = ctx.createGain();
                        v.frequency.setValueAtTime(10, t); vg.gain.setValueAtTime(30, t);
                        v.connect(vg); vg.connect(o.frequency);
                        v.start(t); v.stop(t + 0.55);
                    }
                    break;
                }

                case 'pig': {
                    for (let i = 0; i < 2; i++) {
                        const t = now + i * 0.5;
                        const o = ctx.createOscillator(); const g = ctx.createGain();
                        const flt = ctx.createBiquadFilter();
                        o.type = 'sawtooth';
                        o.frequency.setValueAtTime(120, t);
                        o.frequency.linearRampToValueAtTime(200, t + 0.06);
                        o.frequency.linearRampToValueAtTime(140, t + 0.22);
                        flt.type = 'lowpass'; flt.frequency.setValueAtTime(600, t);
                        g.gain.setValueAtTime(0.01, t);
                        g.gain.linearRampToValueAtTime(0.36, t + 0.02);
                        g.gain.exponentialRampToValueAtTime(0.001, t + 0.25);
                        o.connect(flt); flt.connect(g); g.connect(ctx.destination);
                        o.start(t); o.stop(t + 0.25);
                    }
                    break;
                }

                case 'horse': {
                    const dur = 1.2;
                    const o = ctx.createOscillator();
                    const g = ctx.createGain();
                    o.type = 'sine';
                    o.frequency.setValueAtTime(320, now);
                    o.frequency.linearRampToValueAtTime(750, now + 0.25);
                    o.frequency.setValueAtTime(750, now + 0.4);
                    o.frequency.linearRampToValueAtTime(450, now + dur);
                    g.gain.setValueAtTime(0, now);
                    g.gain.linearRampToValueAtTime(0.38, now + 0.06);
                    g.gain.setValueAtTime(0.36, now + 0.4);
                    g.gain.exponentialRampToValueAtTime(0.001, now + dur);
                    o.connect(g); g.connect(ctx.destination);
                    o.start(now); o.stop(now + dur);
                    const v = ctx.createOscillator();
                    const vg = ctx.createGain();
                    v.frequency.setValueAtTime(7, now); vg.gain.setValueAtTime(14, now);
                    v.connect(vg); vg.connect(o.frequency);
                    v.start(now); v.stop(now + dur);
                    break;
                }

                case 'elephant': {
                    const dur = 1.5;
                    const o = ctx.createOscillator();
                    const g = ctx.createGain();
                    const flt = ctx.createBiquadFilter();
                    o.type = 'sawtooth';
                    o.frequency.setValueAtTime(150, now);
                    o.frequency.linearRampToValueAtTime(380, now + 0.35);
                    o.frequency.setValueAtTime(380, now + 0.7);
                    o.frequency.linearRampToValueAtTime(200, now + dur);
                    flt.type = 'lowpass'; flt.frequency.setValueAtTime(800, now); flt.Q.setValueAtTime(0.8, now);
                    g.gain.setValueAtTime(0, now);
                    g.gain.linearRampToValueAtTime(0.42, now + 0.15);
                    g.gain.setValueAtTime(0.40, now + 0.7);
                    g.gain.exponentialRampToValueAtTime(0.001, now + dur);
                    o.connect(flt); flt.connect(g); g.connect(ctx.destination);
                    o.start(now); o.stop(now + dur);
                    break;
                }
            }
        }

        function playCorrectSound() {
            if (!Settings.soundEnabled) return;
            const ctx = getAudioContext();
            if (!ctx) return;
            const now = ctx.currentTime;

            const notes = [523, 659, 784, 1047, 1319];
            notes.forEach((freq, i) => {
                const t = now + i * 0.08;
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(freq, t);
                gain.gain.setValueAtTime(0, t);
                gain.gain.linearRampToValueAtTime(0.25, t + 0.02);
                gain.gain.setValueAtTime(0.25, t + 0.1);
                gain.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.start(t);
                osc.stop(t + 0.3);
            });
        }

        function playWrongSound() {
            if (!Settings.soundEnabled) return;
            const ctx = getAudioContext();
            if (!ctx) return;
            const now = ctx.currentTime;

            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(150, now);
            osc.frequency.linearRampToValueAtTime(100, now + 0.3);
            gain.gain.setValueAtTime(0.25, now);
            gain.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.start(now);
            osc.stop(now + 0.3);
        }

        function cleanupAnimalGame() {
            AnimalGame.running = false;

            if (AnimalGame.advanceTimer) {
                clearTimeout(AnimalGame.advanceTimer);
                AnimalGame.advanceTimer = null;
            }

            const homeBtn = document.getElementById('home-btn-2');
            if (homeBtn) homeBtn.classList.remove('mini-pause');

            const area = document.getElementById('animal-area');
            if (area) area.innerHTML = '';
        }

        /* ===== GAME 3: 마법의 스케치북 ===== */
        const CanvasGame = {
            currentShape: null,
            drawingMode: false,
            canvases: { outline: null, draw: null },
            canvasCtx: { outline: null, draw: null },
            running: false
        };

        function initCanvasGame() {
            const area = document.getElementById('canvas-area');
            area.innerHTML = '';

            const overlay = document.createElement('div');
            overlay.className = 'sketch-start-overlay';
            overlay.id = 'sketch-start-overlay';

            const selection = document.createElement('div');
            selection.className = 'sketch-selection';

            const shapes = [
                { id: 'fish', emoji: '🐟', name: '물고기' },
                { id: 'car', emoji: '🚗', name: '자동차' },
                { id: 'house', emoji: '🏠', name: '집' },
                { id: 'butterfly', emoji: '🦋', name: '나비' }
            ];

            shapes.forEach(shape => {
                const option = document.createElement('div');
                option.className = 'sketch-option';
                option.innerHTML = `
                    <div class="sketch-option-emoji">${shape.emoji}</div>
                    <div class="sketch-option-text">${shape.name}</div>
                `;
                option.onclick = () => startSketchDrawing(shape.id);
                option.ontouchend = (e) => { e.preventDefault(); startSketchDrawing(shape.id); };
                selection.appendChild(option);
            });

            overlay.appendChild(selection);
            area.appendChild(overlay);
        }

        function startSketchDrawing(shapeId) {
            getAudioContext().resume();

            const overlay = document.getElementById('sketch-start-overlay');
            if (overlay) overlay.remove();

            // Minimize home button during gameplay
            const homeBtn = document.getElementById('home-btn-3');
            if (homeBtn) homeBtn.classList.add('mini-pause');

            CanvasGame.currentShape = shapeId;
            CanvasGame.running = true;

            const area = document.getElementById('canvas-area');
            area.innerHTML = '';

            const screenDiv = document.createElement('div');
            screenDiv.className = 'sketch-draw-screen';

            const canvasWrap = document.createElement('div');
            canvasWrap.className = 'sketch-canvas-wrap';

            const outlineCanvas = document.createElement('canvas');
            outlineCanvas.id = 'sketch-outline-canvas';
            const drawCanvas = document.createElement('canvas');
            drawCanvas.id = 'sketch-draw-canvas';

            canvasWrap.appendChild(outlineCanvas);
            canvasWrap.appendChild(drawCanvas);

            const toolbar = document.createElement('div');
            toolbar.className = 'sketch-toolbar';

            const colors = ['#FF1744', '#FF6D00', '#FFD600', '#00C853', '#2979FF', '#9C27B0', '#FF4081', '#00BFA5'];
            colors.forEach(color => {
                const btn = document.createElement('button');
                btn.className = 'sketch-color-btn';
                btn.style.background = color;
                if (color === '#FF1744') btn.classList.add('active');
                btn.style.minHeight = '48px';
                btn.onclick = () => selectColor(color, btn);
                toolbar.appendChild(btn);
            });

            toolbar.innerHTML += '<div class="sketch-divider"></div>';

            const brushBtn = document.createElement('button');
            brushBtn.className = 'sketch-brush-btn active';
            brushBtn.innerHTML = '<div class="sketch-brush-dot" style="width: 12px; height: 12px;"></div>';
            brushBtn.style.minHeight = '48px';
            brushBtn.style.minWidth = '48px';
            toolbar.appendChild(brushBtn);

            toolbar.innerHTML += '<div style="flex: 1;"></div>';

            const actionBtns = document.createElement('div');
            actionBtns.className = 'sketch-action-btns';

            const clearBtn = document.createElement('button');
            clearBtn.className = 'sketch-action-btn sketch-clear-btn';
            clearBtn.textContent = '지우기';
            clearBtn.style.minHeight = '48px';
            clearBtn.onclick = clearCanvas;
            actionBtns.appendChild(clearBtn);

            const magicBtn = document.createElement('button');
            magicBtn.className = 'sketch-action-btn sketch-magic-btn';
            magicBtn.textContent = '완성! 🎬';
            magicBtn.style.minHeight = '48px';
            magicBtn.onclick = startAquarium;
            actionBtns.appendChild(magicBtn);

            toolbar.appendChild(actionBtns);
            screenDiv.appendChild(canvasWrap);
            screenDiv.appendChild(toolbar);
            area.appendChild(screenDiv);

            resizeCanvases(outlineCanvas, drawCanvas);
            window.addEventListener('resize', () => resizeCanvases(outlineCanvas, drawCanvas));

            CanvasGame.canvases.outline = outlineCanvas;
            CanvasGame.canvases.draw = drawCanvas;
            CanvasGame.canvasCtx.outline = outlineCanvas.getContext('2d');
            CanvasGame.canvasCtx.draw = drawCanvas.getContext('2d');

            drawOutline(outlineCanvas);
            setupDrawing(drawCanvas);
        }

        function resizeCanvases(outlineCanvas, drawCanvas) {
            const wrap = document.querySelector('.sketch-canvas-wrap');
            if (!wrap) return;
            const rect = wrap.getBoundingClientRect();
            outlineCanvas.width = rect.width;
            outlineCanvas.height = rect.height;
            drawCanvas.width = rect.width;
            drawCanvas.height = rect.height;
            drawOutline(outlineCanvas);
        }

        function drawOutline(canvas) {
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const cx = canvas.width / 2;
            const cy = canvas.height / 2;
            const scale = Math.min(canvas.width, canvas.height) * 0.003;

            ctx.save();
            ctx.translate(cx, cy);
            ctx.scale(scale, scale);
            ctx.strokeStyle = 'rgba(100, 100, 100, 0.35)';
            ctx.lineWidth = 3;
            ctx.setLineDash([8, 6]);
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';

            switch (CanvasGame.currentShape) {
                case 'fish':
                    drawFishOutline(ctx);
                    break;
                case 'car':
                    drawCarOutline(ctx);
                    break;
                case 'house':
                    drawHouseOutline(ctx);
                    break;
                case 'butterfly':
                    drawButterflyOutline(ctx);
                    break;
                default:
                    ctx.beginPath();
                    ctx.arc(0, 0, 60, 0, Math.PI * 2);
                    ctx.stroke();
            }

            ctx.restore();
        }

        function drawFishOutline(ctx) {
            // Body
            ctx.beginPath();
            ctx.ellipse(0, 0, 80, 50, 0, 0, Math.PI * 2);
            ctx.stroke();
            // Tail
            ctx.beginPath();
            ctx.moveTo(-70, 0);
            ctx.lineTo(-120, -40);
            ctx.lineTo(-120, 40);
            ctx.closePath();
            ctx.stroke();
            // Eye
            ctx.beginPath();
            ctx.arc(35, -12, 10, 0, Math.PI * 2);
            ctx.stroke();
            // Pupil
            ctx.beginPath();
            ctx.arc(38, -12, 4, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(100,100,100,0.25)';
            ctx.fill();
            // Mouth
            ctx.beginPath();
            ctx.arc(60, 8, 8, 0.2, 1.2);
            ctx.stroke();
            // Dorsal fin
            ctx.beginPath();
            ctx.moveTo(-10, -48);
            ctx.quadraticCurveTo(10, -85, 40, -48);
            ctx.stroke();
            // Belly fin
            ctx.beginPath();
            ctx.moveTo(0, 48);
            ctx.quadraticCurveTo(15, 72, 30, 48);
            ctx.stroke();
            // Scale lines
            ctx.beginPath();
            ctx.arc(-10, 0, 30, -0.5, 0.5);
            ctx.stroke();
            ctx.beginPath();
            ctx.arc(20, 0, 25, -0.5, 0.5);
            ctx.stroke();
        }

        function drawCarOutline(ctx) {
            // Body
            ctx.beginPath();
            ctx.moveTo(-90, 10);
            ctx.lineTo(-90, -10);
            ctx.quadraticCurveTo(-90, -30, -70, -30);
            ctx.lineTo(-40, -30);
            ctx.lineTo(-25, -65);
            ctx.lineTo(40, -65);
            ctx.lineTo(60, -30);
            ctx.lineTo(80, -30);
            ctx.quadraticCurveTo(95, -30, 95, -10);
            ctx.lineTo(95, 10);
            ctx.quadraticCurveTo(95, 25, 80, 25);
            ctx.lineTo(-75, 25);
            ctx.quadraticCurveTo(-90, 25, -90, 10);
            ctx.closePath();
            ctx.stroke();
            // Windows
            ctx.beginPath();
            ctx.moveTo(-20, -58);
            ctx.lineTo(-35, -35);
            ctx.lineTo(0, -35);
            ctx.closePath();
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(5, -35);
            ctx.lineTo(5, -58);
            ctx.lineTo(35, -58);
            ctx.lineTo(50, -35);
            ctx.closePath();
            ctx.stroke();
            // Wheels
            ctx.beginPath();
            ctx.arc(-50, 25, 18, 0, Math.PI * 2);
            ctx.stroke();
            ctx.beginPath();
            ctx.arc(-50, 25, 8, 0, Math.PI * 2);
            ctx.stroke();
            ctx.beginPath();
            ctx.arc(55, 25, 18, 0, Math.PI * 2);
            ctx.stroke();
            ctx.beginPath();
            ctx.arc(55, 25, 8, 0, Math.PI * 2);
            ctx.stroke();
            // Headlight
            ctx.beginPath();
            ctx.ellipse(90, -10, 8, 12, 0, 0, Math.PI * 2);
            ctx.stroke();
            // Taillight
            ctx.beginPath();
            ctx.ellipse(-85, -10, 6, 10, 0, 0, Math.PI * 2);
            ctx.stroke();
        }

        function drawHouseOutline(ctx) {
            // Roof
            ctx.beginPath();
            ctx.moveTo(0, -90);
            ctx.lineTo(-90, -20);
            ctx.lineTo(90, -20);
            ctx.closePath();
            ctx.stroke();
            // Walls
            ctx.beginPath();
            ctx.rect(-70, -20, 140, 100);
            ctx.stroke();
            // Door
            ctx.beginPath();
            ctx.rect(-15, 25, 30, 55);
            ctx.stroke();
            // Door knob
            ctx.beginPath();
            ctx.arc(10, 55, 3, 0, Math.PI * 2);
            ctx.stroke();
            // Left window
            ctx.beginPath();
            ctx.rect(-58, 0, 30, 30);
            ctx.stroke();
            ctx.moveTo(-43, 0);
            ctx.lineTo(-43, 30);
            ctx.stroke();
            ctx.moveTo(-58, 15);
            ctx.lineTo(-28, 15);
            ctx.stroke();
            // Right window
            ctx.beginPath();
            ctx.rect(28, 0, 30, 30);
            ctx.stroke();
            ctx.moveTo(43, 0);
            ctx.lineTo(43, 30);
            ctx.stroke();
            ctx.moveTo(28, 15);
            ctx.lineTo(58, 15);
            ctx.stroke();
            // Chimney
            ctx.beginPath();
            ctx.rect(40, -75, 20, 40);
            ctx.stroke();
        }

        function drawButterflyOutline(ctx) {
            // Upper left wing
            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.bezierCurveTo(-40, -80, -120, -60, -70, -10);
            ctx.bezierCurveTo(-110, -20, -100, 30, -50, 20);
            ctx.bezierCurveTo(-30, 50, -20, 60, 0, 30);
            ctx.stroke();
            // Upper right wing
            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.bezierCurveTo(40, -80, 120, -60, 70, -10);
            ctx.bezierCurveTo(110, -20, 100, 30, 50, 20);
            ctx.bezierCurveTo(30, 50, 20, 60, 0, 30);
            ctx.stroke();
            // Wing patterns (circles)
            ctx.beginPath();
            ctx.arc(-55, -25, 15, 0, Math.PI * 2);
            ctx.stroke();
            ctx.beginPath();
            ctx.arc(55, -25, 15, 0, Math.PI * 2);
            ctx.stroke();
            ctx.beginPath();
            ctx.arc(-45, 15, 10, 0, Math.PI * 2);
            ctx.stroke();
            ctx.beginPath();
            ctx.arc(45, 15, 10, 0, Math.PI * 2);
            ctx.stroke();
            // Body
            ctx.beginPath();
            ctx.ellipse(0, 10, 6, 30, 0, 0, Math.PI * 2);
            ctx.stroke();
            // Head
            ctx.beginPath();
            ctx.arc(0, -22, 8, 0, Math.PI * 2);
            ctx.stroke();
            // Antennae
            ctx.beginPath();
            ctx.moveTo(-3, -28);
            ctx.quadraticCurveTo(-20, -55, -25, -50);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(3, -28);
            ctx.quadraticCurveTo(20, -55, 25, -50);
            ctx.stroke();
            // Antenna dots
            ctx.beginPath();
            ctx.arc(-25, -50, 4, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(100,100,100,0.25)';
            ctx.fill();
            ctx.beginPath();
            ctx.arc(25, -50, 4, 0, Math.PI * 2);
            ctx.fill();
        }

        function setupDrawing(canvas) {
            let isDrawing = false;
            let currentColor = '#FF1744';

            canvas.addEventListener('touchstart', (e) => {
                e.preventDefault();
                isDrawing = true;
                const rect = canvas.getBoundingClientRect();
                const touch = e.touches[0];
                const x = touch.clientX - rect.left;
                const y = touch.clientY - rect.top;
                const ctx = CanvasGame.canvasCtx.draw;
                ctx.beginPath();
                ctx.moveTo(x, y);
            });

            canvas.addEventListener('touchmove', (e) => {
                if (!isDrawing) return;
                e.preventDefault();
                const rect = canvas.getBoundingClientRect();
                const touch = e.touches[0];
                const x = touch.clientX - rect.left;
                const y = touch.clientY - rect.top;
                const ctx = CanvasGame.canvasCtx.draw;
                ctx.strokeStyle = currentColor;
                ctx.lineWidth = 6;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.lineTo(x, y);
                ctx.stroke();
            });

            canvas.addEventListener('touchend', () => {
                isDrawing = false;
            });

            canvas.addEventListener('mousedown', (e) => {
                isDrawing = true;
                const rect = canvas.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const ctx = CanvasGame.canvasCtx.draw;
                ctx.beginPath();
                ctx.moveTo(x, y);
            });

            canvas.addEventListener('mousemove', (e) => {
                if (!isDrawing) return;
                const rect = canvas.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const ctx = CanvasGame.canvasCtx.draw;
                ctx.strokeStyle = currentColor;
                ctx.lineWidth = 6;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.lineTo(x, y);
                ctx.stroke();
            });

            canvas.addEventListener('mouseup', () => {
                isDrawing = false;
            });

            canvas.addEventListener('mouseleave', () => {
                isDrawing = false;
            });

            window.selectColor = (color, btn) => {
                currentColor = color;
                document.querySelectorAll('.sketch-color-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            };
        }

        function clearCanvas() {
            const ctx = CanvasGame.canvasCtx.draw;
            ctx.clearRect(0, 0, ctx.canvas.width, ctx.canvas.height);
        }

        function startAquarium() {
            const area = document.getElementById('canvas-area');
            area.innerHTML = '';

            const aquarium = document.createElement('div');
            aquarium.className = 'aquarium-screen';

            const bg = document.createElement('div');
            bg.className = 'aquarium-bg';
            aquarium.appendChild(bg);

            const bubblesContainer = document.createElement('div');
            bubblesContainer.className = 'aquarium-bubbles';
            for (let i = 0; i < 8; i++) {
                const bubble = document.createElement('div');
                bubble.className = 'aquarium-bubble';
                const size = 8 + Math.random() * 20;
                bubble.style.width = size + 'px';
                bubble.style.height = size + 'px';
                bubble.style.left = Math.random() * 100 + '%';
                bubble.style.animationDelay = Math.random() * 2 + 's';
                bubble.style.animationDuration = (3 + Math.random() * 3) + 's';
                bubblesContainer.appendChild(bubble);
            }
            aquarium.appendChild(bubblesContainer);

            const wave = document.createElement('div');
            wave.className = 'aquarium-wave';
            aquarium.appendChild(wave);

            const decorations = document.createElement('div');
            decorations.className = 'aquarium-decorations';
            const coralColors = ['#FF7043', '#FF5722', '#FF6D00', '#FFA726', '#FFB74D'];
            for (let i = 0; i < 5; i++) {
                const coral = document.createElement('div');
                coral.className = 'aquarium-coral';
                coral.style.background = coralColors[i];
                decorations.appendChild(coral);
            }
            aquarium.appendChild(decorations);

            const canvas = CanvasGame.canvases.draw;
            if (canvas) {
                const drawing = document.createElement('div');
                drawing.className = 'aquarium-drawing';
                const shapeEmojis = { fish: '🐟', car: '🚗', house: '🏠', butterfly: '🦋' };
                drawing.textContent = shapeEmojis[CanvasGame.currentShape] || '🎨';
                drawing.style.top = Math.random() * 50 + 15 + '%';
                drawing.style.left = '-120px';
                aquarium.appendChild(drawing);

                // Bidirectional swimming animation
                let posX = -120;
                let speed = 1.2 + Math.random() * 0.8;
                let goingRight = true;
                drawing.style.transform = 'scaleX(1)';

                function animateSwim() {
                    if (!CanvasGame.aquariumAnimId) return;
                    const maxX = window.innerWidth + 60;
                    const minX = -120;

                    if (goingRight) {
                        posX += speed;
                        if (posX > maxX) {
                            goingRight = false;
                            drawing.style.transform = 'scaleX(-1)';
                            // Vary vertical position slightly
                            const newTop = Math.random() * 50 + 15;
                            drawing.style.top = newTop + '%';
                        }
                    } else {
                        posX -= speed;
                        if (posX < minX) {
                            goingRight = true;
                            drawing.style.transform = 'scaleX(1)';
                            const newTop = Math.random() * 50 + 15;
                            drawing.style.top = newTop + '%';
                        }
                    }

                    // Gentle bobbing motion
                    const bob = Math.sin(Date.now() / 600) * 5;
                    drawing.style.left = posX + 'px';
                    drawing.style.marginTop = bob + 'px';

                    CanvasGame.aquariumAnimId = requestAnimationFrame(animateSwim);
                }

                CanvasGame.aquariumAnimId = requestAnimationFrame(animateSwim);
            }

            const redrawBtn = document.createElement('button');
            redrawBtn.className = 'aquarium-redraw-btn';
            redrawBtn.textContent = '다시 그리기';
            redrawBtn.onclick = initCanvasGame;
            aquarium.appendChild(redrawBtn);

            area.appendChild(aquarium);
        }

        function cleanupCanvasGame() {
            CanvasGame.running = false;
            CanvasGame.currentShape = null;

            if (CanvasGame.aquariumAnimId) {
                cancelAnimationFrame(CanvasGame.aquariumAnimId);
                CanvasGame.aquariumAnimId = null;
            }

            window.removeEventListener('resize', () => resizeCanvases);

            const homeBtn = document.getElementById('home-btn-3');
            if (homeBtn) homeBtn.classList.remove('mini-pause');

            const area = document.getElementById('canvas-area');
            if (area) area.innerHTML = '';
        }

        /* ===== Initialize ===== */
        buildMenu();
    </script>
