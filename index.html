        function scheduleBubbleSpawn() {
            if (!BubbleGame.running) return;
            const diff = BubbleGame.getStageDifficulty();

            if (BubbleGame.bubbles.length < diff.maxBubbles) {
                spawnBubble();
            }

            BubbleGame.spawnTimer = setTimeout(scheduleBubbleSpawn, diff.spawnInterval);
        }

        function spawnBubble() {
            const area = document.getElementById('bubble-area');
            if (!area) return;

            const diff = BubbleGame.getStageDifficulty();
            const size = diff.minSize + Math.random() * (diff.maxSize - diff.minSize);

            // Use viewport dimensions directly - most reliable reference
            const vw = window.innerWidth || document.documentElement.clientWidth || 360;
            const vh = window.innerHeight || document.documentElement.clientHeight || 640;
            const areaW = Math.max(vw, 320);
            const areaH = Math.max(vh, 480);

            // Cache dimensions for updateBubbles
            BubbleGame._areaW = areaW;
            BubbleGame._areaH = areaH;

            const bubble = document.createElement('div');
            const color = BubbleGame.colors[Math.floor(Math.random() * BubbleGame.colors.length)];

            // X position: truly uniform random across full viewport width
            const margin = size * 0.6;
            const usableW = areaW - size - margin * 2;
            let x;

            // Simple approach: pure random with anti-clustering
            // Divide screen into 5 equal zones, place in least-populated zone
            if (BubbleGame.bubbles.length >= 3) {
                const zoneCount = [0, 0, 0, 0, 0];
                BubbleGame.bubbles.forEach(b => {
                    const z = Math.min(4, Math.floor((b.x / areaW) * 5));
                    zoneCount[z]++;
                });
                // Find zone(s) with fewest bubbles
                const minCount = Math.min(...zoneCount);
                const emptyZones = [];
                for (let z = 0; z < 5; z++) {
                    if (zoneCount[z] <= minCount) emptyZones.push(z);
                }
                // Pick a random empty zone
                const targetZone = emptyZones[Math.floor(Math.random() * emptyZones.length)];
                const zoneStart = margin + (targetZone / 5) * usableW;
                const zoneWidth = usableW / 5;
                x = zoneStart + Math.random() * zoneWidth;
            } else {
                // First few bubbles: spread across viewport thirds for immediate coverage
                const bubbleCount = BubbleGame.bubbles.length;
                const thirdW = usableW / 3;
                x = margin + thirdW * bubbleCount + Math.random() * thirdW;
            }
            // Final clamp to valid range
            x = Math.max(margin, Math.min(x, areaW - size - margin));
            // Y position: start below viewport bottom
            const y = areaH + size + 20 + Math.random() * 80;

            // Set ALL styles individually - never use cssText concatenation
            bubble.className = 'bubble balloon-shape forced-visible spawning';
            bubble.textContent = '🎈';
            // Remove spawning class promptly after animation to prevent CSS transform fighting JS
            setTimeout(() => {
                bubble.classList.remove('spawning');
                bubble.style.animation = 'none';
            }, 360);
            bubble.style.position = 'absolute';
            bubble.style.left = x + 'px';
            bubble.style.top = y + 'px';
            bubble.style.width = size + 'px';
            bubble.style.height = size + 'px';
            bubble.style.fontSize = (size * 0.75) + 'px';
            bubble.style.color = color;
            bubble.style.textShadow = '0 0 14px ' + color + ', 0 0 28px ' + color + '90, 0 0 42px ' + color + '40';
            bubble.style.opacity = '1';
            bubble.style.visibility = 'visible';
            bubble.style.display = 'flex';
            bubble.style.alignItems = 'center';
            bubble.style.justifyContent = 'center';
            bubble.style.zIndex = '10';
            bubble.style.pointerEvents = 'auto';
            bubble.style.cursor = 'pointer';

            const bubbleData = {
                el: bubble,
                x: x,
                y: y,
                size: size,
                color: color,
                speedY: -(diff.minSpeed + Math.random() * (diff.maxSpeed - diff.minSpeed)) * 1.5,
                speedX: (Math.random() - 0.5) * 2.5,
                wobblePhase: Math.random() * Math.PI * 2,
                wobbleSpeed: 0.015 + Math.random() * 0.03,
                wobbleAmp: 0.8 + Math.random() * 1.0
            };

            const popHandler = (e) => {
                e.preventDefault();
                e.stopPropagation();
                popBubble(bubbleData);
            };

            bubble.addEventListener('touchstart', popHandler, { passive: false });
            bubble.addEventListener('mousedown', popHandler);

            area.appendChild(bubble);
            BubbleGame.bubbles.push(bubbleData);

            // Force a synchronous style flush so the browser commits the initial position
            void bubble.offsetHeight;

            // CSS fallback removed - was conflicting with JS animation loop
            // JS animation loop has robust self-recovery watchdog, no CSS fallback needed

            // Forced visibility recheck after DOM insertion - double guarantee
            requestAnimationFrame(() => {
                if (bubble.parentNode) {
                    bubble.style.visibility = 'visible';
                    bubble.style.opacity = '1';
                    bubble.style.display = 'flex';
                    // Guarantee position is set (prevents stuck at 0,0)
                    if (!bubble.style.top || bubble.style.top === '0px') {
                        bubble.style.top = y + 'px';
                        bubble.style.left = x + 'px';
                    }
                }
            });
            // Second RAF for browsers that batch the first frame
            requestAnimationFrame(() => requestAnimationFrame(() => {
                if (bubble.parentNode && bubble.style.opacity !== '1') {
                    bubble.style.visibility = 'visible';
                    bubble.style.opacity = '1';
                    bubble.style.display = 'flex';
                }
            }));
        }

        function updateBubbles(timestamp) {
            if (!BubbleGame.running) return;
            if (BubbleGame.paused) { BubbleGame.animFrameId = requestAnimationFrame(updateBubbles); return; }
            try {
            // Delta-time: ensures consistent speed regardless of frame rate
            // On first frame, assume a normal 16ms elapsed to avoid dt=0 stall
            if (!BubbleGame._prevTimestamp || BubbleGame._prevTimestamp <= 0 || (timestamp - BubbleGame._prevTimestamp) > 2000) {
                BubbleGame._prevTimestamp = timestamp - 16;
            }
            const rawDt = timestamp - BubbleGame._prevTimestamp;
            // Clamp delta to prevent huge jumps after tab switch or lag spike (max 50ms = 20fps minimum)
            // Floor at 0.8 ensures visible movement even on first frame
            const dt = Math.max(Math.min(rawDt, 50) / 16.667, 0.8);
            BubbleGame._prevTimestamp = timestamp;

            // Track last frame time for self-recovery watchdog
            BubbleGame._lastFrameTime = Date.now();
            BubbleGame._frameCount = (BubbleGame._frameCount || 0) + 1;

            // Use viewport as primary - always reliable
            const vw = window.innerWidth || document.documentElement.clientWidth || screen.width || 360;
            const vh = window.innerHeight || document.documentElement.clientHeight || screen.height || 640;
            // Always trust viewport dimensions, use cached only if larger
            let areaW = Math.max(BubbleGame._areaW || 0, vw);
            let areaH = Math.max(BubbleGame._areaH || 0, vh);
            areaW = Math.max(areaW, 320);
            areaH = Math.max(areaH, 480);
            // Refresh dimensions every 60 frames (~1 second)
            if (BubbleGame._frameCount % 60 === 0) {
                const area = document.getElementById('bubble-area');
                if (area) {
                    const rect = area.getBoundingClientRect();
                    if (rect.width > vw * 0.5 && rect.height > vh * 0.3) {
                        areaW = rect.width;
                        areaH = rect.height;
                    } else {
                        areaW = vw;
                        areaH = vh;
                    }
                }
                BubbleGame._areaW = areaW;
                BubbleGame._areaH = areaH;
            }

            // Sparkle trail counter (emit every ~12 frames to reduce DOM pressure)
            if (!BubbleGame._trailCounter) BubbleGame._trailCounter = 0;
            BubbleGame._trailCounter++;
            const emitTrail = BubbleGame._trailCounter % 12 === 0;

            for (let i = BubbleGame.bubbles.length - 1; i >= 0; i--) {
                const b = BubbleGame.bubbles[i];

                // Delta-time scaled movement - consistent speed at any frame rate
                b.y += b.speedY * dt;
                b.wobblePhase += b.wobbleSpeed * dt;
                const amp = b.wobbleAmp || 1.0;
                b.x += (Math.sin(b.wobblePhase) * 1.2 * amp + Math.sin(b.wobblePhase * 0.7) * 0.5 * amp + b.speedX * 0.4) * dt;

                // Bounce off edges - use max of areaW and viewport to prevent wall-sticking
                const bounceW = Math.max(areaW, vw);
                if (b.x < 0) { b.x = 0; b.speedX = Math.abs(b.speedX); }
                if (b.x > bounceW - b.size) { b.x = bounceW - b.size; b.speedX = -Math.abs(b.speedX); }

                // Use left/top for positioning - avoids transform stacking issues
                b.el.style.left = b.x + 'px';
                b.el.style.top = b.y + 'px';
                // Add gentle sway rotation for natural balloon movement
                const swayAngle = Math.sin(b.wobblePhase * 0.5) * 8;
                const scalePulse = 1 + Math.sin(b.wobblePhase * 0.3) * 0.04;
                b.el.style.transform = `rotate(${swayAngle}deg) scale(${scalePulse})`;

                // Sparkle trail: emit tiny fading particles behind each bubble
                if (emitTrail && b.y > 0 && b.y < areaH) {
                    spawnBubbleTrailParticle(b);
                }

                // Ensure bubble is visible (defensive: fix any hidden bubbles)
                if (b.el.style.visibility === 'hidden' || b.el.style.display === 'none') {
                    b.el.style.visibility = 'visible';
                    b.el.style.display = 'flex';
                    b.el.style.opacity = '1';
                }
                // Ensure no lingering transitions that could fight JS positioning
                if (b.el.style.transition) {
                    b.el.style.transition = 'none';
                }

                // Remove when off top of screen
                if (b.y < -b.size - 20) {
                    b.el.style.opacity = '0';
                    b.el.style.transition = 'opacity 0.2s';
                    const el = b.el;
                    setTimeout(() => el.remove(), 200);
                    BubbleGame.bubbles.splice(i, 1);
                }
            }

            } catch(e) { /* Ensure animation never stops */ }
            BubbleGame.animFrameId = requestAnimationFrame(updateBubbles);
        }

        // Emit a tiny sparkle particle trailing behind a bubble
        function spawnBubbleTrailParticle(b) {
            const area = document.getElementById('bubble-area');

            if (!document.getElementById('bubble-trail-style')) {

        function popBubble(bubbleData) {
            if (!BubbleGame.running) return;

            haptic('pop');
            BubbleGame.score++;
            BubbleGame.stageScore++;

            // Combo tracking
            const now = Date.now();
            if (now - BubbleGame.lastPopTime < 800) {
                BubbleGame.comboCount++;
            } else {
                BubbleGame.comboCount = 1;
            }
            BubbleGame.lastPopTime = now;

            if (BubbleGame.comboTimeout) clearTimeout(BubbleGame.comboTimeout);
            BubbleGame.comboTimeout = setTimeout(() => { BubbleGame.comboCount = 0; }, 1200);

            // Show combo text at milestones
            if (BubbleGame.comboCount === 3 || BubbleGame.comboCount === 5 || BubbleGame.comboCount === 8 || BubbleGame.comboCount === 12) {
                showBubbleCombo(BubbleGame.comboCount);
            }

            // Rainbow border flash on high combos (5+)
            if (BubbleGame.comboCount >= 5) {
                showRainbowBorderFlash();
            }

            // Mega combo celebration at 10
            if (BubbleGame.comboCount === 10) {
                showMegaCombo();
            }

            updateBubbleScore();
            playPopSound();
            createPopParticles(bubbleData.x + bubbleData.size / 2, bubbleData.y + bubbleData.size / 2, bubbleData.color);
            showScreenFlash();
            showTouchRipple(bubbleData.x + bubbleData.size / 2, bubbleData.y + bubbleData.size / 2, bubbleData.color);
            showShimmerFlash(bubbleData.x + bubbleData.size / 2, bubbleData.y + bubbleData.size / 2, bubbleData.color);
            showScoreFloat(bubbleData.x + bubbleData.size / 2, bubbleData.y);

            // Screen shake for satisfying pop feedback
            const shakeArea = document.getElementById('bubble-area');
            if (shakeArea) {
                shakeArea.classList.remove('pop-shake');
                void shakeArea.offsetWidth; // force reflow to restart animation
                shakeArea.classList.add('pop-shake');
                setTimeout(() => shakeArea.classList.remove('pop-shake'), 150);
            }

            bubbleData.el.classList.add('popping');

            const idx = BubbleGame.bubbles.indexOf(bubbleData);
            if (idx > -1) BubbleGame.bubbles.splice(idx, 1);

            setTimeout(() => {
                bubbleData.el.remove();
            }, 350);

            checkStageUp();

            // Milestone celebration every 50 points (big), every 25 points (banner)
            if (BubbleGame.score > 0 && BubbleGame.score % 50 === 0) {
                showMilestoneCelebration(BubbleGame.score);
            } else if (BubbleGame.score > 0 && BubbleGame.score % 25 === 0) {
                showMilestoneBanner(BubbleGame.score);
            }
        }

        function showBubbleCombo(count) {
            const area = document.getElementById('bubble-area');
            if (!area) return;

            // Remove previous combo text
            const old = area.querySelector('.bubble-combo');
            if (old) old.remove();

            const comboEl = document.createElement('div');
            const comboTexts = {
                3: '좋아요! 🔥',
                5: '대단해! ⚡',
                8: '최고! 🌟',
                12: '천재! 👑'
            };

            comboEl.className = 'bubble-combo';
            if (count >= 8) comboEl.classList.add('x8');
            else if (count >= 5) comboEl.classList.add('x5');
            else comboEl.classList.add('x3');

            comboEl.textContent = comboTexts[count] || `${count}콤보!`;
            area.appendChild(comboEl);
            setTimeout(() => comboEl.remove(), 900);

            // Screen shake effect on combo
            if (count >= 3) {
                const intensity = Math.min(count * 0.8, 6);
                area.style.transition = 'none';
                area.style.transform = `translate(${(Math.random()-0.5)*intensity}px, ${(Math.random()-0.5)*intensity}px)`;
                setTimeout(() => {
                    area.style.transform = `translate(${(Math.random()-0.5)*intensity*0.5}px, ${(Math.random()-0.5)*intensity*0.5}px)`;
                }, 50);
                setTimeout(() => {
                    area.style.transition = 'transform 0.15s ease-out';
                    area.style.transform = '';
                }, 100);
            }

            // Show combo counter visual at bottom
            const counterEl = document.createElement('div');
            counterEl.className = 'bubble-combo-counter';
            if (count === 2) counterEl.classList.add('x2');
            else if (count === 3) counterEl.classList.add('x3');
            else if (count === 4) counterEl.classList.add('x4');
            else if (count >= 5) counterEl.classList.add('x5plus');

            counterEl.textContent = `x${count}!`;
            document.body.appendChild(counterEl);
            setTimeout(() => counterEl.remove(), 800);

            // Play combo sound
            if (Settings.soundEnabled) {
                const ctx = getAudioContext();
                if (ctx) {
                    const t = ctx.currentTime;
                    const baseFreq = 600 + count * 50;
                    for (let i = 0; i < 3; i++) {
                        const osc = ctx.createOscillator();
                        const gain = ctx.createGain();
                        osc.type = 'sine';
                        osc.frequency.setValueAtTime(baseFreq + i * 200, t + i * 0.06);
                        gain.gain.setValueAtTime(0, t + i * 0.06);
                        gain.gain.linearRampToValueAtTime(0.2, t + i * 0.06 + 0.02);
                        gain.gain.exponentialRampToValueAtTime(0.001, t + i * 0.06 + 0.2);
                        osc.connect(gain);
                        gain.connect(getAudioDest());
                        osc.start(t + i * 0.06);
                        osc.stop(t + i * 0.06 + 0.2);
                    }
                }
            }
        }

        function createPopParticles(cx, cy, color) {

            if (!document.getElementById('ring-burst-styles')) {

            const colors = color ? [color, '#FFCA28', '#FF6B6B', '#66BB6A', '#42A5F5', '#FFD700'] :

            const container = document.createElement('div');
            container.className = 'pop-particles';
            container.style.left = cx + 'px';
            container.style.top = cy + 'px';

            // Expanding ring burst effect
            const ringColor = color || colors[0];
            const ring = document.createElement('div');

            container.appendChild(ring);

            const ring2 = document.createElement('div');
            ring2.style.cssText = `position:absolute;border-radius:50%;border:4px solid ${ringColor}80;transform:translate(-50%,-50%);animation:ringBurst2 0.5s ease-out 0.08s forwards;pointer-events:none;`;

            // Big round particles - adaptive count based on device capability
            const isMobile = window.innerWidth < 600;
            const particleCount = isMobile ? 16 : 28;
            for (let i = 0; i < particleCount; i++) {
                const p = document.createElement('div');

                p.style.setProperty('--dy', dy + 'px');

                p.style.filter = `drop-shadow(0 0 16px ${sc})`;
                p.textContent = ['✦', '✧', '◆', '★', '❖'][i % 5];
                container.appendChild(p);
            }

            // Star emoji particles - optimized (8 particles, even bigger)
            const starEmojis = ['✨', '⭐', '💫', '🌟', '💖', '🎉', '🎊', '💥'];
            for (let i = 0; i < 8; i++) {

                const angle = (i / 8) * Math.PI * 2 + Math.random() * 0.5;

                const dx = Math.cos(angle) * dist;
                const dy = Math.sin(angle) * dist;
                p.style.width = 'auto';
                p.style.height = 'auto';
                p.style.fontSize = (100 + Math.random() * 70) + 'px';
                p.style.background = 'none';
                p.style.setProperty('--dx', dx + 'px');
                p.style.setProperty('--dy', dy + 'px');
                p.style.filter = 'drop-shadow(0 0 14px rgba(255,215,0,0.9))';
                p.textContent = starEmojis[i % starEmojis.length];
                container.appendChild(p);
            }

            // Sparkle trail particles - glowing dots (4 particles)
            for (let i = 0; i < 4; i++) {
                const trail = document.createElement('div');
                const angle = (i / 4) * Math.PI * 2 + Math.random() * 0.8;
                const dist = 50 + Math.random() * 120;

                container.appendChild(trail);
            }

            area.appendChild(container);
            setTimeout(() => container.remove(), 1300);
        }

        function playPopSound() {
            if (!Settings.soundEnabled) return;
            const ctx = getAudioContext();
            if (!ctx) return;

            const now = ctx.currentTime;

            // Main pop tone - bright chirp sweeping down
            const osc = ctx.createOscillator();
            const oscGain = ctx.createGain();
            osc.type = 'sine';
            const baseFreq = 950 + Math.random() * 500;
            osc.frequency.setValueAtTime(baseFreq, now);
            osc.frequency.exponentialRampToValueAtTime(200, now + 0.1);
            oscGain.gain.setValueAtTime(0.32, now);
            oscGain.gain.exponentialRampToValueAtTime(0.001, now + 0.12);
            osc.connect(oscGain);
            oscGain.connect(getAudioDest());
            osc.start(now);
            osc.stop(now + 0.12);

            // Sweet harmonic overtone for sparkle
            const osc2 = ctx.createOscillator();
            const g2 = ctx.createGain();
            osc2.type = 'sine';
            osc2.frequency.setValueAtTime(baseFreq * 2, now);
            osc2.frequency.exponentialRampToValueAtTime(600, now + 0.08);
            g2.gain.setValueAtTime(0.1, now);
            g2.gain.exponentialRampToValueAtTime(0.001, now + 0.08);
            osc2.connect(g2);
            g2.connect(getAudioDest());
            osc2.start(now);
            osc2.stop(now + 0.08);

            // Pop noise burst
            const bufferSize = ctx.sampleRate * 0.05;
            const noiseBuffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
            const data = noiseBuffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) {
                data[i] = (Math.random() * 2 - 1) * (1 - i / bufferSize);
            }
            const noise = ctx.createBufferSource();
            noise.buffer = noiseBuffer;
            const noiseFilter = ctx.createBiquadFilter();
            noiseFilter.type = 'highpass';
            noiseFilter.frequency.setValueAtTime(2000, now);
            const noiseGain = ctx.createGain();
            noiseGain.gain.setValueAtTime(0.12, now);
            noiseGain.gain.exponentialRampToValueAtTime(0.001, now + 0.05);
            noise.connect(noiseFilter);
            noiseFilter.connect(noiseGain);
            noiseGain.connect(getAudioDest());
            noise.start(now);
            noise.stop(now + 0.05);
        }

        function playStageUpSound() {
            if (!Settings.soundEnabled) return;
            const ctx = getAudioContext();
            if (!ctx) return;
            const now = ctx.currentTime;

            const notes = [523, 659, 784, 1047, 1319];
            notes.forEach((freq, i) => {
                const t = now + i * 0.08;
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(freq, t);
                gain.gain.setValueAtTime(0, t);
                gain.gain.linearRampToValueAtTime(0.25, t + 0.02);
                gain.gain.setValueAtTime(0.25, t + 0.1);
                gain.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
                osc.connect(gain);
                gain.connect(getAudioDest());
                osc.start(t);
                osc.stop(t + 0.3);
            });
        }

        function toggleBubblePause() {
            if (BubbleGame.paused) {
                // Resume
                BubbleGame.paused = false;
                const pauseOverlay = document.querySelector('.pause-overlay');
                if (pauseOverlay) pauseOverlay.remove();
                BubbleGame.running = true;
                scheduleBubbleSpawn();
                BubbleGame.animFrameId = requestAnimationFrame(updateBubbles);
                const pauseBtn = document.getElementById('bubble-pause-btn');
                if (pauseBtn) {
                    pauseBtn.textContent = '⏸️';
                    pauseBtn.style.opacity = '0.8';
                    // Reset auto-hide timer
                    clearTimeout(BubbleGame.pauseBtnHideTimer);
                    BubbleGame.pauseBtnHideTimer = setTimeout(() => {
                        if (pauseBtn && !BubbleGame.paused) pauseBtn.style.opacity = '0';
                    }, 3000);
                }
            } else {
                // Pause
                BubbleGame.paused = true;
                BubbleGame.running = false;
                if (BubbleGame.spawnTimer) {
                    clearTimeout(BubbleGame.spawnTimer);
                    BubbleGame.spawnTimer = null;
                }
                if (BubbleGame.animFrameId) {
                    cancelAnimationFrame(BubbleGame.animFrameId);
                    BubbleGame.animFrameId = null;
                }
                const pauseBtn = document.getElementById('bubble-pause-btn');
                if (pauseBtn) pauseBtn.textContent = '▶️';

                // Show pause overlay
                const gameScreen = document.getElementById('game-bubble');
                const overlay = document.createElement('div');
                overlay.className = 'pause-overlay';
                overlay.innerHTML = `
                    <div class="pause-title">⏸️ 일시정지</div>
                    <button class="pause-btn-action pause-btn-continue" onclick="toggleBubblePause()">계속하기 ▶️</button>
                    <button class="pause-btn-action pause-btn-home" onclick="goHome()">홈으로 🏠</button>
                `;
                gameScreen.appendChild(overlay);
            }
        }

        function cleanupBubbleGame() {
            BubbleGame.running = false;
            BubbleGame.paused = false;

            if (BubbleGame.spawnTimer) {
                clearTimeout(BubbleGame.spawnTimer);
                BubbleGame.spawnTimer = null;
            }

            if (BubbleGame.animFrameId) {
                cancelAnimationFrame(BubbleGame.animFrameId);
                BubbleGame.animFrameId = null;
            }

            if (BubbleGame.comboTimeout) {
                clearTimeout(BubbleGame.comboTimeout);
                BubbleGame.comboTimeout = null;
            }

            if (BubbleGame.pauseBtnHideTimer) {
                clearTimeout(BubbleGame.pauseBtnHideTimer);
                BubbleGame.pauseBtnHideTimer = null;
            }

            if (BubbleGame.watchdogTimer) {
                clearInterval(BubbleGame.watchdogTimer);
                BubbleGame.watchdogTimer = null;
            }

            BubbleGame.bubbles.forEach(b => b.el.remove());
            BubbleGame.bubbles = [];

            // Restore home button with normal handler, hide pause button
            const homeBtn = document.getElementById('home-btn');
            if (homeBtn) {
                homeBtn.style.display = 'flex';
                homeBtn.onclick = () => goHome();
            }
            const pauseBtn = document.getElementById('bubble-pause-btn');
            if (pauseBtn) { pauseBtn.style.display = 'none'; pauseBtn.textContent = '⏸️'; }

            // Remove pause overlay if exists
            const pauseOverlay = document.querySelector('.pause-overlay');
            if (pauseOverlay) pauseOverlay.remove();

            const area = document.getElementById('bubble-area');
            if (area) {
                area.classList.remove('gameplay-active');
                area.innerHTML = '';
            }
            BubbleGame._areaW = 0;
            BubbleGame._areaH = 0;
        }

        function initAnimalGame() {
            const area = document.getElementById('animal-area');
            area.innerHTML = '';

            const overlay = document.createElement('div');
            overlay.className = 'animal-start-overlay';
            overlay.id = 'animal-start-overlay';
            overlay.innerHTML = `
                <div class="start-emoji">🦁</div>
                <div class="start-text">어떤 동물 소리일까요?</div>
                <button class="animal-start-btn" id="animal-start-btn">시작! 🎉</button>
            `;
            area.appendChild(overlay);

            document.getElementById('animal-start-btn').addEventListener('click', startAnimalGameplay);
            document.getElementById('animal-start-btn').addEventListener('touchend', (e) => {
                e.preventDefault();
                startAnimalGameplay();
            });
        }

        function startAnimalGameplay() {
            getAudioContext().resume();

            const overlay = document.getElementById('animal-start-overlay');
            if (overlay) overlay.remove();

            // Hide home button, show pause button during gameplay
            const homeBtn = document.getElementById('home-btn-2');
            if (homeBtn) homeBtn.style.display = 'none';
            const pauseBtn = document.getElementById('animal-pause-btn');
            if (pauseBtn) pauseBtn.style.display = 'flex';

            AnimalGame.score = 0;
            AnimalGame.stage = 1;
            AnimalGame.stageScore = 0;
            AnimalGame.usedAnswers = [];
            AnimalGame.running = true;
            AnimalGame.locked = false;
            AnimalGame.paused = false;
            AnimalGame.streak = 0;
            updateAnimalScore();
            updateAnimalStage();

            startAnimalRound();
        }

        function startAnimalRound() {
            if (!AnimalGame.running) return;

            AnimalGame.locked = false;

            const oldOverlay = document.querySelector('.animal-result-overlay');
            if (oldOverlay) oldOverlay.remove();
            const oldCelebration = document.querySelector('.confetti-container');
            if (oldCelebration) oldCelebration.remove();
            const oldStageUp = document.querySelector('.bubble-stage-up');
            if (oldStageUp) oldStageUp.remove();

            const choiceCount = AnimalGame.getChoiceCount();

            let availableForAnswer = AnimalGame.animals.filter(
                a => !AnimalGame.usedAnswers.includes(a.id)
            );
            if (availableForAnswer.length === 0) {
                AnimalGame.usedAnswers = [];
                availableForAnswer = [...AnimalGame.animals];
            }

            const answerAnimal = availableForAnswer[Math.floor(Math.random() * availableForAnswer.length)];
            AnimalGame.currentAnswer = answerAnimal.id;
            AnimalGame.usedAnswers.push(answerAnimal.id);

            const others = AnimalGame.animals.filter(a => a.id !== answerAnimal.id);
            const shuffledOthers = others.sort(() => Math.random() - 0.5);
            const choices = [answerAnimal, ...shuffledOthers.slice(0, choiceCount - 1)];
            AnimalGame.currentChoices = choices.sort(() => Math.random() - 0.5);

            buildAnimalGameUI();

            setTimeout(() => {
                if (AnimalGame.running && AnimalGame.currentAnswer) {
                    playAnimalSound(AnimalGame.currentAnswer);
                }
            }, 500);
        }

        function onAnimalCardTap(selectedId) {
            if (!AnimalGame.running || AnimalGame.locked) return;

            const isCorrect = selectedId === AnimalGame.currentAnswer;
            const selectedCard = document.querySelector(`.animal-card[data-animal-id="${selectedId}"]`);
            const area = document.getElementById('animal-area');

            if (isCorrect) {
                AnimalGame.locked = true;
                AnimalGame.score++;
                AnimalGame.stageScore++;
                AnimalGame.streak++;
                updateAnimalScore();
                updateAnimalProgress();
                haptic('success');

                // Show streak milestone text for consecutive correct answers
                if (AnimalGame.streak >= 3 && AnimalGame.streak % 3 === 0) {
                    showAnimalStreak(AnimalGame.streak);
                }

                if (selectedCard) {
                    selectedCard.classList.add('correct-flash');
                    // Add sparkle burst around the correct card
                    showCardSparkles(selectedCard);
                }
                showAnimalResultOverlay('⭕', area);
                showConfetti(area);
                playCorrectSound();
                // Golden screen edge glow for extra celebration feel
                showGoldenEdgeGlow();

                const isStageUp = AnimalGame.stageScore >= AnimalGame.getStageGoal();
                if (isStageUp) {
                    AnimalGame.stage++;
                    AnimalGame.stageScore = 0;
                    AnimalGame.usedAnswers = [];
                    updateAnimalStage();
                    updateAnimalProgress();
                    playStageUpSound();
                    haptic('stageup');

                    const stageOverlay = document.createElement('div');
                    stageOverlay.className = 'bubble-stage-up';
                    stageOverlay.innerHTML = `
                        <div class="stage-up-emoji">🎉</div>
                        <div class="stage-up-text">${AnimalGame.stage}단계!</div>
                    `;
                    // Ensure confetti rain keyframe exists
                    if (!document.getElementById('confetti-rain-style')) {
                        const crs = document.createElement('style');
                        crs.id = 'confetti-rain-style';
                        crs.textContent = `@keyframes confettiRain { 0% { transform: translateY(0) translateX(0) rotate(0deg) scale(0.5); opacity: 1; } 20% { opacity: 1; } 100% { transform: translateY(calc(100vh + 20px)) translateX(var(--confetti-x)) rotate(var(--confetti-rot)) scale(0.3); opacity: 0.3; } }`;
                        document.head.appendChild(crs);
                    }
                    // Golden star confetti rain for stage-up
                    const stageConfettiColors = ['#FFD700', '#FFC107', '#FF9800', '#FFB300', '#FFAB00', '#FF6D00', '#FF1744', '#00C853', '#2979FF', '#AA00FF'];
                    const stageConfettiShapes = ['⭐', '🌟', '✨', '💫', '●', '★', '♦'];
                    for (let ci = 0; ci < 50; ci++) {
                        const piece = document.createElement('div');
                        const c = stageConfettiColors[Math.floor(Math.random() * stageConfettiColors.length)];
                        const shape = stageConfettiShapes[Math.floor(Math.random() * stageConfettiShapes.length)];
                        const leftPos = Math.random() * 100;
                        const delay = Math.random() * 1.4;
                        const dur = 1.5 + Math.random() * 1.2;
                        const size = 14 + Math.random() * 18;
                        const xDrift = (Math.random() - 0.5) * 100;
                        piece.textContent = shape;
                        piece.style.cssText = `position:absolute;top:-5%;left:${leftPos}%;font-size:${size}px;color:${c};pointer-events:none;z-index:10;opacity:0;animation:confettiRain ${dur}s ease-in ${delay}s forwards;--confetti-x:${xDrift}px;--confetti-rot:${Math.random()*720-360}deg;text-shadow:0 0 6px ${c}80;`;
                        stageOverlay.appendChild(piece);
                    }
                    area.appendChild(stageOverlay);
                    setTimeout(() => stageOverlay.remove(), 2800);
                }

                AnimalGame.advanceTimer = setTimeout(() => {
                    if (AnimalGame.running) {
                        startAnimalRound();
                    }
                }, isStageUp ? 2200 : 1200);

            } else {
                AnimalGame.locked = true;
                AnimalGame.streak = 0; // reset streak on wrong answer
                haptic('wrong');

                if (selectedCard) selectedCard.classList.add('wrong-flash');
                showAnimalResultOverlay('❌', area);
                playWrongSound();

                // Highlight the correct answer so the child learns + show correct animal name
                setTimeout(() => {
                    const correctCard = document.querySelector(`.animal-card[data-animal-id="${AnimalGame.currentAnswer}"]`);
                    if (correctCard) {
                        correctCard.style.transition = 'all 0.4s ease';
                        correctCard.style.boxShadow = '0 0 0 5px #4CAF50, 0 0 24px rgba(76,175,80,0.6)';
                        correctCard.style.transform = 'scale(1.12)';
                        correctCard.style.background = 'linear-gradient(145deg, rgba(200,230,201,0.9), rgba(165,214,167,0.7))';
                        // Show correct animal name + onomatopoeia label
                        const correctAnimal = AnimalGame.animals.find(a => a.id === AnimalGame.currentAnswer);
                        if (correctAnimal) {
                            const soundText = ONOMATOPOEIA[correctAnimal.id] || '';
                            const nameLabel = document.createElement('div');
                            nameLabel.style.cssText = 'position:absolute;bottom:-32px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,#4CAF50,#2E7D32);color:white;padding:5px 16px;border-radius:14px;font-size:clamp(0.9rem,2.4vw,1.1rem);font-weight:800;white-space:nowrap;box-shadow:0 3px 10px rgba(76,175,80,0.45);z-index:10;animation:stageUpPop 0.5s cubic-bezier(0.34,1.56,0.64,1);';
                            nameLabel.textContent = correctAnimal.name + (soundText ? ' ' + soundText : '');
                            correctCard.style.position = 'relative';
                            correctCard.appendChild(nameLabel);
                        }
                    }
                    // Play the correct animal sound so child can associate
                    playAnimalSound(AnimalGame.currentAnswer);
                }, 600);

                // Auto-advance to next round after showing the correct answer (longer delay for learning)
                AnimalGame.advanceTimer = setTimeout(() => {
                    if (AnimalGame.running) {
                        startAnimalRound();
                    }
                }, 3000);
            }
        }

                        100% { transform: translate(var(--fx), var(--fy)) scale(0.2); opacity: 0; }
                    }
                    @keyframes sparkleGlow {
                        0%, 100% { opacity: 0.3; transform: scale(0.5); }
                        50% { opacity: 1; transform: scale(1.2); }
                    }
                    @keyframes confettiSpin {
                        0% { transform: translateY(-80px) rotateZ(0deg) rotateX(0deg); opacity: 1; }

                        0% { opacity: 0; }

                        100% { opacity: 0; }
                    }
                `;

            }

            const container = document.createElement('div');
            container.className = 'confetti-container';
            const colors = ['#FFD700', '#FF6B6B', '#1E88E5', '#43A047', '#FF6D00', '#E040FB', '#00E5FF', '#FF4081', '#00BFA5'];

            // Golden ring expansion from center
            for (let r = 0; r < 3; r++) {
                const ring = document.createElement('div');
                ring.style.cssText = `position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);border-radius:50%;border:5px solid #FFD700;box-shadow:0 0 30px rgba(255,215,0,0.5),inset 0 0 30px rgba(255,215,0,0.2);animation:goldenRingExpand ${0.8+r*0.15}s ease-out ${r*0.12}s forwards;pointer-events:none;`;
                container.appendChild(ring);
            }

            // Celebration flash
            const flash = document.createElement('div');
            flash.style.cssText = 'position:fixed;inset:0;background:radial-gradient(circle at center,rgba(255,215,0,0.3),transparent 70%);animation:celebrationFlash 0.5s ease-out forwards;pointer-events:none;';
            container.appendChild(flash);

            // Firework bursts from 2 random center points
            for (let burst = 0; burst < 2; burst++) {
                const cx = 20 + Math.random() * 60;
                const cy = 15 + Math.random() * 30;
                for (let i = 0; i < 20; i++) {
                    const spark = document.createElement('div');
                    const angle = (i / 20) * Math.PI * 2;
                    const dist = 80 + Math.random() * 120;
                    const fx = Math.cos(angle) * dist;
                    const fy = Math.sin(angle) * dist;
                    const size = 4 + Math.random() * 7;
                    const color = colors[Math.floor(Math.random() * colors.length)];
                    spark.style.cssText = `position:absolute;left:${cx}%;top:${cy}%;width:${size}px;height:${size}px;border-radius:50%;background:${color};box-shadow:0 0 10px ${color},0 0 20px ${color}50;--fx:${fx}px;--fy:${fy}px;animation:fireworkBurst ${0.6+Math.random()*0.4}s ease-out ${burst*0.3+0.1}s forwards;pointer-events:none;`;
                    container.appendChild(spark);
                }
            }

            // Glowing sparkle dots scattered across screen
            for (let i = 0; i < 35; i++) {
                const dot = document.createElement('div');
                const color = colors[Math.floor(Math.random() * colors.length)];
                dot.style.cssText = `position:absolute;left:${Math.random()*100}%;top:${Math.random()*70}%;width:${3+Math.random()*8}px;height:${3+Math.random()*8}px;border-radius:50%;background:${color};box-shadow:0 0 12px ${color},0 0 24px ${color}60;animation:sparkleGlow ${0.4+Math.random()*0.6}s ease-in-out ${Math.random()*0.8}s infinite;pointer-events:none;`;
                container.appendChild(dot);
            }

            // Confetti ribbons falling with spin
            for (let i = 0; i < 60; i++) {
                const confetti = document.createElement('div');
                const w = 5 + Math.random() * 9;
                const h = 10 + Math.random() * 16;
                const color = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.cssText = `position:absolute;left:${Math.random()*100}%;top:0;width:${w}px;height:${h}px;background:${color};border-radius:${Math.random()>0.5?'50%':'2px'};box-shadow:0 0 6px ${color}80;animation:confettiSpin ${1.5+Math.random()*1.2}s ease-out ${Math.random()*0.5}s forwards;pointer-events:none;`;
                container.appendChild(confetti);
            }

            // Sparkle emojis with glow - much larger and more variety
            const sparkleEmojis = ['✨', '🌟', '⭐', '🎉', '💖', '🎊', '🎆', '💫', '🥳', '🎇', '🎀', '🦋', '🌸'];
            for (let i = 0; i < 32; i++) {
                const sparkle = document.createElement('div');
                sparkle.className = 'confetti';
                sparkle.textContent = sparkleEmojis[Math.floor(Math.random() * sparkleEmojis.length)];
                sparkle.style.left = (Math.random() * 100) + '%';
                sparkle.style.fontSize = (30 + Math.random() * 36) + 'px';
                sparkle.style.filter = 'drop-shadow(0 0 8px rgba(255,215,0,0.9)) drop-shadow(0 0 16px rgba(255,215,0,0.5))';
                sparkle.style.animationDelay = (Math.random() * 0.4) + 's';
                sparkle.style.animationDuration = (1.4 + Math.random() * 0.8) + 's';
                container.appendChild(sparkle);
            }

            parent.appendChild(container);
            setTimeout(() => container.remove(), 3500);
        }

        function showOnomatopoeia(animalId) {
            const text = ONOMATOPOEIA[animalId];
            if (!text) return;

            // Remove previous
            const old = document.querySelector('.onomatopoeia-float');
            if (old) old.remove();

            const colors = ONOMATOPOEIA_COLORS[animalId] || { color: '#FF6D00', shadow: '#FFB74D', glow: 'rgba(255,109,0,0.5)', stroke: '#E65100' };
            const el = document.createElement('div');
            el.className = 'onomatopoeia-float';
            el.textContent = text;
            el.style.setProperty('--ono-color', colors.color);
            el.style.setProperty('--ono-shadow', colors.shadow);
            el.style.setProperty('--ono-glow', colors.glow);
            el.style.setProperty('--ono-stroke', colors.stroke);
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 1700);
        }

        function playAnimalSound(animalId) {
            showOnomatopoeia(animalId);

            if (!Settings.soundEnabled) return;
            const ctx = getAudioContext();
            if (!ctx) return;
            const now = ctx.currentTime;

            switch (animalId) {
                case 'dog': {
                    // 멍멍! - Two distinct barks: pronounced "멍" vowel, stronger bark formant at 700Hz, punchier "ㅁ" consonant
                    const dest = getAudioDest();
                    for (let i = 0; i < 2; i++) {
                        const t = now + i * 0.45;
                        const pitchVar = 1 + (i * 0.05); // second bark slightly higher
                        // Main bark: pronounced "멍" with strong vowel on 700Hz formant
                        const o = ctx.createOscillator();
                        const g = ctx.createGain();
                        const f1 = ctx.createBiquadFilter();
                        o.type = 'sawtooth';
                        o.frequency.setValueAtTime(180 * pitchVar, t);
                        o.frequency.linearRampToValueAtTime(350 * pitchVar, t + 0.03);
                        o.frequency.linearRampToValueAtTime(250 * pitchVar, t + 0.10);
                        o.frequency.linearRampToValueAtTime(160 * pitchVar, t + 0.28);
                        // Stronger bandpass at 700Hz (dog bark formant) for clear "멍"
                        f1.type = 'bandpass'; f1.frequency.setValueAtTime(700, t); f1.Q.setValueAtTime(3.5, t);
                        g.gain.setValueAtTime(0.001, t);
                        g.gain.linearRampToValueAtTime(0.60, t + 0.012);
                        g.gain.setValueAtTime(0.50, t + 0.10);
                        g.gain.exponentialRampToValueAtTime(0.001, t + 0.28);
                        o.connect(f1); f1.connect(g); g.connect(dest);
                        o.start(t); o.stop(t + 0.28);
                        // Second formant oscillator at ~1200Hz for brighter tone
                        const o2 = ctx.createOscillator();
                        const f2 = ctx.createBiquadFilter();
                        const g2 = ctx.createGain();
                        o2.type = 'sine';
                        o2.frequency.setValueAtTime(240 * pitchVar, t);
                        o2.frequency.linearRampToValueAtTime(420 * pitchVar, t + 0.03);
                        o2.frequency.linearRampToValueAtTime(320 * pitchVar, t + 0.10);
                        o2.frequency.linearRampToValueAtTime(210 * pitchVar, t + 0.28);
                        f2.type = 'bandpass'; f2.frequency.setValueAtTime(1200, t); f2.Q.setValueAtTime(3.0, t);
                        g2.gain.setValueAtTime(0.001, t);
                        g2.gain.linearRampToValueAtTime(0.25, t + 0.012);
                        g2.gain.exponentialRampToValueAtTime(0.001, t + 0.28);
                        o2.connect(f2); f2.connect(g2); g2.connect(dest);
                        o2.start(t); o2.stop(t + 0.28);
                        // Warm sub for body
                        const sub = ctx.createOscillator();
                        const subG = ctx.createGain();
                        sub.type = 'sine';
                        sub.frequency.setValueAtTime(110 * pitchVar, t);
                        sub.frequency.linearRampToValueAtTime(85 * pitchVar, t + 0.25);
                        subG.gain.setValueAtTime(0.001, t);
                        subG.gain.linearRampToValueAtTime(0.18, t + 0.02);
                        subG.gain.exponentialRampToValueAtTime(0.001, t + 0.25);
                        sub.connect(subG); subG.connect(dest);
                        sub.start(t); sub.stop(t + 0.25);
                        // Punchy "ㅁ" attack noise
                        const nBuf = ctx.createBuffer(1, ctx.sampleRate * 0.020, ctx.sampleRate);
                        const nData = nBuf.getChannelData(0);
                        for (let j = 0; j < nData.length; j++) nData[j] = (Math.random() * 2 - 1) * (1 - j / nData.length) * 0.75;
                        const ns = ctx.createBufferSource(); ns.buffer = nBuf;
                        const nf = ctx.createBiquadFilter(); nf.type = 'lowpass'; nf.frequency.setValueAtTime(1200, t);
                        const ng = ctx.createGain();
                        ng.gain.setValueAtTime(0.16, t); ng.gain.exponentialRampToValueAtTime(0.001, t + 0.020);
                        ns.connect(nf); nf.connect(ng); ng.connect(dest);
                        ns.start(t); ns.stop(t + 0.020);
                    }
                    break;
                }
                case 'cat': {
                    // 야옹~ - Musical meow: "야" at 400Hz → 650Hz, "옹" at 380Hz, richer harmonic, enhanced vibrato, longer sustain
                    const dest = getAudioDest();
                    const dur = 1.0;
                    const o = ctx.createOscillator();
                    const g = ctx.createGain();
                    o.type = 'sine';
                    // Smooth contour: "야" rises (400→650Hz), "옹" falls (380Hz)
                    o.frequency.setValueAtTime(400, now);
                    o.frequency.linearRampToValueAtTime(650, now + 0.12);
                    o.frequency.setValueAtTime(640, now + 0.28);
                    o.frequency.linearRampToValueAtTime(450, now + 0.55);
                    o.frequency.linearRampToValueAtTime(380, now + dur);
                    g.gain.setValueAtTime(0.001, now);
                    g.gain.linearRampToValueAtTime(0.40, now + 0.04);
                    g.gain.setValueAtTime(0.38, now + 0.30);
                    g.gain.exponentialRampToValueAtTime(0.001, now + dur);
                    o.connect(g); g.connect(dest);
                    o.start(now); o.stop(now + dur);
                    // Second sine oscillator for richer harmonic
                    const o2 = ctx.createOscillator();
                    const g2 = ctx.createGain();
                    o2.type = 'sine';
                    o2.frequency.setValueAtTime(750, now);
                    o2.frequency.linearRampToValueAtTime(1250, now + 0.12);
                    o2.frequency.setValueAtTime(1200, now + 0.32);
                    o2.frequency.linearRampToValueAtTime(850, now + 0.55);
                    o2.frequency.linearRampToValueAtTime(720, now + dur);
                    g2.gain.setValueAtTime(0.001, now);
                    g2.gain.linearRampToValueAtTime(0.15, now + 0.04);
                    g2.gain.setValueAtTime(0.13, now + 0.30);
                    g2.gain.exponentialRampToValueAtTime(0.001, now + dur);
                    o2.connect(g2); g2.connect(dest);
                    o2.start(now); o2.stop(now + dur);
                    // Enhanced vibrato: 20Hz modulation for musical character
                    const v = ctx.createOscillator();
                    const vg = ctx.createGain();
                    v.frequency.setValueAtTime(6.5, now); vg.gain.setValueAtTime(20, now);
                    v.connect(vg); vg.connect(o.frequency);
                    v.start(now); v.stop(now + dur);
                    break;
                }
                case 'lion': {
                    // 어흥! - Deep growl: clearly "어흥" with rumble, but not scary for toddlers
                    const dest = getAudioDest();
                    const dur = 1.3;
                    const o = ctx.createOscillator();
                    const g = ctx.createGain();
                    const flt = ctx.createBiquadFilter();
                    o.type = 'sawtooth';
                    o.frequency.setValueAtTime(70, now);
                    o.frequency.linearRampToValueAtTime(140, now + 0.18);
                    o.frequency.setValueAtTime(125, now + 0.55);
                    o.frequency.linearRampToValueAtTime(60, now + dur);
                    flt.type = 'lowpass'; flt.frequency.setValueAtTime(420, now); flt.Q.setValueAtTime(1, now);
                    g.gain.setValueAtTime(0.001, now);
                    g.gain.linearRampToValueAtTime(0.38, now + 0.10);
                    g.gain.setValueAtTime(0.34, now + 0.45);
                    g.gain.exponentialRampToValueAtTime(0.001, now + dur);
                    o.connect(flt); flt.connect(g); g.connect(dest);
                    o.start(now); o.stop(now + dur);
                    // Sub-bass body
                    const o2 = ctx.createOscillator();
                    const g2 = ctx.createGain();
                    o2.type = 'sine';
                    o2.frequency.setValueAtTime(45, now);
                    o2.frequency.linearRampToValueAtTime(72, now + 0.20);
                    o2.frequency.linearRampToValueAtTime(40, now + 1.1);
                    g2.gain.setValueAtTime(0.001, now);
                    g2.gain.linearRampToValueAtTime(0.22, now + 0.10);
                    g2.gain.exponentialRampToValueAtTime(0.001, now + 1.1);
                    o2.connect(g2); g2.connect(dest);
                    o2.start(now); o2.stop(now + 1.1);
                    // Gentle growl tremor
                    const tr = ctx.createOscillator();
                    const trg = ctx.createGain();
                    tr.frequency.setValueAtTime(5.5, now); trg.gain.setValueAtTime(22, now);
                    tr.connect(trg); trg.connect(o.frequency);
                    tr.start(now); tr.stop(now + dur);
                    // Soft breath noise
                    const nBuf = ctx.createBuffer(1, ctx.sampleRate * 0.25, ctx.sampleRate);
                    const nData = nBuf.getChannelData(0);
                    for (let j = 0; j < nData.length; j++) nData[j] = (Math.random() * 2 - 1) * Math.pow(1 - j / nData.length, 0.5) * 0.35;
                    const ns = ctx.createBufferSource(); ns.buffer = nBuf;
                    const nFlt = ctx.createBiquadFilter(); nFlt.type = 'lowpass'; nFlt.frequency.setValueAtTime(380, now);
                    const ng = ctx.createGain();
                    ng.gain.setValueAtTime(0.08, now); ng.gain.exponentialRampToValueAtTime(0.001, now + 0.25);
                    ns.connect(nFlt); nFlt.connect(ng); ng.connect(dest);
                    ns.start(now); ns.stop(now + 0.25);
                    break;
                }
                case 'cow': {
                    // 음메~ - Long gentle moo
                    const dest = getAudioDest();
                    const dur = 1.6;
                    const o = ctx.createOscillator();
                    const g = ctx.createGain();
                    const flt = ctx.createBiquadFilter();
                    o.type = 'sawtooth';
                    o.frequency.setValueAtTime(95, now);
                    o.frequency.setValueAtTime(95, now + 0.3);
                    o.frequency.linearRampToValueAtTime(155, now + 0.55);
                    o.frequency.setValueAtTime(155, now + 0.9);
                    o.frequency.linearRampToValueAtTime(125, now + 1.3);
                    o.frequency.linearRampToValueAtTime(88, now + dur);
                    flt.type = 'lowpass'; flt.frequency.setValueAtTime(500, now);
                    flt.frequency.linearRampToValueAtTime(900, now + 0.55);
                    flt.frequency.linearRampToValueAtTime(600, now + dur);
                    flt.Q.setValueAtTime(1.4, now);
                    g.gain.setValueAtTime(0.001, now);
                    g.gain.linearRampToValueAtTime(0.35, now + 0.08);
                    g.gain.setValueAtTime(0.30, now + 0.3);
                    g.gain.linearRampToValueAtTime(0.35, now + 0.55);
                    g.gain.setValueAtTime(0.32, now + 0.9);
                    g.gain.exponentialRampToValueAtTime(0.001, now + dur);
                    o.connect(flt); flt.connect(g); g.connect(dest);
                    o.start(now); o.stop(now + dur);
                    const v = ctx.createOscillator(); const vg = ctx.createGain();
                    v.frequency.setValueAtTime(4.5, now); vg.gain.setValueAtTime(8, now);
                    v.connect(vg); vg.connect(o.frequency);
                    v.start(now); v.stop(now + dur);
                    break;
                }
                case 'chicken': {
                    // 꼬끼오! - Three ascending chirps, gentle and clear
                    const dest = getAudioDest();
                    // "꼬" - short low

        function playCorrectSound() {
            if (!Settings.soundEnabled) return;
            const ctx = getAudioContext();
            if (!ctx) return;
            const now = ctx.currentTime;

            // Celebratory ding ding ding - 3 ascending tones
            const dingFreqs = [800, 1000, 1200];
            dingFreqs.forEach((freq, i) => {
                const t = now + i * 0.15;
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(freq, t);
                gain.gain.setValueAtTime(0.001, t);
                gain.gain.linearRampToValueAtTime(0.35, t + 0.03);
                gain.gain.setValueAtTime(0.32, t + 0.08);
                gain.gain.exponentialRampToValueAtTime(0.001, t + 0.22);
                osc.connect(gain);
                gain.connect(getAudioDest());
                osc.start(t);
                osc.stop(t + 0.22);
            });

            // Extended celebratory notes
            const notes = [523, 659, 784, 1047, 1319];
            notes.forEach((freq, i) => {
                const t = now + 0.5 + i * 0.08;
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(freq, t);
                gain.gain.setValueAtTime(0, t);
                gain.gain.linearRampToValueAtTime(0.2, t + 0.02);
                gain.gain.setValueAtTime(0.2, t + 0.1);
                gain.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
                osc.connect(gain);
                gain.connect(getAudioDest());
                osc.start(t);
                osc.stop(t + 0.3);
            });
        }

        function playWrongSound() {
            if (!Settings.soundEnabled) return;
            const ctx = getAudioContext();

            const now = ctx.currentTime;

            // Two descending tones: "boo-boop"

        function cleanupAnimalGame() {
            AnimalGame.running = false;

            if (AnimalGame.advanceTimer) {
                clearTimeout(AnimalGame.advanceTimer);
                AnimalGame.advanceTimer = null;
            }

            // Restore home button, hide pause button
            const homeBtn = document.getElementById('home-btn-2');
            if (homeBtn) homeBtn.style.display = 'flex';
            const pauseBtn = document.getElementById('animal-pause-btn');
            if (pauseBtn) { pauseBtn.style.display = 'none'; pauseBtn.textContent = '⏸️'; }

            // Remove pause overlay if exists
            const pauseOverlay = document.querySelector('.animal-pause-overlay');
            if (pauseOverlay) pauseOverlay.remove();

            const area = document.getElementById('animal-area');
            if (area) area.innerHTML = '';
        }

        function initCanvasGame() {
            const area = document.getElementById('canvas-area');
            area.innerHTML = '';

            const overlay = document.createElement('div');
            overlay.className = 'sketch-start-overlay';
            overlay.id = 'sketch-start-overlay';

            const selection = document.createElement('div');
            selection.className = 'sketch-selection';

            const shapes = [
                { id: 'fish', emoji: '🐟', name: '물고기' },
                { id: 'car', emoji: '🚗', name: '자동차' },
                { id: 'dino', emoji: '🦕', name: '공룡' },
                { id: 'butterfly', emoji: '🦋', name: '나비' }
            ];

            shapes.forEach(shape => {
                const option = document.createElement('div');
                option.className = 'sketch-option';
                option.innerHTML = `<div class="sketch-option-emoji">${shape.emoji}</div><div style="font-size:clamp(0.9rem,2.5vw,1.2rem);font-weight:800;color:#555;margin-top:4px;">${shape.name}</div>`;
                option.onclick = () => { haptic('light'); startSketchDrawing(shape.id); };
                option.ontouchend = (e) => { e.preventDefault(); haptic('light'); startSketchDrawing(shape.id); };
                selection.appendChild(option);
            });

            // Title for sketch selection
            const selTitle = document.createElement('div');
            selTitle.className = 'start-text';
            selTitle.textContent = '무엇을 그릴까요?';
            selTitle.style.marginBottom = '16px';
            overlay.appendChild(selTitle);

            overlay.appendChild(selection);
            area.appendChild(overlay);

            const area = document.getElementById('canvas-area');

            const actionBtns = document.createElement('div');

            toolbar.appendChild(actionBtns);

            // Coloring mode toggle button (🔒 = inside outline only, 🔓 = free draw)
            const modeToggle = document.createElement('button');
            modeToggle.className = 'sketch-mode-toggle';
            modeToggle.id = 'sketch-mode-toggle';
            modeToggle.textContent = '🔒';
            modeToggle.title = '윤곽선 안에서만 색칠';
            const modeLabel = document.createElement('div');
            modeLabel.className = 'sketch-mode-label';

            screenDiv.appendChild(modeLabel);

            // Fill progress indicator
            const fillProgress = document.createElement('div');
            fillProgress.className = 'sketch-fill-progress';
            fillProgress.id = 'sketch-fill-progress';
            fillProgress.innerHTML = `
                <div class="sketch-fill-label" id="sketch-fill-label">0%</div>
